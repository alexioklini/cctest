window.saveQmdFile = async function(collection, filename) {
  const ta = document.getElementById('qmd-file-content');
  if (!ta) return;
  try {
    await API.post(`/v1/services/qmd/docs?collection=${encodeURIComponent(collection)}&file=${encodeURIComponent(filename)}`, { content: ta.value });
    showToast('Saved');
  } catch (e) { showToast(e.message, 'error'); }
};

window.deleteQmdFile = async function(collection, filename) {
  if (!confirm(`Delete ${filename}?`)) return;
  try {
    await API.del(`/v1/services/qmd/docs?collection=${encodeURIComponent(collection)}&file=${encodeURIComponent(filename)}`);
    document.getElementById('qmd-file-modal')?.remove();
    showToast(`Deleted ${filename}`);
    // Refresh the file list
    const row = document.querySelector(`[data-collection="${CSS.escape(collection)}"]`);
    if (row && !row.querySelector('.qmd-docs-panel').classList.contains('hidden')) {
      await toggleQmdDocs(collection);
      await toggleQmdDocs(collection);
    }
  } catch (e) { showToast(e.message, 'error'); }
};

function formatBytes(b) {
  if (b < 1024) return b + 'B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + 'KB';
  return (b / 1024 / 1024).toFixed(1) + 'MB';
}

window.promptModelIcon = function(el) {
  const icons = ['🟣', '🟠', '🟢', '🔵', '💎', '🐼', '🦙', '🌬️', '🐦‍⬛', '🤖', '⚡', '🧠', '🔮', '🎯'];
  const current = el.textContent.trim();
  const next = icons[(icons.indexOf(current) + 1) % icons.length];
  el.textContent = next;
};

window.showAddModelForm = function() {
  const form = document.getElementById('add-model-form');
  if (form) form.classList.toggle('hidden');
};

window.addModelFromForm = async function() {
  const mid = document.getElementById('add-model-id')?.value?.trim();
  if (!mid) return showToast('Model ID is required');
  if (state.modelsConfig[mid]) return showToast('Model already exists');
  const provider = document.getElementById('add-model-provider')?.value || '';
  const maxCtx = parseInt(document.getElementById('add-model-context')?.value) || 131072;
  const priority = parseInt(document.getElementById('add-model-priority')?.value) || 50;
  const costInput = parseFloat(document.getElementById('add-model-cost-input')?.value) || 0;
  const costOutput = parseFloat(document.getElementById('add-model-cost-output')?.value) || 0;
  state.modelsConfig[mid] = {
    enabled: true,
    shortname: mid,
    icon: '🤖',
    priority,
    capabilities: [],
    provider,
    max_context: maxCtx,
    cost_input: costInput,
    cost_output: costOutput,
  };
  try {
    const res = await API.post('/v1/models/config', { action: 'save', models: state.modelsConfig });
    if (res.models) state.modelsConfig = res.models;
    showToast('Model added: ' + mid);
    renderModelSelector();
    loadSettingsTab();
  } catch (e) {
    showToast('Failed: ' + e.message);
  }
};

window.syncModelsFromProviders = async function() {
  try {
    const res = await API.post('/v1/models/config', { action: 'sync' });
    if (res.models) {
      state.modelsConfig = res.models;
      showToast('Models synced from providers');
      loadSettingsTab();
    }
  } catch (e) {
    showToast('Sync failed: ' + e.message);
  }
};

window.addFallback = function(selectEl, modelId) {
  const val = selectEl.value;
  if (!val) return;
  selectEl.value = '';
  const list = selectEl.parentNode.querySelector('.mdl-fallbacks-list');
  if (!list) return;
  // Add pill
  const pill = document.createElement('span');
  pill.className = 'inline-flex items-center gap-1 px-2 py-0.5 bg-accent/10 text-accent border border-accent/30 rounded text-[10px] mono';
  pill.innerHTML = `${val} <button class="hover:text-error" onclick="removeFallback(this,'${modelId}')">&times;</button>`;
  list.appendChild(pill);
  // Remove from dropdown
  const opt = selectEl.querySelector(`option[value="${CSS.escape(val)}"]`);
  if (opt) opt.remove();
};

window.removeFallback = function(btn, modelId) {
  const pill = btn.parentNode;
  const fbName = pill.textContent.replace('×', '').trim();
  pill.remove();
  // Re-add to dropdown
  const select = pill.closest('.mb-3')?.querySelector('.mdl-fallback-add');
  if (select) {
    const opt = document.createElement('option');
    opt.value = fbName;
    opt.textContent = fbName;
    select.appendChild(opt);
  }
};

window.saveModelsConfig = async function() {
  const list = document.getElementById('models-config-list');
  if (!list) return;
  const models = {};
  list.querySelectorAll('[data-model-id]').forEach(row => {
    const mid = row.dataset.modelId;
    const caps = [];
    row.querySelectorAll('.mdl-cap').forEach(btn => {
      if (btn.classList.contains('bg-accent/20')) caps.push(btn.dataset.cap);
    });
    const entry = {
      enabled: row.querySelector('.mdl-enabled')?.checked !== false,
      shortname: row.querySelector('.mdl-shortname')?.value || '',
      icon: row.querySelector('.mdl-icon')?.textContent?.trim() || '🤖',
      priority: parseInt(row.querySelector('.mdl-priority')?.value) || 0,
      capabilities: caps,
      provider: (state.modelsConfig[mid] || {}).provider || '',
    };
    // max_context
    const mcVal = row.querySelector('.mdl-max-context')?.value;
    if (mcVal) entry.max_context = parseInt(mcVal);
    // Fallbacks (from pill list)
    const fbList = row.querySelector('.mdl-fallbacks-list');
    if (fbList) {
      const fallbacks = Array.from(fbList.querySelectorAll('span')).map(s => s.textContent.replace('×', '').trim()).filter(Boolean);
      if (fallbacks.length) entry.fallbacks = fallbacks;
    }
    // Cost rates
    const ciVal = row.querySelector('.mdl-cost-input')?.value;
    const coVal = row.querySelector('.mdl-cost-output')?.value;
    if (ciVal !== undefined) entry.cost_input = parseFloat(ciVal) || 0;
    if (coVal !== undefined) entry.cost_output = parseFloat(coVal) || 0;
    // Inference defaults
    const inference = {};
    row.querySelectorAll('.mdl-inf').forEach(inp => {
      const v = inp.value.trim();
      if (v !== '') inference[inp.dataset.key] = parseFloat(v);
    });
    const thinkingEl = row.querySelector('.mdl-inf-thinking');
    if (thinkingEl?.checked) inference.thinking = true;
    const budgetEl = row.querySelector('.mdl-inf-thinking-budget');
    if (budgetEl?.value.trim()) inference.thinking_budget = parseInt(budgetEl.value);
    if (Object.keys(inference).length) entry.inference = inference;
    // Purpose presets
    const presets = {};
    row.querySelectorAll('[data-preset]').forEach(pEl => {
      const pName = pEl.dataset.preset;
      const preset = {};
      pEl.querySelectorAll('.mdl-preset-val').forEach(inp => {
        const v = inp.value.trim();
        if (v !== '') preset[inp.dataset.key] = parseFloat(v);
      });
      const pThink = pEl.querySelector('.mdl-preset-thinking');
      if (pThink?.checked) preset.thinking = true;
      if (Object.keys(preset).length) presets[pName] = preset;
    });
    if (Object.keys(presets).length) entry.presets = presets;
    models[mid] = entry;
  });
  try {
    const res = await API.post('/v1/models/config', { action: 'save', models });
    if (res.models) state.modelsConfig = res.models;
    showToast('Models config saved');
    renderModelSelector();
  } catch (e) {
    showToast('Save failed: ' + e.message);
  }
};

async function testNewProvider() {
  const url = document.getElementById('prov-url')?.value;
  const key = document.getElementById('prov-key')?.value;
  const type = document.getElementById('prov-type')?.value;
  const resultEl = document.getElementById('prov-test-result');
  if (!url || !resultEl) return;
  resultEl.className = 'text-sm p-3 rounded-lg bg-surface-lighter text-text-muted';
  resultEl.classList.remove('hidden');
  resultEl.textContent = 'Testing connection...';
  try {
    const r = await API.post('/v1/providers/test', { base_url: url, api_key: key, type: type });
    if (r.status === 'connected') {
      resultEl.className = 'text-sm p-3 rounded-lg bg-success/10 text-success border border-success/20';
      resultEl.textContent = `✔ Connected — ${r.model_count} model${r.model_count !== 1 ? 's' : ''} available`;
      // Auto-fill default model if empty
      const modelInput = document.getElementById('prov-model');
      if (modelInput && !modelInput.value && r.models?.length) {
        modelInput.value = typeof r.models[0] === 'string' ? r.models[0] : (r.models[0].id || '');
      }
    } else {
      resultEl.className = 'text-sm p-3 rounded-lg bg-error/10 text-error border border-error/20';
      resultEl.textContent = `✘ ${r.error || 'Connection failed'}`;
    }
  } catch (e) {
    resultEl.className = 'text-sm p-3 rounded-lg bg-error/10 text-error border border-error/20';
    resultEl.textContent = `✘ ${e.message}`;
  }
}

async function saveNewProvider() {
  const name = document.getElementById('prov-name')?.value?.trim();
  const url = document.getElementById('prov-url')?.value?.trim();
  const key = document.getElementById('prov-key')?.value?.trim();
  const type = document.getElementById('prov-type')?.value;
  const model = document.getElementById('prov-model')?.value?.trim();
  if (!name || !url) { showToast('Name and URL required', 'error'); return; }

  // When editing, if key is empty, we need to preserve existing key on server side
  const providerData = { base_url: url, type, default_model: model || null };
  if (key) {
    providerData.api_key = key;
  } else if (editingProvider) {
    // Leave api_key out so server preserves existing value
    providerData._keep_key = true;
  } else {
    providerData.api_key = '';
  }

  try {
    await API.post('/v1/providers', {
      action: 'add', name,
      provider: providerData,
    });
    showToast(editingProvider ? `Provider "${name}" updated` : `Provider "${name}" added`);
    editingProvider = null;
    // Refresh providers in state
    const res = await API.getProviders();
    state.providers = res.providers || res || [];
    renderSettingsContent();
    renderModelSelector();
  } catch (e) { showToast(e.message, 'error'); }
}

async function testProvider(name) {
  const p = state.providers.find(x => (x.name || x) === name);
  if (!p) return;
  showToast(`Testing ${name}...`);
  try {
    const r = await API.post('/v1/providers/test', {
      base_url: p.base_url, api_key: p.api_key_full || p.api_key, type: p.type
    });
    if (r.status === 'connected') {
      showToast(`${name}: Connected — ${r.model_count} models`);
    } else {
      showToast(`${name}: ${r.error || 'Failed'}`, 'error');
    }
    // Refresh
    const res = await API.getProviders();
    state.providers = res.providers || res || [];
    renderSettingsContent();
    renderModelSelector();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteProvider(name) {
  if (!confirm(`Delete provider "${name}"?`)) return;
  try {
    await API.post('/v1/providers', { action: 'delete', name });
    showToast(`Provider "${name}" deleted`);
    const res = await API.getProviders();
    state.providers = res.providers || res || [];
    renderSettingsContent();
    renderModelSelector();
  } catch (e) { showToast(e.message, 'error'); }
}

      <h3 class="section-header text-sm mb-4">Cost Summary (last 24h)</h3>
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="text-center"><div class="text-2xl font-bold text-accent">$${stats.total_cost.toFixed(2)}</div><div class="text-[10px] text-text-muted">Total Cost</div></div>
        <div class="text-center"><div class="text-2xl font-bold">${stats.total_calls}</div><div class="text-[10px] text-text-muted">API Calls</div></div>

        <table class="w-full text-sm mb-6">
          <thead><tr class="text-text-muted text-[10px] uppercase tracking-wider">

            <th class="text-right pb-1">Tokens In</th><th class="text-right pb-1">Tokens Out</th>
            <th class="text-right pb-1">Cost</th>
          </tr></thead><tbody>`;
      for (const row of byAgent) {
        html += `<tr class="border-t border-border/50">
          <td class="py-1 font-medium">${esc(row.agent)}</td>
          <td class="py-1 text-right text-text-muted">${row.calls}</td>
          <td class="py-1 text-right text-text-muted">${_fmtTokens(row.tokens_in)}</td>
          <td class="py-1 text-right text-text-muted">${_fmtTokens(row.tokens_out)}</td>
          <td class="py-1 text-right font-medium text-accent">$${row.cost.toFixed(2)}</td>
        </tr>`;
      }
      html += '</tbody></table>';
    }

    if (dailyRows.length) {
      html += `<h4 class="text-xs font-semibold text-text-muted mb-2 uppercase tracking-wider">Daily Breakdown (7 days)</h4>
        <table class="w-full text-sm">
          <thead><tr class="text-text-muted text-[10px] uppercase tracking-wider">
            <th class="text-left pb-1">Date</th><th class="text-right pb-1">Calls</th>
            <th class="text-right pb-1">Tokens</th><th class="text-right pb-1">Cost</th>
          </tr></thead><tbody>`;
      for (const row of dailyRows) {
        html += `<tr class="border-t border-border/50">
          <td class="py-1">${esc(row.day)}</td>
          <td class="py-1 text-right text-text-muted">${row.calls}</td>
          <td class="py-1 text-right text-text-muted">${_fmtTokens(row.tokens_in + row.tokens_out)}</td>
          <td class="py-1 text-right font-medium text-accent">$${row.cost.toFixed(2)}</td>
        </tr>`;
      }
      html += '</tbody></table>';
    }

    html += '</div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="text-error text-sm">Error: ${esc(e.message)}</div>`;
  }
}

function _fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

window.expandTrace = async function(traceId) {
  const panel = document.getElementById('trace-detail-panel');
  if (!panel) return;
  panel.innerHTML = '<div class="text-text-muted text-sm">Loading...</div>';
  try {
    const data = await API.get(`/v1/traces/${traceId}`);
    const spans = data.spans || [];
    if (!spans.length) { panel.innerHTML = '<div class="text-text-muted text-sm">No spans found</div>'; return; }
    const totalDur = data.total_duration_ms || 1;
    let html = `<div class="glass-card p-6">
      <h4 class="text-sm font-semibold mb-2">Trace: ${esc(traceId.slice(0,12))} (${spans.length} spans, ${(totalDur/1000).toFixed(1)}s)</h4>
      <div class="text-[10px] text-text-muted mb-4">Tokens: ${_fmtTokens(data.total_tokens_in || 0)} in / ${_fmtTokens(data.total_tokens_out || 0)} out</div>
      <table class="w-full text-xs">
        <thead><tr class="text-text-muted text-[10px] uppercase tracking-wider">
          <th class="text-left pb-1">Type</th><th class="text-left pb-1">Name</th>
          <th class="text-left pb-1">Model</th><th class="text-right pb-1">Duration</th>
          <th class="text-right pb-1">Tokens</th><th class="text-center pb-1">Status</th>
        </tr></thead><tbody>`;
    for (const sp of spans) {
      const dur = sp.duration_ms != null ? (sp.duration_ms / 1000).toFixed(2) + 's' : '?';
      const indent = sp.parent_id ? 'pl-4' : '';
      const stColor = sp.status === 'ok' ? 'text-accent' : 'text-error';
      const tokStr = (sp.tokens_in || sp.tokens_out) ? `${_fmtTokens(sp.tokens_in||0)}/${_fmtTokens(sp.tokens_out||0)}` : '';
      // Waterfall bar
      const pct = totalDur > 0 ? Math.max(2, Math.round((sp.duration_ms||0) / totalDur * 100)) : 0;
      html += `<tr class="border-t border-border/30">
        <td class="py-0.5 ${indent} font-medium">${esc(sp.type)}</td>
        <td class="py-0.5">${esc((sp.name||'').slice(0,50))}</td>
        <td class="py-0.5 text-text-muted mono text-[10px]">${esc(sp.model||'')}</td>
        <td class="py-0.5 text-right"><div class="inline-block bg-accent/20 rounded h-3 align-middle mr-1" style="width:${pct}%"></div>${dur}</td>
        <td class="py-0.5 text-right text-text-muted">${tokStr}</td>
        <td class="py-0.5 text-center ${stColor}">${esc(sp.status)}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
    panel.innerHTML = html;
  } catch (e) {
    panel.innerHTML = `<div class="text-error text-sm">Error: ${esc(e.message)}</div>`;
  }
};

async function toggleAgentPaused(agentName, agentObj) {
  const isPaused = getAgentPaused(agentObj);
  try {
    // Read current agent.json
    const res = await API.getAgentFile(agentName, 'agent.json');
    const content = typeof res === 'string' ? res : (res.content || JSON.stringify(res, null, 2));
    let parsed = {};
    try { parsed = typeof content === 'string' ? JSON.parse(content) : content; } catch {}
    parsed.paused = !isPaused;
    await API.writeAgentFile(agentName, 'agent.json', JSON.stringify(parsed, null, 2));
    showToast(isPaused ? `${agentName} resumed` : `${agentName} paused`);
    // Refresh agents
    const agentsData3 = await API.getAgents();
    state.agents = Array.isArray(agentsData3) ? agentsData3 : (agentsData3.agents || []);
    if (agentsData3.team_structure) state.teamStructure = agentsData3.team_structure;
    renderAgentCards();
    updateChatArea();
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
}

async function deleteAgent(agentName) {
  if (agentName === 'main') return;
  if (!confirm(`Delete agent "${agentName}"? This will move the agent to a .trash folder (recoverable).`)) return;
  try {
    await API.post('/v1/agents/delete', { agent: agentName });
    showToast(`Agent "${agentName}" deleted`);
    // Remove from local state
    if (state.agentChats[agentName]) {
      closeChat(agentName);
    }
    state.agents = state.agents.filter(a => getAgentName(a) !== agentName);
    if (state.activeAgentId === agentName) {
      state.activeAgentId = null;
    }
    renderAgentCards();
    updateChatArea();
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
}

  return div.innerHTML;

// ─── Theme Toggle ───────────────────────────────────────────
function getTheme() {
  return document.documentElement.getAttribute('data-theme') || 'light';
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  // Update icon visibility
  const sunIcon = document.getElementById('theme-icon-sun');
  const moonIcon = document.getElementById('theme-icon-moon');
  if (theme === 'dark') {
    sunIcon.style.display = 'block';
    moonIcon.style.display = 'none';
  } else {
    sunIcon.style.display = 'none';
    moonIcon.style.display = 'block';
  }
  // Switch highlight.js theme
  const hljsLink = document.getElementById('hljs-theme');
  if (hljsLink) {
    hljsLink.href = theme === 'dark'
      ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
      : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  }
}

function toggleTheme() {
  setTheme(getTheme() === 'dark' ? 'light' : 'dark');
}

// Apply saved theme preference
(function applyStoredTheme() {
  const stored = localStorage.getItem('theme');
  if (stored) {
    setTheme(stored);
  } else {
    setTheme('light');
  }
})();

// ─── Scheduler Dashboard ────────────────────────────────────
let _schedDashInterval = null;
let _schedDashElapsedInterval = null;
let _schedDashTab = 'running';
let _schedDashHistoryFilter = 'all';

function openSchedulerDashboard() {
  // Clean up any previous intervals
  if (_schedDashInterval) { clearInterval(_schedDashInterval); _schedDashInterval = null; }
  if (_schedDashElapsedInterval) { clearInterval(_schedDashElapsedInterval); _schedDashElapsedInterval = null; }

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'scheduler-dashboard-modal';
  modal.onclick = (e) => { if (e.target === modal) closeSchedulerDashboard(); };
  modal.innerHTML = `
    <div class="modal-content p-6" style="max-width:900px;max-height:85vh">
      <button class="modal-close" onclick="closeSchedulerDashboard()">&times;</button>
      <h2 class="font-display text-lg font-semibold text-text-primary mb-4">Scheduler Dashboard</h2>
      <div class="flex gap-0 border-b border-border mb-4" id="sched-dash-tabs">
        <button class="config-tab active" data-tab="running" onclick="switchSchedDashTab('running')">Running</button>
        <button class="config-tab" data-tab="planned" onclick="switchSchedDashTab('planned')">Planned</button>
        <button class="config-tab" data-tab="history" onclick="switchSchedDashTab('history')">History</button>
      </div>
      <div id="sched-dash-content" style="min-height:200px">
        <div class="text-text-muted text-sm text-center py-8">Loading...</div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  _schedDashTab = 'running';
  _schedDashHistoryFilter = 'all';
  loadSchedDashTab();

  // Auto-refresh every 5 seconds
  _schedDashInterval = setInterval(() => {
    if (document.getElementById('scheduler-dashboard-modal')) {
      loadSchedDashTab();
    } else {
      clearInterval(_schedDashInterval);
      _schedDashInterval = null;
    }
  }, 5000);
}

function closeSchedulerDashboard() {
  if (_schedDashInterval) { clearInterval(_schedDashInterval); _schedDashInterval = null; }
  if (_schedDashElapsedInterval) { clearInterval(_schedDashElapsedInterval); _schedDashElapsedInterval = null; }
  const modal = document.getElementById('scheduler-dashboard-modal');
  if (modal) modal.remove();
}

function switchSchedDashTab(tab) {
  _schedDashTab = tab;
  if (_schedDashElapsedInterval) { clearInterval(_schedDashElapsedInterval); _schedDashElapsedInterval = null; }
  const tabs = document.querySelectorAll('#sched-dash-tabs .config-tab');
  tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  loadSchedDashTab();
}

async function loadSchedDashTab() {
  const el = document.getElementById('sched-dash-content');
  if (!el) return;

  try {
    if (_schedDashTab === 'running') {
      await renderSchedDashRunning(el);
    } else if (_schedDashTab === 'planned') {
      await renderSchedDashPlanned(el);
    } else if (_schedDashTab === 'history') {
      await renderSchedDashHistory(el);
    }
  } catch (err) {
    el.innerHTML = `<div class="text-error text-sm py-4">Error loading data: ${esc(err.message)}</div>`;
  }
}

function _schedFormatElapsed(startedStr) {
  const started = new Date(startedStr);
  const now = new Date();
  const diff = Math.max(0, Math.floor((now - started) / 1000));
  const m = Math.floor(diff / 60);
  const s = diff % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function _schedFormatDuration(seconds) {
  if (!seconds && seconds !== 0) return '-';
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function _schedTruncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '...' : str;
}

async function renderSchedDashPlanned(el) {
  const data = await API.getSchedule();
  const tasks = Array.isArray(data) ? data : (data.schedules || data.tasks || []);

  // Sort by next_run
  tasks.sort((a, b) => {
    const aNext = a.next_run ? new Date(a.next_run).getTime() : Infinity;
    const bNext = b.next_run ? new Date(b.next_run).getTime() : Infinity;
    return aNext - bNext;
  });

  if (tasks.length === 0) {
    el.innerHTML = '<div class="text-text-muted text-sm text-center py-8">No scheduled tasks</div>';
    return;
  }

  let html = `<table class="sched-dash-table">
    <thead><tr>
      <th>Name</th><th>Agent</th><th>Schedule</th><th>Next Run</th><th>Status</th><th>Timeout</th><th></th>
    </tr></thead><tbody>`;

  const now = new Date();
  tasks.forEach(t => {
    const isActive = t.status === 'active' || t.active === true || t.enabled === true;
    const isPaused = t.status === 'paused' || t.active === false || t.enabled === false;
    const nextRun = t.next_run ? new Date(t.next_run) : null;
    const isOverdue = nextRun && nextRun < now && isActive;

    let badgeClass = 'sched-badge-active';
    let badgeText = 'active';
    if (isPaused) { badgeClass = 'sched-badge-paused'; badgeText = 'paused'; }
    if (isOverdue) { badgeClass = 'sched-badge-overdue'; badgeText = 'overdue'; }

    html += `<tr class="sched-row">
      <td class="font-medium text-text-primary">${esc(t.name || '')}</td>
      <td class="text-agent">${esc(t.agent || '')}</td>
      <td class="mono text-xs">${esc(t.schedule || t.cron || '')}</td>
      <td class="mono text-xs">${nextRun ? nextRun.toLocaleString() : '-'}</td>
      <td><span class="sched-badge ${badgeClass}">${badgeText}</span></td>
      <td class="mono text-xs">${t.timeout ? _schedFormatDuration(t.timeout) : '-'}</td>
      <td class="flex gap-2 flex-wrap">
        ${isActive
          ? `<button class="text-xs text-yellow-500 hover:text-yellow-400 transition-colors" onclick="schedDashAction('pause','${esc(t.name)}')">Pause</button>`
          : `<button class="text-xs text-success hover:text-green-300 transition-colors" onclick="schedDashAction('resume','${esc(t.name)}')">Resume</button>`
        }
        <button class="text-xs text-accent hover:text-orange-300 transition-colors" onclick="schedDashEditTask('${esc(t.agent || '')}')">Edit</button>
        <button class="text-xs text-error hover:text-red-300 transition-colors" onclick="schedDashAction('delete','${esc(t.name)}')">Delete</button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

    if (status === 'success') badgeClass = 'sched-badge-success';
    else if (status === 'error') badgeClass = 'sched-badge-error';
    else if (status === 'timeout') badgeClass = 'sched-badge-timeout';

    const started = h.started_at || h.started || h.timestamp || '';
    const duration = h.duration != null ? _schedFormatDuration(h.duration) : '-';
    const result = h.result || h.output || h.error || '';
    const isError = status === 'error';

    html += `<tr class="sched-row" style="cursor:pointer" onclick="schedDashToggleHistoryRow(${i})">

async function refineMessage() {
  const text = dom.chatInput.value.trim();
  if (!text) { showToast('Type something to refine'); return; }
  const btn = document.getElementById('btn-refine');
  const originalHtml = btn.innerHTML;
  // Show loading indicator
  btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">&#10227;</span>';
  btn.disabled = true;
  btn.style.opacity = '0.6';
  try {
    const chat = state.agentChats[state.activeAgentId];
    const res = await API.post('/v1/refine', {
      text,
      session_id: chat?.sessionId || '',
      agent: state.activeAgentId || 'main',
      project: state.currentProject || '',
    });
    if (res.error) { showToast('Refine error: ' + res.error); return; }
    const refined = res.refined || text;
    // Auto-replace input — no approval needed
    dom.chatInput.value = refined;
    dom.chatInput.style.height = 'auto';
    dom.chatInput.style.height = dom.chatInput.scrollHeight + 'px';
    dom.chatInput.focus();
  } catch (e) {
    showToast('Refine failed: ' + e.message);
  } finally {
    btn.innerHTML = originalHtml;
    btn.disabled = false;
    btn.style.opacity = '';
  }
}

// ─── Sidebar / Panel Resize ─────────────────────────────────
(function initResizeHandles() {
  function setupResize(handleId, targetId, side) {
    const handle = document.getElementById(handleId);
    const target = document.getElementById(targetId);
    if (!handle || !target) return;

    let startX, startW;
    function onMouseDown(e) {
      if (target.classList.contains('collapsed')) return;
      e.preventDefault();
      startX = e.clientX;
      startW = target.offsetWidth;
      handle.classList.add('active');
      target.classList.add('resizing');
      document.body.classList.add('col-resizing');
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }
    function onMouseMove(e) {
      const dx = e.clientX - startX;
      const newW = side === 'right' ? startW + dx : startW - dx;
      const min = parseInt(getComputedStyle(target).minWidth) || 150;
      const max = parseInt(getComputedStyle(target).maxWidth) || 600;
      target.style.width = Math.max(min, Math.min(max, newW)) + 'px';
    }
    function onMouseUp() {
      handle.classList.remove('active');
      target.classList.remove('resizing');
      document.body.classList.remove('col-resizing');
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      // Persist width
      localStorage.setItem(targetId + '-width', target.style.width);
    }
    handle.addEventListener('mousedown', onMouseDown);

    // Restore persisted width
    const saved = localStorage.getItem(targetId + '-width');
    if (saved && !target.classList.contains('collapsed')) {
      target.style.width = saved;
    }
  }

  setupResize('sidebar-resize', 'sidebar', 'right');
  setupResize('project-panel-resize', 'project-panel', 'left');
})();

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'b') {
    e.preventDefault();
    if (window.innerWidth < 768) {
      if (dom.sidebar.classList.contains('mobile-open')) closeMobileSidebar();
      else openMobileSidebar();
    } else {
      toggleSidebar();
    }
  }
  // Ctrl+Shift+N → new note
  if (e.ctrlKey && e.shiftKey && e.key === 'N') {
    e.preventDefault();
    if (state.currentProject) createNewNote();
  }
  // Ctrl+] → toggle project panel
  if (e.ctrlKey && e.key === ']') {
    e.preventDefault();
    toggleProjectPanel();
  }
  // Escape → close note editor
  if (e.key === 'Escape' && state.centerView === 'note') {
    e.preventDefault();
    closeNote();
  }
});

  const agentCmds = (customCommands[state.activeAgentId] || []).map(c => ({
    cmd: '/' + c.name,
    desc: (c.description || c.template || '').substring(0, 60) + ' [Custom]',
    action: () => { dom.chatInput.value = '/' + c.name + ' '; },
    custom: true,
  }));
  const allCommands = [...slashCommands, ...agentCmds];
  slashPopup.filtered = q
    ? allCommands.filter(c => c.cmd.slice(1).startsWith(q) || c.desc.toLowerCase().includes(q))
    : [...allCommands];
  slashPopup.activeIdx = 0;
  if (slashPopup.filtered.length === 0) {
    slashPopup.el.innerHTML = '<div class="slash-popup-empty">No matching commands</div>';
  } else {
    slashPopup.el.innerHTML = slashPopup.filtered.map((c, i) =>
      `<div class="slash-popup-item ${i === 0 ? 'active' : ''}" data-idx="${i}">` +
      `<span class="slash-popup-cmd">${esc(c.cmd)}</span>` +
      (c.custom ? '<span style="background:#8b5cf6;color:#fff;font-size:9px;padding:1px 4px;border-radius:3px;margin-left:4px;">Custom</span>' : '') +
      `<span class="slash-popup-desc">${esc(c.desc)}</span></div>`
    ).join('') + '<div class="slash-popup-hint">\u2191\u2193 navigate \u00b7 Enter select \u00b7 Esc close</div>';
  }
  slashPopup.el.style.display = 'block';
  slashPopup.visible = true;
  // Scroll active item into view
  const activeEl = slashPopup.el.querySelector('.slash-popup-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

function slashHide() {
  slashPopup.el.style.display = 'none';
  slashPopup.visible = false;
  slashPopup.filtered = [];
  slashPopup.activeIdx = 0;
}

function slashSetActive(idx) {
  if (idx < 0) idx = slashPopup.filtered.length - 1;
  if (idx >= slashPopup.filtered.length) idx = 0;
  slashPopup.activeIdx = idx;
  slashPopup.el.querySelectorAll('.slash-popup-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const activeEl = slashPopup.el.querySelector('.slash-popup-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
}

function slashSelect(idx) {
  const cmd = slashPopup.filtered[idx];
  if (!cmd) return;
  dom.chatInput.value = '';
  dom.chatInput.style.height = 'auto';
  slashHide();
  cmd.action();
  dom.chatInput.focus();
}

// Mouse interactions on popup items
slashPopup.el.addEventListener('mousedown', (e) => {
  // Prevent blur on the textarea
  e.preventDefault();
});
slashPopup.el.addEventListener('click', (e) => {
  const item = e.target.closest('.slash-popup-item');
  if (item) {
    slashSelect(parseInt(item.dataset.idx, 10));
  }
});
slashPopup.el.addEventListener('mousemove', (e) => {
  const item = e.target.closest('.slash-popup-item');
  if (item) {
    const idx = parseInt(item.dataset.idx, 10);
    if (idx !== slashPopup.activeIdx) slashSetActive(idx);
  }
});

// Close popup on click outside
document.addEventListener('mousedown', (e) => {
  if (slashPopup.visible && !slashPopup.el.contains(e.target) && e.target !== dom.chatInput) {
    slashHide();
  }
});

dom.chatInput.addEventListener('keydown', (e) => {
  if (slashPopup.visible) {
    if (e.key === 'ArrowDown') { e.preventDefault(); slashSetActive(slashPopup.activeIdx + 1); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); slashSetActive(slashPopup.activeIdx - 1); return; }
    if (e.key === 'Enter' || e.key === 'Tab') {
      if (slashPopup.filtered.length > 0) {
        e.preventDefault();
        slashSelect(slashPopup.activeIdx);
        return;
      }
    }
    if (e.key === 'Escape') { e.preventDefault(); slashHide(); return; }
  }
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea + slash command detection
dom.chatInput.addEventListener('input', () => {
  dom.chatInput.style.height = 'auto';
  dom.chatInput.style.height = Math.min(dom.chatInput.scrollHeight, 200) + 'px';

  const val = dom.chatInput.value;
  if (val.startsWith('/') && !val.includes(' ')) {
    slashShow(val.slice(1));
  } else {
    if (slashPopup.visible) slashHide();
  }
});

// Model selector change
dom.modelSelector.addEventListener('change', () => {
  const chat = state.activeChat;
  if (chat) {
    chat.model = dom.modelSelector.value;
    updateStatusBar();
  }
});

// ─── Live Activity Panel ────────────────────────────────────
const actPanel = {
  open: false,
  log: [],
  maxLog: 200,
  tasks: [],
  running: [],
  services: {},
  prevActivity: {},
  prevTasks: [],
  prevServices: {},
  seenToolLogs: new Set(),
  pollTimer: null,
  pollSlowTimer: null,
};

function apAbbrev(name) {
  if (!name) return '???';
  if (name.length <= 3) return name.toUpperCase();
  const upper = name.toUpperCase();
  const c = upper[0] + upper.slice(1).replace(/[AEIOU]/g, '');
  return (c.length >= 3 ? c : upper).slice(0, 3);
}

function apAddLog(agent, msg, type) {
  const d = new Date();
  const ts = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  actPanel.log.push({ time: ts, agent: agent || 'SYS', msg, type: type || 'info' });
  if (actPanel.log.length > actPanel.maxLog) actPanel.log.splice(0, actPanel.log.length - actPanel.maxLog);
}

function apDiffActivity(prev, next) {
  for (const [agent, types] of Object.entries(next)) {
    const pt = prev[agent] || [];
    for (const t of types) {
      if (!pt.includes(t)) {
        const labels = { chat: 'Started chatting', delegate: 'Started delegating', schedule: 'Running scheduled task' };
        apAddLog(agent, labels[t] || `Activity: ${t}`, t === 'chat' ? 'chat' : t === 'delegate' ? 'delegate' : 'schedule');
      }
    }
  }
  for (const [agent, types] of Object.entries(prev)) {
    const nt = next[agent] || [];
    for (const t of types) {
      if (!nt.includes(t)) {
        const labels = { chat: 'Finished chatting', delegate: 'Finished delegating', schedule: 'Scheduled task completed' };
        apAddLog(agent, labels[t] || `Stopped: ${t}`, t === 'schedule' ? 'success' : 'info');
      }
    }
  }
}

function apDiffTasks(prev, next) {
  const pm = {};
  for (const t of prev) pm[t.id || t.task_id] = t;
  for (const t of next) {
    const id = t.id || t.task_id;
    const old = pm[id];
    if (!old) {
      apAddLog(t.agent || 'main', `Task started: ${(t.prompt || t.name || id).slice(0, 80)}`, 'delegate');
    } else if (old.status !== t.status) {
      if (t.status === 'completed' || t.status === 'done') apAddLog(t.agent || 'main', `Task completed: ${(t.prompt || t.name || id).slice(0, 80)}`, 'success');
      else if (t.status === 'error' || t.status === 'failed') apAddLog(t.agent || 'main', `Task failed: ${(t.prompt || t.name || id).slice(0, 80)}`, 'error');
    }
  }
}

function apDiffRunning(running) {
  for (const r of running) {
    for (const entry of (r.tool_log || [])) {
      const key = `${r.name}:${entry}`;
      if (!actPanel.seenToolLogs.has(key)) {
        actPanel.seenToolLogs.add(key);
        apAddLog(r.agent || 'main', `Tool: ${entry}`, 'schedule');
      }
    }
  }
}

function apDiffServices(prev, next) {
  if (!prev.server || !next.server) return;
  for (const [key, label] of [['qmd','QMD'],['telegram','Telegram']]) {
    const ps = prev[key]?.status, ns = next[key]?.status;
    if (ps && ns && ps !== ns) apAddLog('SYS', `${label} ${ns}`, ns === 'running' ? 'success' : 'error');
  }
}

function apGetStatus(agentId, paused) {
  if (paused) return ['PAUSED', 'ap-status-paused'];
  const types = state.agentActivity[agentId] || [];
  if (types.includes('chat')) return ['CHATTING', 'ap-status-chatting'];
  if (types.includes('delegate')) return ['DELEGATING', 'ap-status-delegating'];
  if (types.includes('schedule')) return ['RUNNING', 'ap-status-running'];
  return ['IDLE', 'ap-status-idle'];
}

function apRender() {
  if (!actPanel.open) return;
  // Agents
  const ab = document.getElementById('ap-agents-body');
  document.getElementById('ap-agents-badge').textContent = state.agents.length;
  ab.innerHTML = state.agents.map(a => {
    const avId = getAgentAvatar(a);
    const [label, cls] = apGetStatus(a.id, a.paused);
    return `<div class="ap-agent">
      <div class="ap-av">${renderAvatar(avId, 24)}</div>
      <span class="ap-name">${esc(a.display_name || a.id)}</span>
      <span class="ap-status ${cls}">${label}</span>
    </div>`;
  }).join('');

  // Tasks
  const tb = document.getElementById('ap-tasks-body');
  const running = actPanel.tasks.filter(t => t.status === 'running');
  document.getElementById('ap-tasks-badge').textContent = `${running.length}/${actPanel.tasks.length}`;
  if (!actPanel.tasks.length) {
    tb.innerHTML = '<div style="padding:4px 16px;font-size:11px;color:var(--color-text-muted)">No tasks</div>';
  } else {
    tb.innerHTML = actPanel.tasks.slice(0, 8).map(t => {
      let icon, style;
      if (t.status === 'running') { icon = '&#9679;'; style = 'color:#4ade80'; }
      else if (t.status === 'completed' || t.status === 'done') { icon = '&#10003;'; style = 'color:var(--color-text-muted)'; }
      else if (t.status === 'error' || t.status === 'failed') { icon = '&#10007;'; style = 'color:#f87171'; }
      else { icon = '&#9679;'; style = 'color:var(--color-text-muted)'; }
      return `<div class="ap-task">
        <span class="ap-task-icon" style="${style}">${icon}</span>
        <span class="ap-task-text">${esc((t.prompt || t.name || '').slice(0, 60))}</span>
        <span class="ap-task-agent">${apAbbrev(t.agent || 'main')}</span>
      </div>`;
    }).join('');
  }

  // Services
  const sb = document.getElementById('ap-services-body');
  const svc = actPanel.services;
  if (!svc.server) {
    sb.innerHTML = '<div style="padding:4px 16px;font-size:11px;color:var(--color-text-muted)">Loading...</div>';
  } else {
    const rows = [];
    rows.push(`<div class="ap-svc"><span class="ap-svc-name">Server</span><span class="ap-svc-dot svc-up"></span><span class="ap-svc-info">${svc.server.sessions||0} sess</span></div>`);
    rows.push(`<div class="ap-svc"><span class="ap-svc-name">QMD</span><span class="ap-svc-dot ${svc.qmd?.status==='running'?'svc-up':'svc-down'}"></span><span class="ap-svc-info">${svc.qmd?.status==='running'?(svc.qmd.collections?.length||0)+' coll':'stopped'}</span></div>`);
    rows.push(`<div class="ap-svc"><span class="ap-svc-name">Telegram</span><span class="ap-svc-dot ${svc.telegram?.status==='running'?'svc-up':'svc-down'}"></span><span class="ap-svc-info">${svc.telegram?.status==='running'?(svc.telegram.bot||'active'):'stopped'}</span></div>`);
    sb.innerHTML = rows.join('');
  }

  // Log
  const la = document.getElementById('ap-log-area');
  const wasBottom = la.scrollHeight - la.scrollTop - la.clientHeight < 30;
  document.getElementById('ap-log-count').textContent = actPanel.log.length;
  document.getElementById('ap-log-count2').textContent = actPanel.log.length;
  const colors = { chat: '#22d3ee', delegate: '#4ade80', schedule: '#fbbf24', success: '#4ade80', error: '#f87171', info: 'var(--color-text-muted)' };
  la.innerHTML = actPanel.log.map(e => {
    return `<div class="ap-log-entry ap-${e.type}">
      <span class="ap-log-time">${e.time}</span>
      <span class="ap-log-badge" style="color:${colors[e.type]||colors.info}">${apAbbrev(e.agent)}</span>
      <span class="ap-log-msg">${esc(e.msg)}</span>
    </div>`;
  }).join('');
  if (wasBottom) la.scrollTop = la.scrollHeight;
}

async function apPollFast() {
  const [tasksRes, runningRes] = await Promise.all([
    API.get('/v1/tasks').catch(() => null),
    API.get('/v1/schedule/running').catch(() => null),
  ]);
  // Activity diff uses state.agentActivity which is already polled by the main loop
  const curAct = state.agentActivity || {};
  apDiffActivity(actPanel.prevActivity, curAct);
  actPanel.prevActivity = JSON.parse(JSON.stringify(curAct));

  if (tasksRes) {
    const tasks = tasksRes.tasks || [];
    apDiffTasks(actPanel.prevTasks, tasks);
    actPanel.prevTasks = actPanel.tasks;
    actPanel.tasks = tasks;
  }
  if (runningRes) {
    actPanel.running = runningRes.running || [];
    apDiffRunning(actPanel.running);
  }
  apRender();
}

async function apPollSlow() {
  const svcRes = await API.get('/v1/services').catch(() => null);
  if (svcRes) {
    apDiffServices(actPanel.services, svcRes);
    actPanel.prevServices = actPanel.services;
    actPanel.services = svcRes;
  }
  apRender();
}

function apToggle() {
  actPanel.open = !actPanel.open;
  document.getElementById('activity-panel').classList.toggle('open', actPanel.open);
  document.getElementById('btn-activity-toggle').classList.toggle('active', actPanel.open);
  if (actPanel.open) {
    apAddLog('SYS', 'Activity panel opened', 'info');
    apPollFast();
    apPollSlow();
    if (!actPanel.pollTimer) {
      actPanel.pollTimer = setInterval(apPollFast, 3000);
      actPanel.pollSlowTimer = setInterval(apPollSlow, 10000);
    }
  } else {
    if (actPanel.pollTimer) { clearInterval(actPanel.pollTimer); actPanel.pollTimer = null; }
    if (actPanel.pollSlowTimer) { clearInterval(actPanel.pollSlowTimer); actPanel.pollSlowTimer = null; }
  }
}

document.getElementById('btn-activity-toggle').onclick = apToggle;
document.getElementById('ap-close').onclick = apToggle;

// ─── Multimodal: Image Attach ─────────────────────────────────
let _pendingImages = []; // [{data: base64, media_type: string, name: string}]

function handleImageFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (_pendingImages.length >= 5) { showToast('Max 5 images per message'); break; }
    const reader = new FileReader();
    reader.onload = () => {
      const b64 = reader.result.split(',')[1];
      _pendingImages.push({ data: b64, media_type: file.type, name: file.name, size: file.size });
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  }
}

function renderImagePreviews() {
  const area = document.getElementById('image-preview-area');
  if (!area) return;
  if (_pendingImages.length === 0) { area.style.display = 'none'; area.innerHTML = ''; return; }
  area.style.display = 'flex';
  area.innerHTML = _pendingImages.map((img, i) => `
    <div style="position:relative;border:1px solid var(--color-border);border-radius:8px;padding:4px;display:inline-flex;align-items:center;gap:6px;background:var(--color-surface)">
      <img src="data:${img.media_type};base64,${img.data}" style="height:48px;max-width:80px;border-radius:4px;object-fit:cover">
      <div style="font-size:10px;color:var(--color-text-muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(img.name)}<br>${(img.size/1024).toFixed(0)} KB</div>
      <button onclick="_pendingImages.splice(${i},1);renderImagePreviews()" style="position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--color-error);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">&times;</button>
    </div>
  `).join('');
}

// Drag and drop
(function() {
  const inputArea = document.getElementById('chat-input-area');
  if (!inputArea) return;
  inputArea.addEventListener('dragover', (e) => { e.preventDefault(); inputArea.style.outline = '2px dashed var(--color-accent)'; });
  inputArea.addEventListener('dragleave', () => { inputArea.style.outline = ''; });
  inputArea.addEventListener('drop', (e) => {
    e.preventDefault(); inputArea.style.outline = '';
    if (e.dataTransfer.files.length) handleImageFiles(e.dataTransfer.files);
  });
  // Paste images
  document.getElementById('chat-input')?.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) handleImageFiles([file]);
        break;
      }
    }
  });
})();

        <p><strong>1. Fresh Tail</strong> — The most recent messages are always kept in full. No compression.</p>
        <p><strong>2. Leaf Summaries</strong> — When context exceeds the threshold, older messages are grouped and summarized into depth-0 summaries (~1000 tokens each).</p>
        <p><strong>3. Condensation</strong> — When enough same-depth summaries accumulate, they are merged into higher-depth summaries, forming a DAG.</p>
        <p><strong>4. Drill-back Tools</strong> — Agents can use <code>context_search</code>, <code>context_detail</code>, and <code>context_recall</code> to access original message details from any summary.</p>
        <p><strong>5. Lossless</strong> — Every original message is preserved in the database. Nothing is ever deleted.</p>
      </div>
    </div>`;
}

window.nodeToggleTool = async function(name, tool, enabled) {
  try {
    const res = await API.get('/v1/nodes');
    const node = (res.nodes || []).find(n => n.name === name);
    if (!node) return;
    let tools = [...(node.allowed_tools || [])];
    if (enabled && !tools.includes(tool)) tools.push(tool);
    if (!enabled) tools = tools.filter(t => t !== tool);
    await API.post('/v1/nodes', {action:'update', name, allowed_tools: tools});
    showToast('Tools updated');
  } catch(e) { showToast(e.message, 'error'); }
};

    await checkConnection();
  }, 30000);
  // Poll agent activity every 3 seconds for live status
  setInterval(async () => {
    try {
      const res = await API.get('/v1/agents/activity');
      const prev = JSON.stringify(state.agentActivity);
      state.agentActivity = res.activity || {};
      // Also mark streaming chats as active
      for (const [aid, chat] of Object.entries(state.agentChats)) {
        if (chat.streaming && !state.agentActivity[aid]) {
          state.agentActivity[aid] = ['chat'];
        } else if (chat.streaming && state.agentActivity[aid] && !state.agentActivity[aid].includes('chat')) {
          state.agentActivity[aid].unshift('chat');
        }
      }
      if (JSON.stringify(state.agentActivity) !== prev) {
        updateAgentActivityVisuals();
      }
    } catch {}
  }, 3000);
})();

// ─── KNOWLEDGE MAP ─────────────────────────────────────────
const KG_COLORS = {
  general:   { light: '#ff7b00', dark: '#ff9b40' },
  user:      { light: '#4ade80', dark: '#4ade80' },
  project:   { light: '#f59e0b', dark: '#fbbf24' },
  feedback:  { light: '#ec4899', dark: '#f472b6' },
  ingested:  { light: '#8b5cf6', dark: '#a78bfa' },
  reference: { light: '#06b6d4', dark: '#22d3ee' },
  note:      { light: '#06b6d4', dark: '#22d3ee' },
  chat_transcript: { light: '#78716c', dark: '#a8a29e' },
};

const KG_EDGE_COLORS = {
  next_chunk: { color: '#888', dash: [], width: 1 },
  prev_chunk: { color: '#888', dash: [], width: 1 },
  same_source: { color: '#888', dash: [4, 4], width: 1 },
  references: { color: null, dash: [], width: 1.5 },  // null = use accent
  same_topic: { color: null, dash: [6, 3], width: 1.2 },  // dashed accent (entity-based)
  depends_on: { color: '#f59e0b', dash: [], width: 1.5 },  // solid orange
  contradicts: { color: '#ef4444', dash: [], width: 1.5 },  // solid red
  extends: { color: '#22c55e', dash: [], width: 1.5 },  // solid green
  co_recalled: { color: '#a855f7', dash: [2, 3], width: 1.2 },  // dotted purple
  same_folder: { color: '#06b6d4', dash: [4, 4], width: 1 },  // dashed teal
};

let kgInstance = null;

class KnowledgeGraph {
  constructor(canvas, data) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.allNodes = data.nodes.map(n => ({
      ...n,
      x: (Math.random() - 0.5) * 600,
      y: (Math.random() - 0.5) * 400,
      vx: 0, vy: 0,
      radius: Math.max(8, Math.min(30, 8 + Math.sqrt(n.size || 100) * 0.3)),
    }));
    this.allEdges = data.edges;
    this.nodes = [...this.allNodes];
    this.edges = [...this.allEdges];
    this.zoom = 1;
    this.panX = 0;
    this.panY = 0;
    this.selectedNode = null;
    this.hoveredNode = null;
    this.dragging = null;
    this.dragStart = null;
    this.isPanning = false;
    this.panStart = null;
    this.searchQuery = '';
    this.activeTypes = new Set(Object.keys(KG_COLORS));
    this._animFrame = null;
    this._resizeObs = null;
    this._boundMouseDown = this._onMouseDown.bind(this);
    this._boundMouseMove = this._onMouseMove.bind(this);
    this._boundMouseUp = this._onMouseUp.bind(this);
    this._boundWheel = this._onWheel.bind(this);
    this._setupEvents();
    this._resize();
    this._setupResizeObserver();
  }

  _setupEvents() {
    this.canvas.addEventListener('mousedown', this._boundMouseDown);
    this.canvas.addEventListener('mousemove', this._boundMouseMove);
    this.canvas.addEventListener('mouseup', this._boundMouseUp);
    this.canvas.addEventListener('mouseleave', this._boundMouseUp);
    this.canvas.addEventListener('wheel', this._boundWheel, { passive: false });
    // Touch support
    this.canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      this._onMouseDown({ clientX: t.clientX, clientY: t.clientY, button: 0, preventDefault: ()=>{} });
    }, { passive: false });
    this.canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      this._onMouseMove({ clientX: t.clientX, clientY: t.clientY });
    }, { passive: false });
    this.canvas.addEventListener('touchend', (e) => {
      this._onMouseUp({});
    });
  }

  _setupResizeObserver() {
    this._resizeObs = new ResizeObserver(() => { this._resize(); this.render(); });
    this._resizeObs.observe(this.canvas.parentElement);
  }

  _resize() {
    const wrap = this.canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    this.canvas.width = wrap.clientWidth * dpr;
    this.canvas.height = wrap.clientHeight * dpr;
    this.canvas.style.width = wrap.clientWidth + 'px';
    this.canvas.style.height = wrap.clientHeight + 'px';
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.W = wrap.clientWidth;
    this.H = wrap.clientHeight;
  }

  destroy() {
    if (this._animFrame) cancelAnimationFrame(this._animFrame);
    if (this._resizeObs) this._resizeObs.disconnect();
    this.canvas.removeEventListener('mousedown', this._boundMouseDown);
    this.canvas.removeEventListener('mousemove', this._boundMouseMove);
    this.canvas.removeEventListener('mouseup', this._boundMouseUp);
    this.canvas.removeEventListener('mouseleave', this._boundMouseUp);
    this.canvas.removeEventListener('wheel', this._boundWheel);
  }

  layout(iterations = 300) {
    const nodes = this.nodes;
    const edges = this.edges;
    if (nodes.length === 0) return;

    // Build adjacency index
    const nodeIdx = {};
    nodes.forEach((n, i) => nodeIdx[n.id] = i);

    for (let iter = 0; iter < iterations; iter++) {
      const damping = 0.9 - (iter / iterations) * 0.4;

      // Repulsion between all nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          let dx = nodes[j].x - nodes[i].x;
          let dy = nodes[j].y - nodes[i].y;
          let dist = Math.sqrt(dx * dx + dy * dy) || 1;
          let force = 5000 / (dist * dist);
          let fx = (dx / dist) * force;
          let fy = (dy / dist) * force;
          nodes[i].vx -= fx;
          nodes[i].vy -= fy;
          nodes[j].vx += fx;
          nodes[j].vy += fy;
        }
      }

      // Attraction between connected nodes
      for (const e of edges) {
        const ai = nodeIdx[e.from];
        const bi = nodeIdx[e.to];
        if (ai === undefined || bi === undefined) continue;
        let dx = nodes[bi].x - nodes[ai].x;
        let dy = nodes[bi].y - nodes[ai].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        // Stronger spring for chunk sequences
        let k = e.type === 'next_chunk' || e.type === 'prev_chunk' ? 0.03 : 0.01;
        let force = dist * k;
        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        nodes[ai].vx += fx;
        nodes[ai].vy += fy;
        nodes[bi].vx -= fx;
        nodes[bi].vy -= fy;
      }

      // Gravity toward center
      for (const n of nodes) {
        n.vx -= n.x * 0.02;
        n.vy -= n.y * 0.02;
      }

      // Apply velocity with damping
      for (const n of nodes) {
        n.vx *= damping;
        n.vy *= damping;
        n.x += n.vx;
        n.y += n.vy;
      }
    }
  }

  applyFilter() {
    const q = this.searchQuery.toLowerCase();
    this.nodes = this.allNodes.filter(n => {
      if (!this.activeTypes.has(n.type || 'general')) return false;
      if (q && !n.name.toLowerCase().includes(q) && !n.id.toLowerCase().includes(q) && !(n.description||'').toLowerCase().includes(q) && !(n.snippet||'').toLowerCase().includes(q)) return false;
      return true;
    });
    const nodeIds = new Set(this.nodes.map(n => n.id));
    this.edges = this.allEdges.filter(e => nodeIds.has(e.from) && nodeIds.has(e.to));
    this._updateStatus();
    this.render();
  }

  _getTheme() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  }

  _getAccentColor() {
    return getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim() || '#ff7b00';
  }

  _nodeColor(node) {
    const theme = this._getTheme();
    const colors = KG_COLORS[node.type] || KG_COLORS.general;
    return colors[theme] || colors.light;
  }

  _screenToWorld(sx, sy) {
    return {
      x: (sx - this.W / 2 - this.panX) / this.zoom,
      y: (sy - this.H / 2 - this.panY) / this.zoom,
    };
  }

  _worldToScreen(wx, wy) {
    return {
      x: wx * this.zoom + this.W / 2 + this.panX,
      y: wy * this.zoom + this.H / 2 + this.panY,
    };
  }

  hitTest(sx, sy) {
    const { x, y } = this._screenToWorld(sx, sy);
    for (let i = this.nodes.length - 1; i >= 0; i--) {
      const n = this.nodes[i];
      const dx = n.x - x, dy = n.y - y;
      const r = n.radius / this.zoom;
      if (dx * dx + dy * dy <= r * r * 1.5) return n;
    }
    return null;
  }

  _onMouseDown(e) {
    const rect = this.canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    const node = this.hitTest(sx, sy);
    if (node) {
      this.dragging = node;
      this.dragStart = { x: sx, y: sy, ox: node.x, oy: node.y, moved: false };
    } else {
      this.isPanning = true;
      this.panStart = { x: sx, y: sy, px: this.panX, py: this.panY };
    }
    e.preventDefault?.();
  }

  _onMouseMove(e) {
    const rect = this.canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;

    if (this.dragging && this.dragStart) {
      const dx = (sx - this.dragStart.x) / this.zoom;
      const dy = (sy - this.dragStart.y) / this.zoom;
      this.dragging.x = this.dragStart.ox + dx;
      this.dragging.y = this.dragStart.oy + dy;
      if (Math.abs(sx - this.dragStart.x) + Math.abs(sy - this.dragStart.y) > 5) {
        this.dragStart.moved = true;
      }
      this.render();
      return;
    }

    if (this.isPanning && this.panStart) {
      this.panX = this.panStart.px + (sx - this.panStart.x);
      this.panY = this.panStart.py + (sy - this.panStart.y);
      this.render();
      this._updateStatus();
      return;
    }

    // Hover
    const node = this.hitTest(sx, sy);
    if (node !== this.hoveredNode) {
      this.hoveredNode = node;
      this.canvas.style.cursor = node ? 'pointer' : 'grab';
      this._updateTooltip(node, e.clientX, e.clientY);
      this.render();
    }
  }

  _onMouseUp(e) {
    if (this.dragging && this.dragStart && !this.dragStart.moved) {
      // Click on node
      this.selectedNode = this.dragging;
      this._showDetail(this.dragging);
      this.render();
    }
    this.dragging = null;
    this.dragStart = null;
    this.isPanning = false;
    this.panStart = null;
  }

  _onWheel(e) {
    e.preventDefault();
    const rect = this.canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
    const { x: wx, y: wy } = this._screenToWorld(sx, sy);

    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const newZoom = Math.max(0.1, Math.min(10, this.zoom * factor));

    // Adjust pan to zoom toward cursor
    this.panX = sx - this.W / 2 - wx * newZoom;
    this.panY = sy - this.H / 2 - wy * newZoom;
    this.zoom = newZoom;

    this._updateStatus();
    this.render();
  }

  _updateTooltip(node, cx, cy) {
    const tip = document.getElementById('kg-tooltip');
    if (!node) {
      tip.classList.remove('visible');
      return;
    }
    const dateStr = node.modified ? new Date(node.modified * 1000).toLocaleString() : 'unknown';
    const sizeStr = node.size > 1024 ? (node.size / 1024).toFixed(1) + ' KB' : node.size + ' B';
    let html = `<div style="font-weight:600;margin-bottom:4px">${esc(node.name)}</div>`;
    html += `<div style="color:var(--color-text-muted);font-size:10px">`;
    html += `Type: ${node.type} &middot; Size: ${sizeStr}<br>`;
    html += `Source: ${esc(node.source || 'agent')}<br>`;
    html += `Modified: ${dateStr}`;
    if (node.chunk_index !== null && node.chunk_index !== undefined) {
      html += `<br>Chunk: ${node.chunk_index + 1}/${node.total_chunks || '?'}`;
    }
    html += '</div>';
    tip.innerHTML = html;
    tip.classList.add('visible');
    // Position near cursor
    const wrap = document.getElementById('kg-canvas-wrap');
    const wr = wrap.getBoundingClientRect();
    let tx = cx - wr.left + 15, ty = cy - wr.top + 15;
    if (tx + 300 > wr.width) tx = cx - wr.left - 310;
    if (ty + 100 > wr.height) ty = cy - wr.top - 110;
    tip.style.left = Math.max(0, tx) + 'px';
    tip.style.top = Math.max(0, ty) + 'px';
  }

  _showDetail(node) {
    const detail = document.getElementById('kg-detail');
    if (!node) {
      detail.classList.remove('visible');
      return;
    }
    const dateStr = node.modified ? new Date(node.modified * 1000).toLocaleString() : 'unknown';
    const sizeStr = node.size > 1024 ? (node.size / 1024).toFixed(1) + ' KB' : node.size + ' B';

    // Find connections
    const connections = [];
    for (const e of this.edges) {
      if (e.from === node.id) connections.push({ id: e.to, type: e.type, dir: 'out' });
      if (e.to === node.id) connections.push({ id: e.from, type: e.type, dir: 'in' });
    }

    let connHtml = '';
    if (connections.length > 0) {
      const nameMap = {};
      this.nodes.forEach(n => nameMap[n.id] = n.name);
      connHtml = '<div class="kg-connections"><div style="font-weight:600;margin-bottom:4px;color:var(--color-text-primary)">Connections (' + connections.length + ')</div>';
      for (const c of connections) {
        const arrow = c.dir === 'out' ? '&rarr;' : '&larr;';
        connHtml += `<div onclick="kgSelectNodeById('${esc(c.id)}')">${arrow} ${esc(nameMap[c.id] || c.id)} <span style="color:var(--color-text-muted)">(${c.type})</span></div>`;
      }
      connHtml += '</div>';
    }

    detail.innerHTML = `
      <button onclick="document.getElementById('kg-detail').classList.remove('visible')" style="float:right;background:none;border:none;color:var(--color-text-muted);cursor:pointer;font-size:16px">&times;</button>
      <h3>${esc(node.name)}</h3>
      <div class="kg-meta">
        <div>Type: <strong>${node.type}</strong></div>
        <div>File: ${esc(node.id)}</div>
        <div>Source: ${esc(node.source || 'agent')}</div>
        <div>Size: ${sizeStr}</div>
        <div>Modified: ${dateStr}</div>
        ${node.chunk_index !== null && node.chunk_index !== undefined ? `<div>Chunk: ${node.chunk_index + 1} / ${node.total_chunks || '?'}</div>` : ''}
      </div>
      <div id="kg-detail-preview" class="kg-preview" style="color:var(--color-text-muted);font-style:italic">Loading preview...</div>
      ${connHtml}
    `;
    detail.classList.add('visible');

    // Load file content for preview
    this._loadPreview(node);
  }

  async _loadPreview(node) {
    const previewEl = document.getElementById('kg-detail-preview');
    if (!previewEl) return;
    try {
      const agent = document.getElementById('kg-agent-select').value;
      const data = await API.get(`/v1/services/qmd/docs?collection=${encodeURIComponent(agent)}&file=${encodeURIComponent(node.id)}`);
      if (data.content) {
        // Strip frontmatter
        let content = data.content;
        const fmMatch = content.match(/^---\s*\n[\s\S]*?\n---\s*\n/);
        if (fmMatch) content = content.slice(fmMatch[0].length);
        previewEl.textContent = content.slice(0, 500) + (content.length > 500 ? '...' : '');
        previewEl.style.color = '';
        previewEl.style.fontStyle = '';
      } else {
        previewEl.textContent = '(empty)';
      }
    } catch {
      previewEl.textContent = '(could not load preview)';
    }
  }

  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.W, this.H);

    if (this.nodes.length === 0) {
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-text-muted').trim() || '#999';
      ctx.font = '14px "IBM Plex Sans", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No memories yet', this.W / 2, this.H / 2);
      return;
    }

    ctx.save();
    ctx.translate(this.W / 2 + this.panX, this.H / 2 + this.panY);
    ctx.scale(this.zoom, this.zoom);

    const accent = this._getAccentColor();
    const nodeIdx = {};
    this.nodes.forEach(n => nodeIdx[n.id] = n);

    // Draw edges
    for (const e of this.edges) {
      const a = nodeIdx[e.from], b = nodeIdx[e.to];
      if (!a || !b) continue;
      const style = KG_EDGE_COLORS[e.type] || KG_EDGE_COLORS.references;
      ctx.strokeStyle = style.color || accent;
      ctx.lineWidth = style.width / this.zoom;
      ctx.setLineDash(style.dash.map(d => d / this.zoom));
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();

      // Draw arrowhead
      if (e.type !== 'same_source') {
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const ux = dx / dist, uy = dy / dist;
        const arrowSize = 5 / this.zoom;
        const tipX = b.x - ux * (b.radius / this.zoom);
        const tipY = b.y - uy * (b.radius / this.zoom);
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX - ux * arrowSize - uy * arrowSize * 0.5, tipY - uy * arrowSize + ux * arrowSize * 0.5);
        ctx.lineTo(tipX - ux * arrowSize + uy * arrowSize * 0.5, tipY - uy * arrowSize - ux * arrowSize * 0.5);
        ctx.closePath();
        ctx.fillStyle = style.color || accent;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    ctx.setLineDash([]);

    // Draw nodes
    const searchQ = this.searchQuery.toLowerCase();
    for (const n of this.nodes) {
      const r = n.radius / this.zoom;
      const color = this._nodeColor(n);
      const isSelected = n === this.selectedNode;
      const isHovered = n === this.hoveredNode;
      const isSearchMatch = searchQ && (n.name.toLowerCase().includes(searchQ) || n.id.toLowerCase().includes(searchQ));

      // Glow for selected/hovered
      if (isSelected || isHovered) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 4 / this.zoom, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.2;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Search highlight ring
      if (isSearchMatch) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, r + 3 / this.zoom, 0, Math.PI * 2);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2 / this.zoom;
        ctx.stroke();
      }

      // Node circle
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.globalAlpha = (searchQ && !isSearchMatch) ? 0.2 : 0.85;
      ctx.fill();
      ctx.globalAlpha = 1;

      // Border
      ctx.strokeStyle = isSelected ? '#fff' : color;
      ctx.lineWidth = (isSelected ? 2 : 1) / this.zoom;
      ctx.stroke();

      // Label
      if (this.zoom > 0.3) {
        const label = n.name.length > 22 ? n.name.slice(0, 20) + '..' : n.name;
        const fontSize = Math.max(8, Math.min(11, 10 / this.zoom));
        ctx.font = `${fontSize}px "IBM Plex Sans", sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-text-secondary').trim() || '#888';
        ctx.globalAlpha = (searchQ && !isSearchMatch) ? 0.15 : 0.8;
        ctx.fillText(label, n.x, n.y + r + fontSize + 2 / this.zoom);
        ctx.globalAlpha = 1;
      }
    }

    ctx.restore();
  }

  fitToScreen() {
    if (this.nodes.length === 0) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const n of this.nodes) {
      minX = Math.min(minX, n.x - n.radius);
      maxX = Math.max(maxX, n.x + n.radius);
      minY = Math.min(minY, n.y - n.radius);
      maxY = Math.max(maxY, n.y + n.radius);
    }
    const padding = 80;
    const gw = maxX - minX + padding * 2;
    const gh = maxY - minY + padding * 2;
    this.zoom = Math.min(this.W / gw, this.H / gh, 2);
    this.panX = -(minX + maxX) / 2 * this.zoom;
    this.panY = -(minY + maxY) / 2 * this.zoom;
    this._updateStatus();
    this.render();
  }

  _updateStatus() {
    const sources = new Set(this.nodes.filter(n => n.type === 'ingested' && n.source && n.source !== 'agent').map(n => n.source));
    const autoTypes = new Set(['same_topic', 'co_recalled', 'depends_on', 'contradicts', 'extends']);
    const autoCount = this.edges.filter(e => autoTypes.has(e.type)).length;
    document.getElementById('kg-stat-nodes').textContent = `Nodes: ${this.nodes.length}`;
    document.getElementById('kg-stat-edges').textContent = `Edges: ${this.edges.length}`;
    document.getElementById('kg-stat-auto').textContent = `Auto: ${autoCount}`;
    document.getElementById('kg-stat-sources').textContent = `Sources: ${sources.size}`;
    document.getElementById('kg-stat-zoom').textContent = `Zoom: ${Math.round(this.zoom * 100)}%`;
  }
}

function kgSelectNodeById(id) {
  if (!kgInstance) return;
  const node = kgInstance.nodes.find(n => n.id === id);
  if (node) {
    kgInstance.selectedNode = node;
    kgInstance._showDetail(node);
    // Pan to node
    const s = kgInstance._worldToScreen(node.x, node.y);
    kgInstance.panX += kgInstance.W / 2 - s.x;
    kgInstance.panY += kgInstance.H / 2 - s.y;
    kgInstance.render();
    kgInstance._updateStatus();
  }
}

function kgFitToScreen() {
  if (kgInstance) kgInstance.fitToScreen();
}

function kgResetLayout() {
  if (!kgInstance) return;
  // Re-randomize positions
  kgInstance.nodes.forEach(n => {
    n.x = (Math.random() - 0.5) * 600;
    n.y = (Math.random() - 0.5) * 400;
    n.vx = 0;
    n.vy = 0;
  });
  kgInstance.layout(300);
  kgInstance.fitToScreen();
}

async function openKnowledgeMap(agentId) {
  const overlay = document.getElementById('knowledge-map-overlay');
  overlay.classList.add('visible');

  // Populate agent selector
  const agentSelect = document.getElementById('kg-agent-select');
  agentSelect.innerHTML = '';
  for (const a of (state.agents || [])) {
    const name = getAgentName(a);
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === (agentId || state.activeAgentId)) opt.selected = true;
    agentSelect.appendChild(opt);
  }

  agentSelect.onchange = () => _kgLoadAgent(agentSelect.value);

  // Setup search
  const searchInput = document.getElementById('kg-search');
  searchInput.value = '';
  searchInput.oninput = () => {
    if (kgInstance) {
      kgInstance.searchQuery = searchInput.value;
      kgInstance.applyFilter();
    }
  };

  // Escape key to close
  overlay._keyHandler = (e) => {
    if (e.key === 'Escape') closeKnowledgeMap();
  };
  document.addEventListener('keydown', overlay._keyHandler);

  await _kgLoadAgent(agentSelect.value);
}

async function _kgLoadAgent(agentId) {
  const title = document.getElementById('kg-title');
  title.textContent = `Knowledge Map: ${agentId}`;

  // Destroy old instance
  if (kgInstance) { kgInstance.destroy(); kgInstance = null; }

  // Hide detail panel
  document.getElementById('kg-detail').classList.remove('visible');
  document.getElementById('kg-tooltip').classList.remove('visible');

  try {
    const data = await API.get(`/v1/agents/${encodeURIComponent(agentId)}/graph`);

    // Build type filter chips
    const typeSet = new Set(data.nodes.map(n => n.type || 'general'));
    const filtersEl = document.getElementById('kg-type-filters');
    filtersEl.innerHTML = '';
    const allTypes = Object.keys(KG_COLORS);
    for (const t of allTypes) {
      if (!typeSet.has(t)) continue;
      const chip = document.createElement('span');
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      const color = KG_COLORS[t][theme];
      chip.className = 'kg-filter-chip active';
      chip.dataset.type = t;
      chip.innerHTML = `<span class="kg-dot" style="background:${color}"></span>${t}`;
      chip.onclick = () => {
        chip.classList.toggle('active');
        if (kgInstance) {
          if (chip.classList.contains('active')) {
            kgInstance.activeTypes.add(t);
          } else {
            kgInstance.activeTypes.delete(t);
          }
          kgInstance.applyFilter();
        }
      };
      filtersEl.appendChild(chip);
    }

    // Create graph
    const canvas = document.getElementById('kg-canvas');
    kgInstance = new KnowledgeGraph(canvas, data);
    kgInstance.layout(300);
    kgInstance.fitToScreen();
    kgInstance._updateStatus();

    // Wire up search input
    const searchInput = document.getElementById('kg-search');
    if (searchInput) {
      searchInput.value = '';
      searchInput.oninput = () => {
        kgInstance.searchQuery = searchInput.value;
        kgInstance.applyFilter();
      };
    }
  } catch (err) {
    console.error('Knowledge map error:', err);
    const canvas = document.getElementById('kg-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-text-muted').trim() || '#999';
    ctx.font = '14px "IBM Plex Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Error loading graph: ' + err.message, canvas.width / 4, canvas.height / 4);
    document.getElementById('kg-stat-nodes').textContent = 'Nodes: 0';
    document.getElementById('kg-stat-edges').textContent = 'Edges: 0';
    document.getElementById('kg-stat-sources').textContent = 'Sources: 0';
    document.getElementById('kg-stat-zoom').textContent = 'Zoom: 100%';
  }
}

async function kgDiscoverRelationships() {
  const agentSelect = document.getElementById('kg-agent-select');
  const agentId = agentSelect ? agentSelect.value : state.activeAgentId;
  const btn = document.getElementById('kg-discover-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Discovering...'; }
  showToast('Discovering relationships... this may take a minute');
  try {
    await API.post(`/v1/agents/${encodeURIComponent(agentId)}/graph/discover`, {});
    // Poll for completion by refreshing graph after a delay
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      try {
        await _kgLoadAgent(agentId);
        if (attempts >= 6) {
          clearInterval(poll);
          if (btn) { btn.disabled = false; btn.textContent = 'Discover Relationships'; }
          showToast('Relationship discovery complete');
        }
      } catch { /* ignore poll errors */ }
    }, 10000);
    // Stop polling after 60s regardless
    setTimeout(() => {
      clearInterval(poll);
      if (btn) { btn.disabled = false; btn.textContent = 'Discover Relationships'; }
    }, 60000);
  } catch (err) {
    showToast('Discovery failed: ' + err.message, true);
    if (btn) { btn.disabled = false; btn.textContent = 'Discover Relationships'; }
  }
}

function closeKnowledgeMap() {
  const overlay = document.getElementById('knowledge-map-overlay');
  overlay.classList.remove('visible');
  if (overlay._keyHandler) {
    document.removeEventListener('keydown', overlay._keyHandler);
    overlay._keyHandler = null;
  }
  if (kgInstance) { kgInstance.destroy(); kgInstance = null; }
  document.getElementById('kg-detail').classList.remove('visible');
  document.getElementById('kg-tooltip').classList.remove('visible');
}
</script>
