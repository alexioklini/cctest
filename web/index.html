function renderSessionBar() {
  const agentId = state.activeAgentId;
  // Keep the old session bar hidden — sessions are now in sidebar
  dom.sessionBar.style.display = 'none';
  const container = dom.sidebarSessions;
  if (!agentId) { container.innerHTML = ''; renderProjectSelector(); return; }
  const entry = state.agentSessions[agentId];
  if (!entry) { container.innerHTML = ''; renderProjectSelector(); return; }
  const chat = state.agentChats[agentId];
  const currentSessionId = chat?.sessionId;
  const allSessions = entry.sessions || [];
  const sectionsCollapsed = JSON.parse(localStorage.getItem('sb-sections-collapsed') || '{}');
  const archivedSections = JSON.parse(localStorage.getItem('sb-archived-collapsed') || '{"projects":true,"chats":true}');

  // Only show general (non-project) sessions in left sidebar
  const generalActive = [];
  const generalArchived = [];
  allSessions.forEach(s => {
    const proj = s.project || '';
    if (!proj) {
      if (s.status === 'archived') {
        generalArchived.push(s);
      } else {
        generalActive.push(s);
      }
    }
  });

  let html = '';

  // ─── Chats Section (general / non-project only) ─────────────────────────────
  const chatsCollapsed = !!sectionsCollapsed['chats'];
  html += `<div class="sb-section${chatsCollapsed ? ' collapsed' : ''}" data-section="chats">`;
  html += `<div class="sb-section-header" onclick="toggleSidebarSection('chats')">`;
  html += `<span class="sb-section-left"><span class="sb-section-chevron">&#9660;</span> Chats</span>`;
  html += `<button class="sb-section-add" onclick="event.stopPropagation();newChatSession()" title="New Chat">+</button>`;
  html += `</div>`;
  html += `<div class="sb-section-content">`;

  // Search input with debounced deep search
  const searchVal = state._chatSearchQuery || '';
  html += `<div style="padding:2px 8px 6px">
    <input type="text" class="sb-chat-search" placeholder="Search chats..." value="${esc(searchVal)}"
      oninput="
        state._chatSearchQuery=this.value;
        state._chatSearchResults=null;
        clearTimeout(state._chatSearchTimer);
        state._chatSearchLoading=this.value.length>=2;
        renderSessionBar();
        const _si=document.querySelector('.sb-chat-search');
        if(_si){_si.focus();_si.selectionStart=_si.selectionEnd=_si.value.length}
        if(this.value.length>=2){
          state._chatSearchTimer=setTimeout(async()=>{
            try{
              const res=await API.get('/v1/sessions/search?q='+encodeURIComponent(state._chatSearchQuery)+'&agent='+encodeURIComponent(state.activeAgentId));
              state._chatSearchResults=res.results||[];
            }catch(e){state._chatSearchResults=null;}
            state._chatSearchLoading=false;
            renderSessionBar();
            const _si2=document.querySelector('.sb-chat-search');
            if(_si2){_si2.focus();_si2.selectionStart=_si2.selectionEnd=_si2.value.length}
          },500);
        }
      "
      onclick="event.stopPropagation()"
      style="width:100%;padding:4px 8px;border-radius:6px;border:1px solid var(--color-border);background:var(--color-surface-light);color:var(--color-text-primary);font-size:11px;outline:none;font-family:'IBM Plex Mono',monospace">
  </div>`;

  // Filter sessions by search query — use deep search results if available
  const chatQuery = (state._chatSearchQuery || '').toLowerCase();
  let filteredActive;
  let deepSearchSessions = [];
  if (chatQuery && state._chatSearchResults) {
    // Merge: deep search results mapped to session format, plus local matches
    const deepIds = new Set(state._chatSearchResults.map(r => r.id));
    const localMatches = generalActive.filter(s => (s.title || '').toLowerCase().includes(chatQuery) || (s.summary || '').toLowerCase().includes(chatQuery));
    // Start with local matches, then add deep results not already in local
    const localIds = new Set(localMatches.map(s => s.id));
    filteredActive = [...localMatches];
    for (const r of state._chatSearchResults) {
      if (!localIds.has(r.id)) {
        deepSearchSessions.push(r);
      }
    }
  } else if (chatQuery) {
    filteredActive = generalActive.filter(s => (s.title || '').toLowerCase().includes(chatQuery) || (s.summary || '').toLowerCase().includes(chatQuery));
  } else {
    filteredActive = generalActive;
  }

  // Current unsaved session (general / no project)
  if (!chatQuery && chat && !currentSessionId && chat.messages.length === 0 && !state.currentProject) {
    html += `<div class="sb-session-item active" style="font-style:italic"><span class="sb-sess-title" style="color:var(--color-text-muted)">New chat</span></div>`;
  }

  // General active sessions (no project)
  filteredActive.forEach(s => { html += renderSidebarSession(s, currentSessionId); });

  // Deep search results (sessions not in current list, e.g. archived or other)
  if (deepSearchSessions.length > 0) {
    html += `<div style="padding:4px 12px 2px;font-size:10px;color:var(--color-text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Content matches</div>`;
    deepSearchSessions.forEach(s => {
      const title = s.title || 'Untitled';
      const truncTitle = title.length > 30 ? title.substring(0, 30) + '\u2026' : title;
      const preview = s.match_preview ? (s.match_preview.length > 50 ? s.match_preview.substring(0, 50) + '\u2026' : s.match_preview) : '';
      const isArchived = s.status === 'archived';
      html += `<div class="sb-agent-item ${isArchived ? 'opacity-50' : ''}" onclick="loadSession('${esc(s.id)}')" title="${esc(title)}${preview ? '\n' + preview : ''}">
        <div class="sb-agent-avatar" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--color-accent)"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg>
        </div>
        <div class="sb-agent-info">
          <div class="sb-agent-name">${esc(truncTitle)} <span style="font-size:9px;color:var(--color-accent);font-weight:normal">\u2022 content</span></div>
          <div class="sb-agent-meta">${preview ? esc(preview) : (s.summary || '')}</div>
        </div>
      </div>`;
    });
  }

  // Searching indicator
  if (chatQuery && state._chatSearchLoading) {
    html += `<div style="padding:6px 12px;font-size:10px;color:var(--color-text-muted);font-style:italic">Searching transcripts\u2026</div>`;
  }

  if (chatQuery && filteredActive.length === 0 && deepSearchSessions.length === 0 && !state._chatSearchLoading) {
    html += `<div style="padding:8px 12px;font-size:11px;color:var(--color-text-muted);opacity:0.5">No matching chats</div>`;
  }

  // Archived general sessions (also filtered by search)
  const filteredArchived = chatQuery
    ? generalArchived.filter(s => (s.title || '').toLowerCase().includes(chatQuery) || (s.summary || '').toLowerCase().includes(chatQuery))
    : generalArchived;
  if (filteredArchived.length > 0) {
    const chatArchCollapsed = archivedSections['chats'] !== false && !chatQuery;
    html += `<div class="sb-archived-section${chatArchCollapsed ? ' collapsed' : ''}">`;
    html += `<div class="sb-archived-header" onclick="toggleArchivedSection('chats')"><span class="sb-section-chevron">&#9660;</span> Archived</div>`;
    html += `<div class="sb-archived-content">`;
    filteredArchived.forEach(s => { html += renderSidebarSession(s, currentSessionId); });
    html += `</div></div>`;
  }

  // Empty state for chats
  if (generalActive.length === 0 && generalArchived.length === 0 && !(chat && !currentSessionId && chat.messages.length === 0 && !state.currentProject)) {
    html += `<div style="padding:4px 12px;font-size:10px;color:var(--color-text-muted);font-style:italic">No chats yet</div>`;
  }

  html += `</div></div>`; // close sb-section-content + sb-section

  container.innerHTML = html;

  renderProjectSelector();
}

window.toggleProjectCollapse = function(projectName) {
  const stored = JSON.parse(localStorage.getItem('sb-collapsed-projects') || '{}');
  if (stored[projectName]) { delete stored[projectName]; } else { stored[projectName] = true; }
  localStorage.setItem('sb-collapsed-projects', JSON.stringify(stored));
  renderSessionBar();
};

window.toggleSidebarSection = function(section) {
  const stored = JSON.parse(localStorage.getItem('sb-sections-collapsed') || '{}');
  if (stored[section]) { delete stored[section]; } else { stored[section] = true; }
  localStorage.setItem('sb-sections-collapsed', JSON.stringify(stored));
  // Toggle CSS class directly — avoids re-rendering which would destroy lazy-loaded file lists
  const isCollapsed = !!stored[section];
  if (section === 'agents') {
    const el = document.getElementById('sb-agents-section');
    if (el) el.classList.toggle('collapsed', isCollapsed);
  } else {
    const el = document.querySelector(`.sb-section[data-section="${section}"]`);
    if (el) el.classList.toggle('collapsed', isCollapsed);
  }
};

window.toggleArchivedSection = function(key) {
  const stored = JSON.parse(localStorage.getItem('sb-archived-collapsed') || '{"projects":true,"chats":true}');
  if (stored[key] === false) { stored[key] = true; } else { stored[key] = false; }
  localStorage.setItem('sb-archived-collapsed', JSON.stringify(stored));
  // When expanding archived sections, ensure we have archived sessions loaded
  if (stored[key] === false) {
    const agentId = state.activeAgentId;
    if (agentId) {
      const entry = state.agentSessions[agentId];
      if (entry && !entry.showArchived) {
        entry.showArchived = true;
        entry.loaded = false;
        loadAgentSessions(agentId);
        return; // loadAgentSessions will re-render
      }
    }
  }
  renderSessionBar();
};

window.sidebarNewProject = function() {
  const agentId = state.activeAgentId;
  if (!agentId) return;
  // Open config modal on the projects tab to use existing create form
  if (typeof openConfigModal === 'function') {
    openConfigModal(agentId);
    setTimeout(() => { const tab = document.querySelector('#config-tabs [data-tab="projects"]'); if (tab) tab.click(); }, 100);
  }
};

window.sidebarOpenProjectSettings = function(agentId, projectName) {
  if (typeof openConfigModal === 'function') {
    openConfigModal(agentId);
    // After modal opens, navigate to projects tab then project detail
    setTimeout(() => {
      const tab = document.querySelector('#config-tabs [data-tab="projects"]');
      if (tab) tab.click();
      setTimeout(() => {
        if (typeof openProjectDetail === 'function') {
          openProjectDetail(agentId, projectName);
        }
      }, 200);
    }, 100);
  }
};

window.archiveProject = async function(agentId, projectName, action) {
  try {
    const newStatus = action === 'archive' ? 'archived' : 'active';
    await API.put(`/v1/agents/${encodeURIComponent(agentId)}/projects/${encodeURIComponent(projectName)}`, { status: newStatus });
    if (action === 'archive' && state.currentProject === projectName) {
      state.currentProject = null;
      closeProjectPanel();
    }
    showToast(`Project "${projectName}" ${action === 'archive' ? 'archived' : 'unarchived'}`);
    await loadAgentProjects(agentId);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.newProjectChat = function(projectName) {
  closeMobileSidebar();
  const agentId = state.activeAgentId;
  if (!agentId) return;
  state.currentProject = projectName;
  if (state.centerView === 'note') switchCenterView('chat');
  openProjectPanel();
  const model = getDefaultModel(agentId);
  state.agentChats[agentId] = {
    sessionId: null,
    agent: agentId,
    model,
    messages: [],
    streaming: false,
    totalTokens: 0,
    project: projectName,
  };
  renderSessionBar();
  renderMessages();
  updateStatusBar();
  updateChatArea();
  showToast(`New chat in ${projectName}`);
};

window.newChatSession = function() {
  closeMobileSidebar();
  const agentId = state.activeAgentId;
  if (!agentId) return;
  const chat = state.agentChats[agentId];
  // If current chat is already empty and has no session, do nothing
  if (chat && !chat.sessionId && chat.messages.length === 0 && !state.currentProject) return;
  // Create a fresh chat entry without deleting the old session
  state.currentProject = null;
  closeProjectPanel();
  if (state.centerView === 'note') switchCenterView('chat');
  const model = getDefaultModel(agentId);
  state.agentChats[agentId] = {
    sessionId: null,
    agent: agentId,
    model,
    messages: [],
    streaming: false,
    totalTokens: 0,
  };
  renderSessionBar();
  renderMessages();
  updateStatusBar();
  showToast('New chat started');
};

  html += `</div>`;

function switchCenterView(mode) {
  state.centerView = mode;
  if (mode === 'chat') {
    dom.chatArea.style.display = '';
    dom.noteEditorArea.style.display = 'none';
  } else if (mode === 'note') {
    dom.chatArea.style.display = 'none';
    dom.noteEditorArea.style.display = 'flex';
  }
}

let _projectPollTimer = null;
let _projectPollHash = '';  // hash of notes+docs to detect changes

function _startProjectPolling() {
  _stopProjectPolling();
  _projectPollTimer = setInterval(async () => {
    if (!state.projectPanelOpen || !state.currentProject || !state.activeAgentId) return;
    try {
      const agentId = state.activeAgentId;
      const project = state.currentProject;
      // Fetch current notes list
      const notesRes = await API.get(`/v1/agents/${encodeURIComponent(agentId)}/projects/${encodeURIComponent(project)}/notes`);
      const notes = notesRes.notes || [];
      // Build a simple hash to detect changes (count + names + sizes)
      const hash = notes.map(n => `${n.path}:${n.size || 0}`).sort().join('|');
      if (_projectPollHash && hash !== _projectPollHash) {
        // Notes changed — refresh the panel
        await renderProjectPanelNotes(agentId, project);
        await renderProjectPanelDocs(agentId, project);
        renderProjectPanelAttachments(agentId, project);
        // If current note was modified externally, reload editor
        if (state.currentNote && state.centerView === 'note') {
          const currentInList = notes.find(n => n.path === state.currentNote.path);
          if (currentInList && currentInList.size !== (state.currentNote._lastSize || 0)) {
            try {
              const updated = await API.get(`/v1/agents/${encodeURIComponent(agentId)}/projects/${encodeURIComponent(project)}/notes/${encodeURIComponent(state.currentNote.path)}`);
              const newContent = updated.content || '';
              if (newContent !== state.currentNote.content && !state.currentNote.dirty) {
                dom.noteEditorTextarea.value = newContent;
                state.currentNote.content = newContent;
                dom.noteSaveStatus.textContent = 'Reloaded';
                setTimeout(() => { if (dom.noteSaveStatus.textContent === 'Reloaded') dom.noteSaveStatus.textContent = 'Saved'; }, 2000);
              }
              state.currentNote._lastSize = currentInList.size;
            } catch {}
          }
        }
      }
      _projectPollHash = hash;
    } catch {}
  }, 5000);  // Poll every 5 seconds
}

function _stopProjectPolling() {
  if (_projectPollTimer) { clearInterval(_projectPollTimer); _projectPollTimer = null; }
  _projectPollHash = '';
}

function openProjectPanel() {
  state.projectPanelOpen = true;
  dom.projectPanel.classList.remove('collapsed');
  localStorage.setItem('project-panel-open', '1');
  renderProjectPanel();
  _startProjectPolling();
}

function closeProjectPanel() {
  state.projectPanelOpen = false;
  dom.projectPanel.classList.add('collapsed');
  localStorage.setItem('project-panel-open', '0');
  _stopProjectPolling();
}

window.toggleProjectPanel = function() {
  if (state.projectPanelOpen) {
    closeProjectPanel();
  } else {
    if (state.currentProject) {
      openProjectPanel();
    }
  }
};

window.switchProjectPanel = function(projectName) {
  if (!projectName) return;
  state.currentProject = projectName;
  renderProjectPanel();
  renderProjectSelector();
  updateChatArea();
};

window.togglePpSection = function(section) {
  const el = document.querySelector(`#project-panel .pp-section[data-section="${section}"]`);
  if (el) el.classList.toggle('collapsed');
};

async function renderProjectPanel() {
  const agentId = state.activeAgentId;
  const projectName = state.currentProject;
  if (!agentId || !projectName) return;

  // Reset search when panel re-renders fresh
  if (!state._ppSearchQuery) {
    const searchInput = document.getElementById('pp-search-input');
    if (searchInput) searchInput.value = '';
    // Restore all section visibility
    document.querySelectorAll('#project-panel .pp-section').forEach(s => s.style.display = '');
  }

  const projects = state.agentProjects[agentId] || [];
  const proj = projects.find(p => p.name === projectName);
  const pIcon = proj?.icon || 'folder';
  const pDesc = proj?.description || '';

  // Header — agent-card style with icon, name, description, settings
  const headerEl = document.getElementById('pp-project-header');
  if (headerEl) {
    headerEl.innerHTML = `
      <div class="sb-agent-item active" style="margin:0;border-left:none;flex:1;padding:8px 10px" onclick="event.stopPropagation()">
        <div class="sb-agent-avatar" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px">
          ${renderProjectIcon(pIcon, 20)}
        </div>
        <div class="sb-agent-info">
          <div class="sb-agent-name">${esc(projectName)}</div>
          <div class="sb-agent-meta">${pDesc ? esc(pDesc.substring(0, 40)) : '<span style="opacity:0.4">No description</span>'}</div>
        </div>
        <span class="sb-agent-actions" style="opacity:1">
          <button class="btn-cfg-card" title="Project settings" onclick="sidebarOpenProjectSettings('${esc(agentId)}','${esc(projectName)}')">&#9881;</button>
        </span>
      </div>
      <button class="pp-toggle" onclick="toggleProjectPanel()" title="Close panel">&times;</button>
    `;
  }

  // Chats section — project-scoped sessions
  await renderProjectPanelChats(agentId, projectName);

  // Notes section
  await renderProjectPanelNotes(agentId, projectName);

  // Documents section
  await renderProjectPanelDocs(agentId, projectName);

  // Attachments section
  renderProjectPanelAttachments(agentId, projectName);

  // Folders section
  await renderProjectPanelFolders(agentId, projectName);
}

async function renderProjectPanelChats(agentId, projectName) {
  const entry = state.agentSessions[agentId];
  const allSessions = entry?.sessions || [];
  const projectSessions = allSessions.filter(s => s.project === projectName && s.status !== 'archived' && s.status !== 'note_chat');
  const chat = state.agentChats[agentId];
  const currentSessionId = chat?.sessionId;

  // Store for filtering
  state._ppChatsData = projectSessions;

  // Apply filter
  const query = (state._ppSearchQuery || '').toLowerCase();
  let filtered;
  let deepMatches = [];
  if (query.length >= 2) {
    // Local title/summary filter
    filtered = projectSessions.filter(s => (s.title || '').toLowerCase().includes(query) || (s.summary || '').toLowerCase().includes(query));
    // Deep content search results (populated async)
    if (state._ppDeepSearchResults) {
      const localIds = new Set(filtered.map(s => s.id));
      for (const r of state._ppDeepSearchResults) {
        if (!localIds.has(r.id) && r.project === projectName) {
          deepMatches.push(r);
        }
      }
    }
  } else {
    filtered = projectSessions;
  }

  // Update count
  const totalCount = filtered.length + deepMatches.length;
  const countEl = document.getElementById('pp-count-chats');
  if (countEl) countEl.textContent = `(${totalCount})`;

  let html = '';
  if (totalCount === 0 && !state._ppDeepSearchLoading) {
    html = query ? '<div class="pp-empty">No matching chats</div>' : '<div class="pp-empty">No chats yet</div>';
  }
  filtered.forEach(s => {
    const isActive = currentSessionId === s.id;
    const title = s.title || 'Untitled';
    const truncTitle = title.length > 35 ? title.substring(0, 35) + '\u2026' : title;
    const summary = s.summary || '';
    const truncSummary = summary ? (summary.length > 40 ? summary.substring(0, 40) + '\u2026' : summary) : '';
    const count = s.message_count || 0;
    const timeStr = relativeTime(s.last_active);
    const idxBadge = _indexBadge(s);
    html += `<div class="sb-agent-item ${isActive ? 'active' : ''}" onclick="loadSession('${esc(s.id)}');switchCenterView('chat');" title="${esc(title)} \u2014 ${count} messages${s.indexed === true ? ' \u2022 indexed' : s.indexed === false ? ' \u2022 not indexed' : ''}${summary ? '\n' + summary : ''}" style="margin:2px 0">
      <div class="sb-agent-avatar" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="var(--color-text-muted)"><path d="M2.678 11.894a1 1 0 0 1 .287.801 11 11 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8 8 0 0 0 8 14c3.996 0 7-2.807 7-6s-3.004-6-7-6-7 2.808-7 6c0 1.468.617 2.83 1.678 3.894"/></svg>
      </div>
      <div class="sb-agent-info">
        <div class="sb-agent-name">${esc(truncTitle)}</div>
        <div class="sb-agent-meta">${truncSummary ? esc(truncSummary) : `${count} messages \u00b7 ${timeStr}`}${idxBadge}</div>
      </div>
      <span class="sb-agent-actions">
        <button onclick="event.stopPropagation();sessionAction('archive','${esc(s.id)}')" title="Archive">&#128230;</button>
        <button onclick="event.stopPropagation();sessionAction('delete','${esc(s.id)}')" title="Delete">&#128465;</button>
      </span>
    </div>`;
  });
  // Deep content matches
  if (deepMatches.length > 0) {
    html += `<div style="padding:4px 8px 2px;font-size:10px;color:var(--color-text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Content matches</div>`;
    deepMatches.forEach(s => {
      const title = s.title || 'Untitled';
      const truncTitle = title.length > 30 ? title.substring(0, 30) + '\u2026' : title;
      const preview = s.match_preview ? (s.match_preview.length > 60 ? s.match_preview.substring(0, 60) + '\u2026' : s.match_preview) : '';
      html += `<div class="sb-agent-item" onclick="loadSession('${esc(s.id)}');switchCenterView('chat');" title="${esc(title)}${preview ? '\n' + preview : ''}" style="margin:2px 0">
        <div class="sb-agent-avatar" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--color-accent)"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg>
        </div>
        <div class="sb-agent-info">
          <div class="sb-agent-name">${esc(truncTitle)} <span style="font-size:9px;color:var(--color-accent);font-weight:normal">\u2022 content</span></div>
          <div class="sb-agent-meta">${preview ? esc(preview) : ''}</div>
        </div>
      </div>`;
    });
  }
  if (query && state._ppDeepSearchLoading) {
    html += `<div style="padding:6px 8px;font-size:10px;color:var(--color-text-muted);font-style:italic">Searching transcripts\u2026</div>`;
  }
  dom.ppChats.innerHTML = html;

  // Hide section if all filtered out
  const section = document.querySelector('#project-panel .pp-section[data-section="chats"]');
  if (section) section.style.display = (query.length >= 2 && filtered.length === 0) ? 'none' : '';
}

async function renderProjectPanelNotes(agentId, projectName) {
  try {
    const res = await API.get(`/v1/agents/${encodeURIComponent(agentId)}/projects/${encodeURIComponent(projectName)}/notes`);
    state.projectNotes = res.notes || [];
  } catch {
    state.projectNotes = [];
  }

  const query = (state._ppSearchQuery || '').toLowerCase();
  const allNotes = state.projectNotes;
  const filtered = query.length >= 2
    ? allNotes.filter(n => (n.name || '').toLowerCase().includes(query) || (n.path || '').toLowerCase().includes(query))
    : allNotes;

  // Update count
  const countEl = document.getElementById('pp-count-notes');
  if (countEl) countEl.textContent = `(${filtered.length})`;

  let html = '';
  if (filtered.length === 0) {
    html = '<div class="pp-empty">No notes yet</div>';
  } else {
    // Group by folder
    const folders = {};
    const rootNotes = [];
    filtered.forEach(n => {
      const parts = n.path.split('/');
      if (parts.length > 1) {
        const folder = parts.slice(0, -1).join('/');
        if (!folders[folder]) folders[folder] = [];
        folders[folder].push(n);
      } else {
        rootNotes.push(n);
      }
    });

    rootNotes.forEach(n => {
      const isActive = state.currentNote && state.currentNote.path === n.path;
      html += `<div class="pp-note-item${isActive ? ' active' : ''}" onclick="openNote('${esc(agentId)}','${esc(state.currentProject)}','${esc(n.path)}')">
        <span style="font-size:10px">&#128196;</span>
        <span class="pp-note-name" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.name || n.path)}</span>
        <button class="pp-item-delete" onclick="event.stopPropagation();ppRenameNote('${esc(n.path)}',this)" title="Rename" style="font-size:9px">&#9998;</button>
        <button class="pp-item-delete" onclick="event.stopPropagation();ppDeleteNote('${esc(n.path)}')" title="Delete">&#128465;</button>
      </div>`;
    });

    Object.entries(folders).forEach(([folder, notes]) => {
      html += `<div class="pp-note-folder">${esc(folder)}</div>`;
      notes.forEach(n => {
        const isActive = state.currentNote && state.currentNote.path === n.path;
        html += `<div class="pp-note-item${isActive ? ' active' : ''}" onclick="openNote('${esc(agentId)}','${esc(state.currentProject)}','${esc(n.path)}')" style="padding-left:16px">
          <span style="font-size:10px">&#128196;</span>
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.name || n.path)}</span>
        </div>`;
      });
    });
  }
  dom.ppNotes.innerHTML = html;

  // Hide section if all filtered out
  const section = document.querySelector('#project-panel .pp-section[data-section="notes"]');
  if (section) section.style.display = (query.length >= 2 && filtered.length === 0) ? 'none' : '';
}

function renderProjectPanelAttachments(agentId, projectName) {
  // Collect file attachments from project chat messages
  const entry = state.agentSessions[agentId];
  const allSessions = entry?.sessions || [];
  const projectSessions = allSessions.filter(s => s.project === projectName);
  const chat = state.agentChats[agentId];

  // Aggregate files from the currently loaded chat if it's a project chat
  const files = [];
  if (chat && chat.project === projectName && chat.messages) {
    chat.messages.forEach(m => {
      if (m.files && m.files.length > 0) {
        m.files.forEach(f => files.push(f));
      }
    });
  }

  const query = (state._ppSearchQuery || '').toLowerCase();
  const filtered = query.length >= 2
    ? files.filter(f => ((f.name || f.path || '').toLowerCase().includes(query)))
    : files;

  const countEl = document.getElementById('pp-count-attachments');
  if (countEl) countEl.textContent = `(${filtered.length})`;

  if (filtered.length === 0) {
    dom.ppAttachments.innerHTML = '<div class="pp-empty">No attachments</div>';
  } else {
    dom.ppAttachments.innerHTML = filtered.map(f => {
      const name = f.name || f.path || 'file';
      return `<div class="pp-doc-item"><span style="font-size:10px">&#128206;</span> <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span></div>`;
    }).join('');
  }

  const section = document.querySelector('#project-panel .pp-section[data-section="attachments"]');
  if (section) section.style.display = (query.length >= 2 && filtered.length === 0) ? 'none' : '';
}

window.filterProjectPanel = function(query) {
  state._ppSearchQuery = query;
  state._ppDeepSearchResults = null;
  state._ppDeepSearchLoading = false;
  // Re-render all sections with current filter
  const agentId = state.activeAgentId;
  const projectName = state.currentProject;
  if (!agentId || !projectName) return;

  renderProjectPanelChats(agentId, projectName);
  renderProjectPanelNotes(agentId, projectName);
  renderProjectPanelDocs(agentId, projectName);
  renderProjectPanelAttachments(agentId, projectName);
  renderProjectPanelFolders(agentId, projectName);

  // Debounced deep content search for chats
  clearTimeout(state._ppDeepSearchTimer);
  if (query.length >= 2) {
    state._ppDeepSearchLoading = true;
    state._ppDeepSearchTimer = setTimeout(async () => {
      try {
        const res = await API.get('/v1/sessions/search?q=' + encodeURIComponent(query) + '&agent=' + encodeURIComponent(agentId));
        state._ppDeepSearchResults = res.results || [];
      } catch(e) { state._ppDeepSearchResults = null; }
      state._ppDeepSearchLoading = false;
      renderProjectPanelChats(agentId, projectName);
      const si2 = document.getElementById('pp-search-input');
      if (si2) { si2.focus(); si2.selectionStart = si2.selectionEnd = si2.value.length; }
    }, 500);
  }

  // Refocus search input after re-render
  const si = document.getElementById('pp-search-input');
  if (si) { si.focus(); si.selectionStart = si.selectionEnd = si.value.length; }
};

window.ppRenameNote = async function(oldPath, el) {
  const agentId = state.activeAgentId;
  const project = state.currentProject;
  if (!agentId || !project) return;
  const nameSpan = el.closest('.pp-note-item')?.querySelector('.pp-note-name');
  if (!nameSpan) return;
  const oldName = nameSpan.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = oldName;
  input.style.cssText = 'font-size:12px;padding:1px 4px;border:1px solid var(--color-accent);border-radius:4px;background:var(--color-surface-light);color:var(--color-text-primary);outline:none;width:100%;font-family:inherit';
  nameSpan.replaceWith(input);
  input.focus();
  input.select();
  const finish = async () => {
    const newName = input.value.trim();
    if (!newName || newName === oldName) {
      input.replaceWith(nameSpan);
      return;
    }
    const dir = oldPath.includes('/') ? oldPath.substring(0, oldPath.lastIndexOf('/') + 1) : '';
    const newPath = dir + (newName.endsWith('.md') ? newName : newName + '.md');
    try {
      await API.post(`/v1/agents/${encodeURIComponent(agentId)}/projects/${encodeURIComponent(project)}/notes`, {action: 'rename', path: oldPath, new_path: newPath});
      renderProjectPanel();
      showToast('Note renamed');
    } catch (e) { showToast(e.message, true); input.replaceWith(nameSpan); }
  };
  input.onblur = finish;
  input.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); finish(); } if (e.key === 'Escape') { input.replaceWith(nameSpan); } };
};

window.openNote = async function(agentId, project, path) {
  try {
    const res = await API.get(`/v1/agents/${encodeURIComponent(agentId)}/projects/${encodeURIComponent(project)}/notes/${encodeURIComponent(path)}`);
    const content = res.content || '';
    const name = res.name || path;

    state.currentNote = { agentId, project, path, content, dirty: false };
    dom.noteEditorTextarea.value = content;
    dom.noteTitleDisplay.textContent = name;
    dom.noteSaveStatus.textContent = 'Saved';

    switchCenterView('note');

    // Set up auto-save
    dom.noteEditorTextarea.oninput = () => {
      if (state.currentNote) {
        state.currentNote.dirty = true;
        state.currentNote.content = dom.noteEditorTextarea.value;
        dom.noteSaveStatus.textContent = 'Unsaved';
        clearTimeout(state.noteSaveTimer);
        state.noteSaveTimer = setTimeout(() => saveNote(), 2000);
      }
    };

    // Restore AI chat history for this note
    dom.noteAiMessages.innerHTML = '';
    state.noteAiSessionId = null;
    const noteKey = `note-session:${agentId}:${project}:${path}`;
    const storedSid = localStorage.getItem(noteKey);
    if (storedSid) {
      state.noteAiSessionId = storedSid;
      try {
        const msgs = await API.get(`/v1/sessions/${storedSid}/messages`);
        const messages = (msgs.messages || []).filter(m => m.role === 'user' || m.role === 'assistant');
        if (messages.length > 0) {
          dom.noteAiMessages.innerHTML = messages.map(m => {
            let content = m.content || '';
            // For user messages, strip the note content prefix to show only the user's question
            if (m.role === 'user' && content.includes('```markdown\n')) {
              const parts = content.split('```\n\n');
              content = parts.length > 1 ? parts[parts.length - 1] : content;
            }
            // For assistant messages, strip EDIT_NOTE tags
            if (m.role === 'assistant') content = content.replace(/\[EDIT_NOTE\][\s\S]*?\[\/EDIT_NOTE\]/g, '').trim();
            if (!content) return '';
            return `<div class="note-ai-msg ${m.role}">${m.role === 'assistant' && typeof marked !== 'undefined' ? marked.parse(content) : esc(content)}</div>`;
          }).filter(Boolean).join('');
          dom.noteAiMessages.scrollTop = dom.noteAiMessages.scrollHeight;
          // Auto-expand AI panel if there's history
          const body = document.getElementById('note-ai-body');
          const chevron = document.getElementById('note-ai-chevron');
          if (body) body.style.display = 'flex';
          if (chevron) chevron.style.transform = 'rotate(0deg)';
        }
      } catch {}
    }
    state.noteAiSessionId = null;

    // Update project panel to highlight active note
    if (dom.ppNotes) renderProjectPanelNotes(agentId, project);

    showToast(`Opened note: ${name}`);
  } catch (e) {
    showToast(`Error opening note: ${e.message}`, true);
  }
};

window.closeNote = function() {
  if (state.currentNote && state.currentNote.dirty) {
    saveNote();
  }
  state.currentNote = null;
  state.noteAiSessionId = null;
  switchCenterView('chat');
  // Re-render project panel to un-highlight note
  if (state.projectPanelOpen && state.currentProject) {
    renderProjectPanelNotes(state.activeAgentId, state.currentProject);
  }
};

async function saveNote() {
  const note = state.currentNote;
  if (!note || !note.dirty) return;
  try {
    dom.noteSaveStatus.textContent = 'Saving...';
    await API.put(`/v1/agents/${encodeURIComponent(note.agentId)}/projects/${encodeURIComponent(note.project)}/notes/${encodeURIComponent(note.path)}`, { content: note.content });
    note.dirty = false;
    dom.noteSaveStatus.textContent = 'Saved';
  } catch (e) {
    dom.noteSaveStatus.textContent = 'Save failed';
    showToast(`Error saving note: ${e.message}`, true);
  }
}

window.sendNoteAiMessage = async function() {
  const text = dom.noteAiInput.value.trim();
  if (!text) return;
  dom.noteAiInput.value = '';

  const note = state.currentNote;
  if (!note) return;

  // Add user message to display
  dom.noteAiMessages.innerHTML += `<div class="note-ai-msg user">${esc(text)}</div>`;
  dom.noteAiMessages.scrollTop = dom.noteAiMessages.scrollHeight;

  try {
    // Create note session if not yet created
    if (!state.noteAiSessionId) {
      const noteCtx = `note_editing:${note.path}`;
      const sessionRes = await API.post('/v1/sessions', {
        agent: note.agentId, project: note.project, note_context: noteCtx,
        status: 'note_chat'
      });
      state.noteAiSessionId = sessionRes.session_id;
      const noteKey = `note-session:${note.agentId}:${note.project}:${note.path}`;
      localStorage.setItem(noteKey, state.noteAiSessionId);
    }

    // Build message with note file path and current content
    const noteFilePath = `agents/${note.agentId}/projects/${note.project}/notes/${note.path}`;
    const noteContext = `Note file path: ${noteFilePath}\n\nCurrent note content:\n\`\`\`markdown\n${note.content}\n\`\`\`\n\n${text}`;

    const controller = new AbortController();
    const res = await fetch(`${BASE_URL}/v1/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: state.noteAiSessionId, message: noteContext }),
      signal: controller.signal,
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let aiMsg = '';
    let noteFileModified = false;
    const msgEl = document.createElement('div');
    msgEl.className = 'note-ai-msg assistant';
    dom.noteAiMessages.appendChild(msgEl);

    let buffer = '';
    let currentEvent = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7).trim();
          continue;
        }
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          if (currentEvent === 'text_delta' && evt.text) {
            aiMsg += evt.text;
            msgEl.innerHTML = typeof marked !== 'undefined' ? marked.parse(aiMsg) : esc(aiMsg);
            dom.noteAiMessages.scrollTop = dom.noteAiMessages.scrollHeight;
          } else if (currentEvent === 'file_created') {
            // AI edited the note file — auto-reload
            noteFileModified = true;
          } else if (currentEvent === 'tool_call') {
            const toolName = evt.name || '';
            if (toolName === 'write_file' || toolName === 'edit_file') {
              msgEl.innerHTML = (aiMsg ? (typeof marked !== 'undefined' ? marked.parse(aiMsg) : esc(aiMsg)) : '') +
                '<div style="padding:3px 0;font-size:10px;color:var(--color-text-muted)">✏️ Editing note...</div>';
            }
          } else if (currentEvent === 'done') {
            if (evt.text) aiMsg = evt.text;
          }
        } catch {}
      }
    }

    // If the AI modified files, reload editor + refresh notes tree
    if (noteFileModified && state.currentNote) {
      try {
        // Reload current note content
        const updated = await API.get(`/v1/agents/${encodeURIComponent(note.agentId)}/projects/${encodeURIComponent(note.project)}/notes/${encodeURIComponent(note.path)}`);
        const newContent = updated.content || '';
        dom.noteEditorTextarea.value = newContent;
        state.currentNote.content = newContent;
        state.currentNote.dirty = false;
        dom.noteSaveStatus.textContent = 'Saved';
        msgEl.innerHTML = (aiMsg ? (typeof marked !== 'undefined' ? marked.parse(aiMsg) : esc(aiMsg)) : '') +
          '<div style="margin-top:6px;padding:4px 8px;background:color-mix(in srgb, var(--color-accent) 10%, transparent);border-radius:6px;font-size:11px;color:var(--color-accent)">✓ Note updated</div>';
      } catch {}
      // Refresh notes tree in project panel (catches new notes created by AI)
      try {
        await renderProjectPanelNotes(note.agentId, note.project);
      } catch {}
    }
  } catch (e) {
    dom.noteAiMessages.innerHTML += `<div class="note-ai-msg assistant" style="color:var(--color-error)">Error: ${esc(e.message)}</div>`;
  }
};

window.insertNoteFormatting = function(type) {
  const ta = dom.noteEditorTextarea;
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const text = ta.value;
  const selected = text.substring(start, end);
  let replacement = '';
  let cursorOffset = 0;

  switch (type) {
    case 'bold':
      replacement = `**${selected || 'bold text'}**`;
      cursorOffset = selected ? replacement.length : 2;
      break;
    case 'italic':
      replacement = `*${selected || 'italic text'}*`;
      cursorOffset = selected ? replacement.length : 1;
      break;
    case 'h1':
      replacement = `# ${selected || 'Heading'}`;
      cursorOffset = replacement.length;
      break;
    case 'h2':
      replacement = `## ${selected || 'Heading'}`;
      cursorOffset = replacement.length;
      break;
    case 'h3':
      replacement = `### ${selected || 'Heading'}`;
      cursorOffset = replacement.length;
      break;
    case 'code':
      replacement = `\`${selected || 'code'}\``;
      cursorOffset = selected ? replacement.length : 1;
      break;
    case 'codeblock':
      replacement = `\`\`\`\n${selected || 'code'}\n\`\`\``;
      cursorOffset = selected ? replacement.length : 4;
      break;
    case 'link':
      replacement = `[${selected || 'text'}](url)`;
      cursorOffset = selected ? replacement.length - 4 : 1;
      break;
    case 'list':
      replacement = `- ${selected || 'item'}`;
      cursorOffset = replacement.length;
      break;
    default:
      return;
  }

  ta.value = text.substring(0, start) + replacement + text.substring(end);
  ta.selectionStart = ta.selectionEnd = start + cursorOffset;
  ta.focus();

  if (state.currentNote) {
    state.currentNote.content = ta.value;
    state.currentNote.dirty = true;
    dom.noteSaveStatus.textContent = 'Unsaved';
    clearTimeout(state.noteSaveTimer);
    state.noteSaveTimer = setTimeout(() => saveNote(), 2000);
  }
};

window.loadSession = async function(sessionId) {
  closeMobileSidebar();
  const agentId = state.activeAgentId;
  if (!agentId) return;
  const chat = state.agentChats[agentId];
  // If already viewing this session, do nothing
  if (chat && chat.sessionId === sessionId) return;
  try {
    const res = await API.getSessionMessages(sessionId);
    const messages = (res.messages || []).map(m => {
      const msg = { role: m.role, content: m.content, id: m.id };
      if (m.metadata) {
        // Restore file attachments
        if (m.metadata.files && m.metadata.files.length > 0) msg.files = m.metadata.files;
        // Restore tool calls
        if (m.metadata.tools && m.metadata.tools.length > 0) msg.tools = m.metadata.tools;
        // Restore model/tokens/cost for footer display
        if (m.metadata.model) msg.model = m.metadata.model;
        if (m.metadata.tokens) msg.tokens = m.metadata.tokens;
        if (m.metadata.cost != null) msg.cost = m.metadata.cost;
        if (m.metadata.original_model) msg.fallbackNotice = `Used fallback: ${m.metadata.model} (primary ${m.metadata.original_model} unavailable)`;
        if (m.metadata.partial) msg.partial = true;
        if (m.metadata.thinking) msg.thinking = m.metadata.thinking;
      }
      return msg;
    });
    const entry = state.agentSessions[agentId];
    const sessionInfo = entry?.sessions?.find(s => s.id === sessionId);
    const model = sessionInfo?.model || getDefaultModel(agentId);
    const sessionProject = sessionInfo?.project || '';
    state.agentChats[agentId] = {
      sessionId,
      agent: agentId,
      model,
      messages,
      streaming: false,
      totalTokens: 0,
      project: sessionProject || undefined,
    };
    // Set currentProject from the loaded session's project
    state.currentProject = sessionProject || null;
    // Switch to chat view if we were in note editor
    if (state.centerView === 'note') switchCenterView('chat');
    // Open/close project panel based on session's project
    if (sessionProject) { openProjectPanel(); } else { closeProjectPanel(); }
    renderSessionBar();
    updateChatArea();
    showToast(`Loaded session: ${sessionInfo?.title || sessionId.substring(0, 8)}`);
  } catch (e) {
    showToast(`Error loading session: ${e.message}`, true);
  }
};

window.sessionAction = async function(action, sessionId) {
  const agentId = state.activeAgentId;
  if (!agentId) return;
  if (action === 'delete' && !confirm('Permanently delete this session?')) return;
  try {
    await API.manageSession({ action, session_id: sessionId });
    // If we deleted/archived the currently active session, start a new chat
    const chat = state.agentChats[agentId];
    if (chat && chat.sessionId === sessionId && (action === 'delete' || action === 'archive')) {
      newChatSession();
    }
    // Reload sessions list
    await loadAgentSessions(agentId);
    const labels = { delete: 'Session deleted', archive: 'Session archived', unarchive: 'Session unarchived',
      incognito: 'Session marked incognito — excluded from memory', un_incognito: 'Session removed from incognito' };
    showToast(labels[action] || `Session ${action}d`);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.toggleShowArchived = async function() {
  const agentId = state.activeAgentId;
  if (!agentId) return;
  const entry = state.agentSessions[agentId];
  if (!entry) return;
  entry.showArchived = !entry.showArchived;
  entry.loaded = false;
  await loadAgentSessions(agentId);
};

// ─── Update Chat Area ───────────────────────────────────────
function updateChatArea() {

    // No agent selected — on mobile, keep top bar visible for hamburger menu
    const isMobile = window.innerWidth < 768;
    if (isMobile) {
      dom.chatTopBar.style.display = '';
      // Hide agent-specific elements in top bar
      dom.chatAgentName.style.display = 'none';
      dom.modelSelector.style.display = 'none';

    }

      ? '<div class="flex flex-col items-center justify-center h-full text-text-muted font-body gap-4 px-6"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg><span class="text-sm text-center">Tap the menu icon above<br>to select an agent</span></div>'
      : '<div class="flex items-center justify-center h-full text-text-muted text-sm font-body">Select an agent to start chatting</div>';

    return;
  }

  dom.chatAgentName.style.display = '';
  dom.modelSelector.style.display = '';
  dom.chatTopBar.style.display = '';
  dom.chatInputArea.style.display = '';
  renderSessionBar();

  // Update top bar — compact agent display (full info is in sidebar)
  const agentObj = state.agents.find(a => getAgentName(a) === chat.agent);
  const avatarId = getAgentAvatar(agentObj || {id: chat.agent});
  const chatDisplayName = agentObj ? getAgentDisplayName(agentObj) : '';
  dom.chatAgentName.innerHTML = `${renderAvatar(avatarId, 22)} <span>${esc(chatDisplayName || chat.agent)}</span>`;

  dom.projectContextBar.style.display = 'none';

// ─── CHAT MANAGEMENT ────────────────────────────────────────
function closeChat(agentId) {
  const chat = state.agentChats[agentId];
  if (chat && chat.sessionId) {
    API.deleteSession(chat.sessionId).catch(() => {});
  }
  delete state.agentChats[agentId];
  if (state.activeAgentId === agentId) {
    state.activeAgentId = null;
    const remaining = Object.keys(state.agentChats);
    if (remaining.length > 0) {
      state.activeAgentId = remaining[0];
    }
  }
  renderAgentCards();
  updateChatArea();
}

async function ensureSession(chat) {
  if (chat.sessionId) return;
  try {
    const projectForSession = chat.project || state.currentProject || undefined;
    const res = await API.createSession(chat.agent || undefined, chat.model || undefined, projectForSession);
    chat.sessionId = res.session_id;
    if (res.project) chat.project = res.project;
    updateStatusBar();
    // Refresh session list for this agent
    if (chat.agent && state.agentSessions[chat.agent]) {
      state.agentSessions[chat.agent].loaded = false;
      loadAgentSessions(chat.agent);
    }
  } catch (e) {
    addSystemMessage(chat, `Failed to create session: ${e.message}`);
    throw e;
  }
}

function resetSession(agentId) {
  const chat = state.agentChats[agentId];
  if (!chat) return;
  if (chat.sessionId) {
    API.deleteSession(chat.sessionId).catch(() => {});
  }
  chat.sessionId = null;
  chat.messages = [];
  chat.totalTokens = 0;
  chat.streaming = false;
  if (state.activeAgentId === agentId) {
    renderMessages();
    updateStatusBar();
  }
  showToast('Session reset');
}

// ─── Messages ───────────────────────────────────────────────
function addSystemMessage(chat, text) {
  chat.messages.push({ role: 'system', content: text, ts: Date.now() });
  if (chat === state.activeChat) renderMessages();
}

function modelIcon(model) {
  if (!model) return '';
  // Check models config first
  const cfg = (state.modelsConfig || {})[model];
  if (cfg && cfg.icon) return cfg.icon;
  // Fallback to pattern matching
  const m = model.toLowerCase();
  if (m.startsWith('crow')) return '🐦‍⬛';
  if (m.startsWith('claude-opus') || m === 'opus') return '🟣';
  if (m.startsWith('claude-sonnet') || m === 'sonnet') return '🟠';
  if (m.startsWith('claude-haiku') || m === 'haiku') return '🟢';
  if (m.includes('claude')) return '🔵';
  if (m.includes('gemini')) return '💎';
  if (m.includes('qwen')) return '🐼';
  if (m.includes('llama')) return '🦙';
  if (m.includes('mistral')) return '🌬️';
  return '🤖';
}

    const spinnerHtml = isStreaming ? `<div class="thinking-indicator" id="inline-thinking">
      <div class="thinking-header">

        ${_modelLabel ? `<span style="font-size:10px;color:var(--color-accent);font-family:'IBM Plex Mono',monospace;font-weight:500" id="thinking-model">${esc(_modelLabel)}</span>` : ''}

      <summary style="padding:6px 10px;font-size:10px;color:#a78bfa;cursor:pointer;user-select:none;font-family:'IBM Plex Mono',monospace">Thinking (${msg.thinking.length.toLocaleString()} chars)</summary>

    div.innerHTML = `<div class="assistant-msg max-w-[90%] pl-4 text-sm text-text-primary">

      ${msg.fallbackNotice ? `<div class="text-[10px] text-warning mt-1 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${esc(msg.fallbackNotice)}</div>` : ''}
      ${msg.tokens ? `<div class="text-[10px] text-text-muted mt-2 mono flex items-center gap-1.5">${msg.model ? modelIcon(msg.model) + ' ' + esc(msg.model) + '  ·  ' : ''}<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>${msg.tokens} tokens${msg.cost != null ? '  ·  $' + msg.cost.toFixed(2) : ''}</div>` : ''}
    </div>`;
  } else if (msg.role === 'system') {
    div.className += ' flex justify-center';

  }
  targetContainer.appendChild(div);
  div.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function fileTypeIcon(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  const icons = {
    md: '\u{1F4DD}', py: '\u{1F4BB}', js: '\u{1F4BB}', ts: '\u{1F4BB}', jsx: '\u{1F4BB}', tsx: '\u{1F4BB}',
    json: '\u{1F4CB}', csv: '\u{1F4CA}', xlsx: '\u{1F4CA}', xls: '\u{1F4CA}',
    pdf: '\u{1F4D5}', html: '\u{1F310}', htm: '\u{1F310}', txt: '\u{1F4C4}',
    png: '\u{1F5BC}', jpg: '\u{1F5BC}', jpeg: '\u{1F5BC}', gif: '\u{1F5BC}', svg: '\u{1F5BC}',
    docx: '\u{1F4C3}', doc: '\u{1F4C3}',
  };
  return icons[ext] || '\u{1F4CE}';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function renderFileAttachments(files) {
  if (!files || files.length === 0) return '';
  const cards = files.map(f => {
    const icon = fileTypeIcon(f.name);
    const size = formatFileSize(f.size || 0);
    const actionBadge = f.action === 'modified' ? '<span class="file-action-badge modified">modified</span>' : '<span class="file-action-badge created">new</span>';
    const pathEnc = encodeURIComponent(f.path);
    return `<div class="file-attachment-card">
      <div class="file-icon">${icon}</div>
      <div class="file-info">
        <div class="file-name" title="${esc(f.path)}">${esc(f.name)}${actionBadge}</div>
        <div class="file-size">${size}</div>
      </div>
      <div class="file-actions">
        <button class="file-btn" onclick="previewFile('${pathEnc}')" title="Preview">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
