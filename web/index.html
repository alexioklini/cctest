  return typeof a === 'object' ? (a.mcp_count || (a.mcp_servers ? a.mcp_servers.length : 0)) : 0;
}
function getAgentModel(a) {
  return typeof a === 'object' ? (a.model || a.default_model || '') : '';
}
function getAgentDisplayName(a) {
  return typeof a === 'object' ? (a.display_name || '') : '';
}
function getAgentPaused(a) {
  return typeof a === 'object' ? (a.paused === true) : false;
}

// Build a flat list of { id, label } from all providers, filtered by models config
function getAllProviderModels() {
  const hasConfig = Object.keys(state.modelsConfig || {}).length > 0;
  const result = [];
  const seen = new Set();
  (state.providers || []).forEach(p => {
    const pName = typeof p === 'string' ? p : (p.name || p.provider || p.id || '');
    const pModels = typeof p === 'object' ? (p.models || []) : [];
    pModels.forEach(m => {
      const mId = typeof m === 'string' ? m : (m.id || m.name || '');
      if (seen.has(mId)) return;
      // Skip disabled models when config exists
      const cfg = (state.modelsConfig || {})[mId];
      if (hasConfig && cfg && cfg.enabled === false) return;
      seen.add(mId);
      // Use icon + shortname from config if available
      const label = cfg ? `${cfg.icon || ''} ${cfg.shortname || mId}`.trim() : `${pName}: ${mId}`;
      result.push({ id: mId, label, priority: cfg ? (cfg.priority || 0) : 0 });
    });
  });
  // Also include models from the /v1/models endpoint if providers are empty
  if (result.length === 0) {
    (state.models || []).forEach(m => {
      const id = typeof m === 'string' ? m : (m.id || m.name || m);
      if (seen.has(id)) return;
      const cfg = (state.modelsConfig || {})[id];
      if (hasConfig && cfg && cfg.enabled === false) return;
      seen.add(id);
      const label = cfg ? `${cfg.icon || ''} ${cfg.shortname || id}`.trim() : id;
      result.push({ id, label, priority: cfg ? (cfg.priority || 0) : 0 });
    });
  }
  // Sort by priority descending
  if (hasConfig) result.sort((a, b) => (b.priority || 0) - (a.priority || 0));
  return result;
}

// ─── SIDEBAR AGENT LIST ─────────────────────────────────────
function buildSidebarAgentItem(a, i) {
  const name = getAgentName(a);
  const displayName = getAgentDisplayName(a);
  const isPaused = getAgentPaused(a);
  const isSelected = name === state.activeAgentId;
  const hasChat = !!state.agentChats[name];
  const isMain = name === 'main';
  const isTeamHead = a.is_team_head || false;
  const avatarId = getAgentAvatar(a);
  const agentModel = getAgentModel(a);
  const agentActivity = (state.agentActivity || {})[name] || [];
  const isActive = agentActivity.length > 0 || (state.agentChats[name] && state.agentChats[name].streaming);
  const item = document.createElement('div');
  item.className = `sb-agent-item ${isSelected ? 'active' : ''} ${isPaused ? 'opacity-40 grayscale' : ''}`;
  item.dataset.agentId = name;
  item.title = getAgentDesc(a) || name;
  const activityLabel = agentActivity.length ? agentActivity.join('/') : (isActive ? 'chat' : '');
  let dotColor = 'var(--color-text-muted)';
  let dotStyle = '';
  if (isActive) {
    dotColor = 'var(--color-accent)';
    dotStyle = 'animation:breathe 1.5s ease-in-out infinite;box-shadow:0 0 4px var(--color-accent);';
  } else if (hasChat) {
    dotColor = '#4ade80';
  } else if (isPaused) {
    dotColor = 'var(--color-text-muted)';
  }
  item.innerHTML = `
    <div class="sb-agent-avatar relative">
      ${renderAvatar(avatarId, 28)}
      ${isPaused ? '<span class="absolute -bottom-1 left-1/2 -translate-x-1/2 text-[6px] bg-surface-lighter border border-border rounded px-0.5 text-text-muted font-medium uppercase tracking-wider" style="line-height:1.2">Paused</span>' : ''}
    </div>
    <div class="sb-agent-info">
      <div class="sb-agent-name">${esc(displayName || name)}${displayName && displayName !== name ? ` <span style="font-size:8px;color:var(--color-text-muted);font-weight:400;opacity:0.6">${esc(name)}</span>` : ''}${isMain ? ' <span style="font-size:7px;background:var(--color-accent);color:var(--color-base);padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:0.5px;vertical-align:middle">MAIN</span>' : isTeamHead ? ' <span style="font-size:7px;background:color-mix(in srgb, var(--color-accent) 20%, transparent);color:var(--color-accent);padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:0.5px;vertical-align:middle">HEAD</span>' : ''}</div>
      <div class="sb-agent-meta">${isActive ? `<span class="sb-activity-badge"><span class="activity-dot"></span>${activityLabel}</span>` : (agentModel ? esc(agentModel.split('/').pop().substring(0, 20)) : '')}</div>
    </div>
    <span class="sb-agent-status-dot" style="background:${dotColor};${dotStyle}"></span>
    <span class="sb-agent-actions">
      <button class="btn-cfg-card" title="Configure">&#9881;</button>
      ${!isMain ? `<button class="btn-pause-card" title="${isPaused ? 'Resume' : 'Pause'}">${isPaused ? '&#9654;' : '&#9208;'}</button>` : ''}
      ${!isMain ? `<button class="btn-delete-card" title="Delete">&#128465;</button>` : ''}
    </span>
  `;
  item.onclick = (e) => {
    if (e.target.closest('.btn-cfg-card') || e.target.closest('.btn-pause-card') || e.target.closest('.btn-delete-card')) return;
    if (isPaused) return;
    selectAgent(name);
    closeMobileSidebar();
  };
  item.querySelector('.btn-cfg-card').onclick = () => openConfigModal(name);
  if (!isMain) {
    item.querySelector('.btn-pause-card').onclick = () => toggleAgentPaused(name, a);
    item.querySelector('.btn-delete-card').onclick = () => deleteAgent(name);
  }
  return item;
}

function renderAgentCards() {
  const container = dom.sidebarAgents;
  container.innerHTML = '';
  const agentMap = {};
  state.agents.forEach(a => { agentMap[getAgentName(a)] = a; });

  const teamStruct = state.teamStructure || {};
  const teams = teamStruct.teams || {};
  const teamIds = Object.keys(teams);
  const inTeam = new Set();
  teamIds.forEach(tid => {
    (teams[tid].members || []).forEach(m => inTeam.add(getAgentName(m)));
  });

  let idx = 0;

  // 1. Render main agent first
  const mainAgent = agentMap['main'];
  if (mainAgent) {
    container.appendChild(buildSidebarAgentItem(mainAgent, idx++));
  }

  // 2. Render teams
  teamIds.forEach(tid => {
    const team = teams[tid];
    const group = document.createElement('div');
    group.className = 'sb-team-group';
    const teamName = team.name || tid;
    const teamAvatar = team.avatar || '';
    group.innerHTML = `<div class="sb-team-label">${teamAvatar ? `<span>${esc(teamAvatar)}</span> ` : ''}${esc(teamName)}</div>`;

    const members = (team.members || []).map(m => getAgentName(m));
    const headId = team.head || '';
    const sorted = [headId, ...members.filter(m => m !== headId)].filter(Boolean);
    sorted.forEach(mid => {
      const memberAgent = agentMap[mid];
      if (memberAgent) group.appendChild(buildSidebarAgentItem(memberAgent, idx++));
    });
    container.appendChild(group);
  });

  // 3. Standalone agents (not in any team, not main)
  const standalones = state.agents.filter(a => {
    const name = getAgentName(a);
    return name !== 'main' && !inTeam.has(name);
  });
  if (standalones.length > 0 && teamIds.length > 0) {
    const sep = document.createElement('div');
    sep.className = 'sb-standalone-separator';
    container.appendChild(sep);
  }
  standalones.forEach(a => {
    container.appendChild(buildSidebarAgentItem(a, idx++));
  });
}

function updateAgentActivityVisuals() {
  const container = dom.sidebarAgents;
  if (!container) return;
  container.querySelectorAll('.sb-agent-item').forEach(item => {
    const name = item.dataset.agentId;
    if (!name) return;
    const agentActivity = (state.agentActivity || {})[name] || [];
    const isStreaming = state.agentChats[name] && state.agentChats[name].streaming;
    const isActive = agentActivity.length > 0 || isStreaming;
    const hasChat = !!state.agentChats[name];

    const dot = item.querySelector('.sb-agent-status-dot');
    if (dot) {
      if (isActive) {
        dot.style.background = 'var(--color-accent)';
        dot.style.animation = 'breathe 1.5s ease-in-out infinite';
        dot.style.boxShadow = '0 0 4px var(--color-accent)';
      } else if (hasChat) {
        dot.style.background = '#4ade80';
        dot.style.animation = '';
        dot.style.boxShadow = '';
      } else {
        dot.style.background = 'var(--color-text-muted)';
        dot.style.animation = '';
        dot.style.boxShadow = '';
      }
    }

    const meta = item.querySelector('.sb-agent-meta');
    if (meta) {
      const activityLabel = agentActivity.length ? agentActivity.join('/') : (isStreaming ? 'chat' : '');
      if (isActive && activityLabel) {
        meta.innerHTML = `<span class="sb-activity-badge"><span class="activity-dot"></span>${activityLabel}</span>`;
      } else if (!isActive) {
        const agent = state.agents.find(a => getAgentName(a) === name);
        const agentModel = agent ? getAgentModel(agent) : '';
        meta.textContent = agentModel ? agentModel.split('/').pop().substring(0, 20) : '';
      }
    }
  });
}

// ─── Select Agent ───────────────────────────────────────────
function getDefaultModel(agentName) {
  const agentObj = state.agents.find(a => getAgentName(a) === agentName);
  const agentModel = agentObj ? getAgentModel(agentObj) : '';
  const allModels = getAllProviderModels();
  return agentModel || (allModels.length > 0 ? allModels[0].id : '') || dom.modelSelector.value || '';
}

function selectAgent(agentName) {
  state.activeAgentId = agentName;
  state.currentProject = null; // reset project on agent switch
  // Create chat entry if not exists
  if (!state.agentChats[agentName]) {
    const model = getDefaultModel(agentName);
    state.agentChats[agentName] = {
      sessionId: null,
      agent: agentName,
      model,
      messages: [],
      streaming: false,
      totalTokens: 0,
    };
  }
  // Load sessions for this agent if not loaded yet
  if (!state.agentSessions[agentName]) {
    state.agentSessions[agentName] = { sessions: [], showArchived: false, loaded: false };
  }
  if (!state.agentSessions[agentName].loaded) {
    loadAgentSessions(agentName);
  }
  // Load custom commands for this agent
  loadCustomCommands(agentName);
  // Load projects for this agent
  loadAgentProjects(agentName);
  renderAgentCards();
  updateChatArea();
}

async function loadAgentProjects(agentName) {
  try {
    const res = await API.getProjects(agentName);
    state.agentProjects[agentName] = res.projects || [];
  } catch {
    state.agentProjects[agentName] = [];
  }
  if (state.activeAgentId === agentName) {
    renderProjectTabs();
  }
}

function selectProject(name) {
  state.currentProject = name || null;
  renderProjectTabs();
  updateStatusBar();
  // Reset session so next message goes to project-scoped context
  const chat = state.activeChat;
  if (chat) {
    if (chat.sessionId) {
      API.deleteSession(chat.sessionId).catch(() => {});
    }
    chat.sessionId = null;
    chat.messages = [];
    chat.totalTokens = 0;
    renderMessages();
  }
}

function renderProjectTabs() {
  const container = document.getElementById('project-tabs');
  if (!container) return;
  const projects = state.agentProjects[state.activeAgentId] || [];
  if (projects.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = '';
  let html = `<button class="project-tab ${!state.currentProject ? 'active' : ''}" onclick="selectProject(null)">No Project</button>`;
  for (const p of projects) {
    const isActive = state.currentProject === p.name;
    html += `<button class="project-tab ${isActive ? 'active' : ''}" onclick="selectProject('${esc(p.name)}')">${esc(p.name)}</button>`;
  }
  container.innerHTML = html;
}

async function loadAgentSessions(agentName) {
  const entry = state.agentSessions[agentName] || { sessions: [], showArchived: false, loaded: false };
  state.agentSessions[agentName] = entry;
  try {
    const status = entry.showArchived ? 'all' : 'active';
    const res = await API.getSessionsForAgent(agentName, status);
    entry.sessions = res.sessions || [];
    entry.loaded = true;
  } catch {
    entry.sessions = [];
    entry.loaded = true;
  }
  if (state.activeAgentId === agentName) {
    renderSessionBar();
  }
}

function renderSessionBar() {
  const agentId = state.activeAgentId;
  // Keep the old session bar hidden — sessions are now in sidebar
  dom.sessionBar.style.display = 'none';
  const container = dom.sidebarSessions;
  if (!agentId) { container.innerHTML = ''; return; }
  const entry = state.agentSessions[agentId];
  if (!entry) { container.innerHTML = ''; return; }
  const chat = state.agentChats[agentId];
  const currentSessionId = chat?.sessionId;
  const showArchived = entry.showArchived;
  const sessions = entry.sessions || [];

  let html = '';

  // Current unsaved session
  if (chat && !currentSessionId && chat.messages.length === 0) {
    html += `<div class="sb-session-item active" style="font-style:italic"><span class="sb-sess-title" style="color:var(--color-text-muted)">New chat</span></div>`;
  }

  // Sessions from history
  sessions.forEach(s => {
    const isActive = currentSessionId === s.id;
    const title = s.title || 'Untitled';
    const date = s.created_at ? new Date(s.created_at).toLocaleDateString(undefined, {month:'short',day:'numeric'}) : '';
    const count = s.message_count || 0;
    const isArchived = s.status === 'archived';
    const isIncognito = s.status === 'incognito';
    html += `<div class="sb-session-item ${isActive ? 'active' : ''} ${isArchived ? 'opacity-50' : ''}" onclick="loadSession('${esc(s.id)}')" title="${esc(title)} - ${count} messages${isIncognito ? ' (incognito)' : ''}">
      ${isIncognito ? '<span style="font-size:9px;flex-shrink:0" title="Incognito">&#128374;</span>' : ''}
      <span class="sb-sess-title">${esc(title)}</span>
      <span class="sb-sess-date">${date}</span>
      <span class="sb-sess-actions">
        ${isIncognito
          ? `<button onclick="event.stopPropagation();sessionAction('un_incognito','${esc(s.id)}')" title="Remove incognito">&#128065;</button>`
          : `<button onclick="event.stopPropagation();sessionAction('incognito','${esc(s.id)}')" title="Incognito">&#128374;</button>`
        }
        ${isArchived
          ? `<button onclick="event.stopPropagation();sessionAction('unarchive','${esc(s.id)}')" title="Unarchive">&#128194;</button>`
          : `<button onclick="event.stopPropagation();sessionAction('archive','${esc(s.id)}')" title="Archive">&#128230;</button>`
        }
        <button onclick="event.stopPropagation();sessionAction('delete','${esc(s.id)}')" title="Delete">&#128465;</button>
      </span>
    </div>`;
  });

  // Show/Hide archived toggle
  html += `<div style="padding:4px 12px"><button class="session-bar-toggle" onclick="toggleShowArchived()" style="font-size:10px;color:var(--color-text-muted);cursor:pointer;background:none;border:none;padding:2px 0">${showArchived ? 'Hide Archived' : 'Show Archived'}</button></div>`;

  container.innerHTML = html;
}

window.newChatSession = function() {
  closeMobileSidebar();
  const agentId = state.activeAgentId;
  if (!agentId) return;
  const chat = state.agentChats[agentId];
  // If current chat is already empty and has no session, do nothing
  if (chat && !chat.sessionId && chat.messages.length === 0) return;
  // Create a fresh chat entry without deleting the old session
  const model = getDefaultModel(agentId);
  state.agentChats[agentId] = {
    sessionId: null,
    agent: agentId,
    model,
    messages: [],
    streaming: false,
    totalTokens: 0,
  };
  renderSessionBar();
  renderMessages();
  updateStatusBar();
  showToast('New chat started');
};

window.loadSession = async function(sessionId) {
  closeMobileSidebar();
  const agentId = state.activeAgentId;
  if (!agentId) return;
  const chat = state.agentChats[agentId];
  // If already viewing this session, do nothing
  if (chat && chat.sessionId === sessionId) return;
  try {
    const res = await API.getSessionMessages(sessionId);
    const messages = (res.messages || []).map(m => ({
      role: m.role,
      content: m.content,
      id: m.id,
    }));
    const entry = state.agentSessions[agentId];
    const sessionInfo = entry?.sessions?.find(s => s.id === sessionId);
    const model = sessionInfo?.model || getDefaultModel(agentId);
    state.agentChats[agentId] = {
      sessionId,
      agent: agentId,
      model,
      messages,
      streaming: false,
      totalTokens: 0,
    };
    renderSessionBar();
    updateChatArea();
    showToast(`Loaded session: ${sessionInfo?.title || sessionId.substring(0, 8)}`);
  } catch (e) {
    showToast(`Error loading session: ${e.message}`, true);
  }
};

window.sessionAction = async function(action, sessionId) {
  const agentId = state.activeAgentId;
  if (!agentId) return;
  if (action === 'delete' && !confirm('Permanently delete this session?')) return;
  try {
    await API.manageSession({ action, session_id: sessionId });
    // If we deleted/archived the currently active session, start a new chat
    const chat = state.agentChats[agentId];
    if (chat && chat.sessionId === sessionId && (action === 'delete' || action === 'archive')) {
      newChatSession();
    }
    // Reload sessions list
    await loadAgentSessions(agentId);
    const labels = { delete: 'Session deleted', archive: 'Session archived', unarchive: 'Session unarchived',
      incognito: 'Session marked incognito — excluded from memory', un_incognito: 'Session removed from incognito' };
    showToast(labels[action] || `Session ${action}d`);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.toggleShowArchived = async function() {
  const agentId = state.activeAgentId;
  if (!agentId) return;
  const entry = state.agentSessions[agentId];
  if (!entry) return;
  entry.showArchived = !entry.showArchived;
  entry.loaded = false;
  await loadAgentSessions(agentId);
};

// ─── Update Chat Area ───────────────────────────────────────
function updateChatArea() {
  const chat = state.activeChat;
  if (!chat) {
    // No agent selected
    dom.chatTopBar.style.display = 'none';
    dom.sessionBar.style.display = 'none';
    dom.chatInputArea.style.display = 'none';
    dom.chatMessages.innerHTML = '<div class="flex items-center justify-center h-full text-text-muted text-sm font-body">Select an agent to start chatting</div>';
    updateStatusBar();
    return;
  }
  dom.chatTopBar.style.display = '';
  dom.chatInputArea.style.display = '';
  renderSessionBar();

  // Update top bar — compact agent display (full info is in sidebar)
  const agentObj = state.agents.find(a => getAgentName(a) === chat.agent);
  const avatarId = getAgentAvatar(agentObj || {id: chat.agent});
  const chatDisplayName = agentObj ? getAgentDisplayName(agentObj) : '';
  const projectBadge = state.currentProject
    ? `<span class="text-[11px] font-medium px-2 py-0.5 rounded-md ml-1" style="background:rgba(255,123,0,0.1);color:var(--color-accent);border:1px solid rgba(255,123,0,0.2)">${esc(state.currentProject)}</span>`
    : '';
  dom.chatAgentName.innerHTML = `${renderAvatar(avatarId, 22)} <span>${esc(chatDisplayName || chat.agent)}</span>${projectBadge}`;

  // Render project tabs
  renderProjectTabs();

  // Set model selector
  if (chat.model) {
    dom.modelSelector.value = chat.model;
  }

  renderMessages();
  updateStatusBar();
  dom.chatInput.focus();
}

// ─── CHAT MANAGEMENT ────────────────────────────────────────
function closeChat(agentId) {
  const chat = state.agentChats[agentId];
  if (chat && chat.sessionId) {
    API.deleteSession(chat.sessionId).catch(() => {});
  }
  delete state.agentChats[agentId];
  if (state.activeAgentId === agentId) {
    state.activeAgentId = null;
    const remaining = Object.keys(state.agentChats);
    if (remaining.length > 0) {
      state.activeAgentId = remaining[0];
    }
  }
  renderAgentCards();
  updateChatArea();
}

async function ensureSession(chat) {
  if (chat.sessionId) return;
  try {
    const res = await API.createSession(chat.agent || undefined, chat.model || undefined);
    chat.sessionId = res.session_id;
    updateStatusBar();
    // Refresh session list for this agent
    if (chat.agent && state.agentSessions[chat.agent]) {
      state.agentSessions[chat.agent].loaded = false;
      loadAgentSessions(chat.agent);
    }
  } catch (e) {
    addSystemMessage(chat, `Failed to create session: ${e.message}`);
    throw e;
  }
}

function resetSession(agentId) {
  const chat = state.agentChats[agentId];
  if (!chat) return;
  if (chat.sessionId) {
    API.deleteSession(chat.sessionId).catch(() => {});
  }
  chat.sessionId = null;
  chat.messages = [];
  chat.totalTokens = 0;
  chat.streaming = false;
  if (state.activeAgentId === agentId) {
    renderMessages();
    updateStatusBar();
  }
  showToast('Session reset');
}

// ─── Messages ───────────────────────────────────────────────
function addSystemMessage(chat, text) {
  chat.messages.push({ role: 'system', content: text, ts: Date.now() });
  if (chat === state.activeChat) renderMessages();
}

function modelIcon(model) {
  if (!model) return '';
  // Check models config first
  const cfg = (state.modelsConfig || {})[model];
  if (cfg && cfg.icon) return cfg.icon;
  // Fallback to pattern matching
  const m = model.toLowerCase();
  if (m.startsWith('crow')) return '🐦‍⬛';
  if (m.startsWith('claude-opus') || m === 'opus') return '🟣';
  if (m.startsWith('claude-sonnet') || m === 'sonnet') return '🟠';
  if (m.startsWith('claude-haiku') || m === 'haiku') return '🟢';
  if (m.includes('claude')) return '🔵';
  if (m.includes('gemini')) return '💎';
  if (m.includes('qwen')) return '🐼';
  if (m.includes('llama')) return '🦙';
  if (m.includes('mistral')) return '🌬️';
  return '🤖';
}

function renderMessages() {
  const chat = state.activeChat;
  dom.chatMessages.innerHTML = '';
  if (!chat) {
    dom.chatMessages.innerHTML = '<div class="flex items-center justify-center h-full text-text-muted text-sm font-body">No active chat</div>';
    return;
  }
  if (chat.messages.length === 0) {
    dom.chatMessages.innerHTML = `
      <div class="flex flex-col items-center justify-center h-full text-text-muted gap-4">
        <div class="w-16 h-16 rounded-2xl bg-surface-light border border-border flex items-center justify-center">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#555570" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a8 8 0 0 0-8 8c0 3 1.5 5 3 6.5V20h10v-3.5c1.5-1.5 3-3.5 3-6.5a8 8 0 0 0-8-8z"/><path d="M10 20v2h4v-2"/></svg>
        </div>
        <span class="text-sm font-display font-medium">Chat with ${esc(chat.agent)}</span>
        <span class="text-xs text-text-muted">Messages will appear here</span>
      </div>`;
    return;
  }
  const container = document.createElement('div');
  container.className = 'max-w-[800px] mx-auto space-y-5';
  dom.chatMessages.appendChild(container);
  chat.messages.forEach((msg, i) => renderMessage(msg, i, container));
  scrollToBottom();
}

function renderMessage(msg, idx, container) {
  const targetContainer = container || dom.chatMessages.querySelector('.max-w-\\[800px\\]') || dom.chatMessages;
  const div = document.createElement('div');
  div.className = 'fade-in';
  div.dataset.idx = idx;

  if (msg.role === 'user') {
    div.className += ' flex justify-end';
    const imagesHtml = (msg.images || []).map(img =>
      `<img src="data:${img.media_type};base64,${img.data}" style="max-width:300px;max-height:200px;border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="window.open(this.src,'_blank')">`
    ).join('');
    div.innerHTML = `<div class="user-msg max-w-[85%] bg-surface-light rounded-2xl rounded-tr-md px-5 py-3 text-sm text-text-primary msg-content">${imagesHtml}${marked.parse(msg.content)}</div>`;
  } else if (msg.role === 'assistant') {
    div.className += ' flex justify-start';
    const toolCount = (msg.tools || []).length;
    const toolsHtml = showToolCalls
      ? (msg.tools || []).map(t => renderToolBlock(t)).join('')
      : (toolCount > 0 ? renderToolsSummary(msg.tools) : '');
    const content = msg.content ? marked.parse(msg.content) : '';
    const isStreaming = !msg.content && !msg.tokens && (msg.tools || []).length === 0;
    const spinnerHtml = isStreaming ? `<div class="thinking-indicator" id="inline-thinking">
      <div class="thinking-header">
        <div class="wave-bars"><span></span><span></span><span></span><span></span><span></span></div>
        <span class="thinking-label" id="thinking-status">Thinking...</span>
        <span class="thinking-elapsed" id="thinking-time"></span>
      </div>
      <div class="response-pulse-bar mt-2"></div>
    </div>` : '';
    div.innerHTML = `<div class="assistant-msg max-w-[90%] pl-4 text-sm text-text-primary">
      ${toolsHtml}
      ${spinnerHtml}
      <div class="msg-content">${content}</div>
      ${msg.fallbackNotice ? `<div class="text-[10px] text-warning mt-1 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>${esc(msg.fallbackNotice)}</div>` : ''}
      ${msg.tokens ? `<div class="text-[10px] text-text-muted mt-2 mono flex items-center gap-1.5">${msg.model ? modelIcon(msg.model) + ' ' + esc(msg.model) + '  ·  ' : ''}<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>${msg.tokens} tokens${msg.cost != null ? '  ·  $' + msg.cost.toFixed(2) : ''}</div>` : ''}
    </div>`;
  } else if (msg.role === 'system') {
    div.className += ' flex justify-center';
    div.innerHTML = `<div class="text-[11px] text-text-muted bg-surface/80 backdrop-blur-sm px-4 py-1.5 rounded-full border border-border/50">${esc(msg.content)}</div>`;
  }
  targetContainer.appendChild(div);
  div.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function renderToolBlock(tool) {
  const statusIcon = tool.result !== undefined
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff7b00" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
  const name = esc(tool.name || '');
  const argsPreview = tool.args ? esc(typeof tool.args === 'string' ? tool.args : JSON.stringify(tool.args)).substring(0, 120) : '';
  // Check if result contains cached flag
  let isCached = false;
  if (tool.result !== undefined) {
    try {
      const parsed = typeof tool.result === 'string' ? JSON.parse(tool.result) : tool.result;
      if (parsed && parsed.cached) isCached = true;
    } catch {}
  }
  const cachedBadge = isCached ? '<span style="background:#3b82f6;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;">cached</span>' : '';
  const resultContent = tool.result !== undefined ? `<div class="mt-2.5 text-xs text-text-secondary mono whitespace-pre-wrap max-h-40 overflow-y-auto bg-base/50 rounded-lg p-3">${esc(typeof tool.result === 'string' ? tool.result : JSON.stringify(tool.result, null, 2))}</div>` : '';
  // Streaming tool output panel
  const toolOutputHtml = tool.streamOutput ? `<div class="mt-2 text-xs mono whitespace-pre-wrap max-h-48 overflow-y-auto p-3 rounded-lg" style="background:#1a1a2e;color:#a8b2d1;">${esc(tool.streamOutput)}</div>` : '';
  return `<div class="tool-block px-4 py-2.5 mb-3 text-xs cursor-pointer" onclick="this.classList.toggle('open');this.querySelector('.tool-detail')?.classList.toggle('hidden')">
    <div class="flex items-center gap-2.5">
      <span class="tool-chevron text-text-muted text-[10px]">&#x25B6;</span>
      ${statusIcon}
      <span class="text-accent font-medium font-mono">${name}</span>${cachedBadge}
      <span class="text-text-muted truncate">${argsPreview}</span>
    </div>
    <div class="tool-detail hidden">${resultContent}${toolOutputHtml}</div>
  </div>`;
}

function renderToolsSummary(tools) {
  if (!tools || tools.length === 0) return '';
  const completed = tools.filter(t => t.result !== undefined).length;
  const running = tools.length - completed;
  const names = [...new Set(tools.map(t => t.name))].join(', ');
  const statusText = running > 0 ? `${completed}/${tools.length} done` : `${tools.length} tool${tools.length > 1 ? 's' : ''}`;
  const statusIcon = running > 0
    ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#ff7b00" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
    : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  return `<div class="tools-summary flex items-center gap-2 px-3 py-1.5 mb-2 text-[11px] text-text-muted mono" style="border-left:3px solid var(--color-accent);border-radius:0 0.5rem 0.5rem 0;background:var(--color-tool-bg);opacity:0.7;">
    ${statusIcon}
    <span>${statusText}</span>
    <span class="text-text-muted truncate" style="max-width:300px;">${esc(names)}</span>
  </div>`;
}

function updateStreamingMessage(chat) {
  const msg = chat.messages[chat.messages.length - 1];
  if (!msg || msg.role !== 'assistant') return;
  const lastDiv = dom.chatMessages.querySelector('.max-w-\\[800px\\]')?.lastElementChild || dom.chatMessages.lastElementChild;
  if (!lastDiv) return;
  const contentDiv = lastDiv.querySelector('.msg-content');
  // Update or remove inline thinking indicator
  const spinner = lastDiv.querySelector('.thinking-indicator');
  if (spinner) {
    if (msg.content) {
      // Got text — remove spinner
      spinner.remove();
    } else if (msg.tools && msg.tools.length > 0) {
      // Tools running — update spinner label
      const lastTool = msg.tools[msg.tools.length - 1];
      const label = spinner.querySelector('.thinking-label');
      if (label) label.textContent = `${lastTool.name}... (${msg.tools.length})`;
    }
  }
  if (contentDiv) {
    const pulseId = 'streaming-pulse';
    if (msg.content && chat.streaming) {
      contentDiv.innerHTML = marked.parse(msg.content) + `<div id="${pulseId}" class="response-pulse-bar"></div>`;
    } else {
      contentDiv.innerHTML = marked.parse(msg.content || '');
    }
    contentDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  }
  const parent = lastDiv.querySelector('.assistant-msg') || lastDiv.querySelector('.max-w-\\[90\\%\\]');
  if (parent) {
    if (!showToolCalls) {
      // Hidden mode: show compact summary instead of individual blocks
      const existingSummary = parent.querySelector('.tools-summary');
      parent.querySelectorAll('.tool-block').forEach(el => el.remove());
      const toolsNeeded = msg.tools?.length || 0;
      if (toolsNeeded > 0) {
        const summaryHtml = renderToolsSummary(msg.tools);
        if (existingSummary) {
          existingSummary.outerHTML = summaryHtml;
        } else {
          const tmp = document.createElement('div');
          tmp.innerHTML = summaryHtml;
          parent.insertBefore(tmp.firstElementChild, contentDiv);
        }
      }
    } else {
      // Visible mode: show individual tool blocks
      const existingSummary = parent.querySelector('.tools-summary');
      if (existingSummary) existingSummary.remove();
      const existingTools = parent.querySelectorAll('.tool-block');
      const toolsNeeded = msg.tools?.length || 0;
      if (toolsNeeded > existingTools.length) {
        const newTool = msg.tools[toolsNeeded - 1];
        const toolDiv = document.createElement('div');
        toolDiv.innerHTML = renderToolBlock(newTool);
        parent.insertBefore(toolDiv.firstElementChild, contentDiv);
      } else if (toolsNeeded > 0) {
        const lastToolEl = parent.querySelectorAll('.tool-block')[toolsNeeded - 1];
        if (lastToolEl) {
          const t = msg.tools[toolsNeeded - 1];
          lastToolEl.outerHTML = renderToolBlock(t);
        }
      }
    }
  }
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
  });
}

// ─── Send Message ───────────────────────────────────────────
async function sendMessage() {
  const chat = state.activeChat;
  if (!chat || chat.streaming) return;
  const text = dom.chatInput.value.trim();
  if (!text && _pendingImages.length === 0) return;
  dom.chatInput.value = '';
  dom.chatInput.style.height = 'auto';

  // Capture pending images
  const images = _pendingImages.length > 0 ? [..._pendingImages] : null;
  _pendingImages = [];
  renderImagePreviews();

  const userMsg = { role: 'user', content: text || 'What can you see in this image?', ts: Date.now() };
  if (images) userMsg.images = images;
  chat.messages.push(userMsg);
  renderMessages();

  try {
    await ensureSession(chat);
  } catch { return; }

  chat.streaming = true;
  updateAgentActivityVisuals();
  dom.btnStop.classList.remove('hidden');
  dom.btnSend.disabled = true;

  // Show spinner bar
  const spinnerBar = document.getElementById('chat-spinner-bar');
  const spinnerLabel = document.getElementById('spinner-label');
  const spinnerElapsed = document.getElementById('spinner-elapsed');
  if (spinnerBar) spinnerBar.classList.remove('hidden');
  if (spinnerLabel) spinnerLabel.textContent = 'Thinking...';
  const spinnerStart = Date.now();
  let toolCallCount = 0;
  const spinnerTimer = setInterval(() => {
    const s = Math.round((Date.now() - spinnerStart) / 1000);
    if (spinnerElapsed) spinnerElapsed.textContent = `${s}s`;
    // Also update inline thinking elapsed
    const inlineTime = document.getElementById('thinking-time');
    if (inlineTime) inlineTime.textContent = `${s}s`;
  }, 1000);

  const assistantMsg = { role: 'assistant', content: '', tools: [], ts: Date.now() };
  chat.messages.push(assistantMsg);
  renderMessages();

  try {
    await API.streamChat(chat.sessionId, text || 'What can you see in this image?', {
      text_delta: (d) => {
        assistantMsg.content += d.text || '';
        if (spinnerLabel) spinnerLabel.textContent = 'Generating...';
        updateStreamingMessage(chat);
      },
      tool_call: (d) => {
        toolCallCount++;
        assistantMsg.tools.push({ name: d.name, args: d.args });
        if (spinnerLabel) spinnerLabel.textContent = `Tool: ${d.name} (${toolCallCount})`;
        // Update inline thinking label too
        const inlineLabel = document.getElementById('thinking-status');
        if (inlineLabel) inlineLabel.textContent = `${d.name}... (${toolCallCount})`;
        updateStreamingMessage(chat);
      },
      tool_result: (d) => {
        const tool = assistantMsg.tools.find(t => t.name === d.name && t.result === undefined);
        if (tool) tool.result = d.result;
        updateStreamingMessage(chat);
      },
      tool_output: (d) => {
        // Append streaming line to the matching tool
        const tool = assistantMsg.tools.find(t => t.result === undefined);
        if (tool) {
          tool.streamOutput = (tool.streamOutput || '') + (d.line || '') + '\n';
          updateStreamingMessage(chat);
        }
      },
      fallback: (d) => {
        // Show fallback notice in spinner area
        if (d.status === 'retry') {
          if (spinnerLabel) spinnerLabel.textContent = `Retrying ${d.model} (${d.attempt}/${d.max_retries})...`;
        } else if (d.status === 'switch') {
          if (spinnerLabel) spinnerLabel.textContent = `Falling back to ${d.to}...`;
          assistantMsg.fallbackNotice = `Using fallback: ${d.to} (primary ${d.from} unavailable)`;
        }
      },
      done: (d) => {
        if (d.text && !assistantMsg.content) assistantMsg.content = d.text;
        assistantMsg.tokens = d.tokens;
        assistantMsg.model = d.model || '';
        assistantMsg.cost = d.cost || null;
        chat.totalTokens += d.tokens || 0;
        if (d.cost != null) chat.sessionCost = d.cost;
        if (d.fallback_model) {
          assistantMsg.fallbackNotice = `Using fallback: ${d.fallback_model} (primary ${d.original_model || d.model} unavailable)`;
          assistantMsg.model = d.fallback_model;
        }
      },
      error: (d) => {
        assistantMsg.content += `\n\n**Error:** ${d.message || 'Unknown error'}`;
      },
    }, chat.model);
  } catch (e) {
    if (e.name !== 'AbortError') {
      let errMsg = e.message || String(e);
      if (errMsg === 'Load failed' || errMsg === 'Failed to fetch') {
        errMsg = 'Connection to server lost — the response may have been too large or the server encountered an error. Try again or check server logs.';
      }
      assistantMsg.content += `\n\n**Error:** ${errMsg}`;
    }
  } finally {
    chat.streaming = false;
    clearInterval(spinnerTimer);
    if (spinnerBar) spinnerBar.classList.add('hidden');
    dom.btnStop.classList.add('hidden');
    dom.btnSend.disabled = false;
    renderMessages();
    updateStatusBar();
    renderAgentCards();
    // Refresh session list to update title/message count
    if (chat.agent && state.agentSessions[chat.agent]) {
      state.agentSessions[chat.agent].loaded = false;
      loadAgentSessions(chat.agent);
    }
  }
}

async function stopGeneration() {
  const chat = state.activeChat;
  if (!chat || !chat.sessionId) return;
  try {
    await API.cancelChat(chat.sessionId);
  } catch {}
}

// ─── Status Bar ─────────────────────────────────────────────
function updateStatusBar() {
  const chat = state.activeChat;
  const agentLabel = chat?.agent ? `${chat.agent}${state.currentProject ? ' / ' + state.currentProject : ''}` : '';
  dom.statusAgent.textContent = agentLabel;
  dom.statusModel.textContent = chat?.model || '';
  const costStr = chat?.sessionCost != null ? ` · $${chat.sessionCost.toFixed(2)}` : '';
  dom.statusTokens.textContent = chat?.totalTokens ? `${chat.totalTokens} tokens${costStr}` : '';
  dom.statusSession.textContent = chat?.sessionId ? `${chat.sessionId.substring(0, 8)}` : '';
  // Hide separators when no data
  const footer = dom.statusAgent.closest('footer');
  if (footer) {
    const seps = footer.querySelectorAll('.text-text-muted');
    seps.forEach((sep, i) => {
      if (i === 0) sep.style.display = agentLabel && chat?.model ? '' : 'none';
      if (i === 1) sep.style.display = chat?.model && chat?.totalTokens ? '' : 'none';
    });
  }
}

  const agentData = state.agents.find(a => getAgentName(a) === agentName);
  const isTeamHead = agentData && agentData.is_team_head;
  modal.innerHTML = `
    <div class="modal-content p-6">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>

// ─── Memory Summary Helpers ─────────────────────────────────
window.memorySummaryAction = async function(agentName, action) {
  if (action === 'reset' && !confirm("Permanently delete this agent's memory summary? This cannot be undone.")) return;
  try {
    await API.post(`/v1/agents/${encodeURIComponent(agentName)}/memory-summary`, { action });
    showToast(action === 'reset' ? 'Memory summary reset' : 'Memory summary refresh scheduled');
    if (action === 'reset') {
      const editor = document.getElementById('memory-summary-editor');
      if (editor) editor.value = '';
    }
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.memorySummarySave = async function(agentName) {
  const editor = document.getElementById('memory-summary-editor');
  if (!editor) return;
  try {
    await API.post(`/v1/agents/${encodeURIComponent(agentName)}/memory-summary`, {
      action: 'update',
      content: editor.value,
    });
    showToast('Memory summary saved');
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.memorySummaryTogglePause = async function(agentName, pause) {
  try {
    // Read current agent.json, update paused state, save
    const res = await API.getAgentFile(agentName, 'agent.json');
    const content = typeof res === 'string' ? res : (res.content || JSON.stringify(res, null, 2));
    const parsed = JSON.parse(typeof res === 'object' && res.content ? res.content : content);
    if (!parsed.memory_summary) parsed.memory_summary = {};
    parsed.memory_summary.paused = pause;
    await API.writeAgentFile(agentName, 'agent.json', JSON.stringify(parsed, null, 2));
    showToast(pause ? 'Memory paused — existing summary preserved but not used or updated' : 'Memory resumed');
    loadConfigTabContent('memory', agentName);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.showProjectSubTab = function(btn, tabName) {
  // Toggle sub-tab visibility
  ['documents', 'folders', 'psettings'].forEach(t => {
    const panel = document.getElementById('ptab-' + t);
    if (panel) panel.style.display = t === tabName ? '' : 'none';
  });
  btn.closest('.flex')?.querySelectorAll('.config-tab').forEach(t => t.classList.toggle('active', t === btn));
};

window.saveProjectSettings = async function(agentName, projectName) {
  const name = document.getElementById('proj-name')?.value?.trim();
  const desc = document.getElementById('proj-desc')?.value?.trim();
  const tagsStr = document.getElementById('proj-tags')?.value?.trim();
  const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];
  try {
    await API.updateProject(agentName, projectName, { name, description: desc, tags });
    showToast('Project settings saved');
    await loadAgentProjects(agentName);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.deleteProjectDoc = async function(agentName, projectName, sourceHash) {
  if (!confirm('Delete all chunks from this document?')) return;
  try {
    const path = `/v1/agents/${encodeURIComponent(agentName)}/projects/${encodeURIComponent(projectName)}/ingested/${encodeURIComponent(sourceHash)}`;
    await API.del(path);
    showToast('Document chunks deleted');
    openProjectDetail(agentName, projectName);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

  return {

async function ingestFileObject(file, agentName, projectName) {
  const progress = document.getElementById('ingest-progress');
  const label = document.getElementById('ingest-progress-label');
  if (progress) progress.style.display = '';
  if (label) label.textContent = `Ingesting ${file.name}...`;

  const opts = getIngestOptions();

  // For now, send file_path or name — the server will handle actual upload
  // In a full implementation this would be multipart upload
  const data = {
    file_name: file.name,
    file_size: file.size,
    ...opts,
  };

  try {
    // Read file as base64 for upload
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    data.file_data = base64;

    const endpoint = projectName
      ? `/v1/agents/${encodeURIComponent(agentName)}/projects/${encodeURIComponent(projectName)}/ingest`
      : `/v1/agents/${encodeURIComponent(agentName)}/ingest`;
    const res = await API.post(endpoint, data);

    if (res.error) {
      if (label) label.textContent = `Error: ${res.error}`;
    } else {
      if (label) label.textContent = `Done! ${res.chunks || 0} chunks from ${file.name}`;
      showToast(`Ingested ${file.name}: ${res.chunks || 0} chunks`);
      // Refresh projects
      await loadAgentProjects(agentName);
    }
  } catch (e) {
    if (label) label.textContent = `Error: ${e.message}`;
    showToast(`Ingest error: ${e.message}`, true);
  }
}

window.ingestUrl = async function(agentName, projectName) {

function formatElapsed(ms) {
  if (ms < 0) ms = 0;
  const secs = Math.floor(ms / 1000);
  const mins = Math.floor(secs / 60);
  const hrs = Math.floor(mins / 60);
  if (hrs > 0) return `${hrs}h ${mins % 60}m ${secs % 60}s`;
  if (mins > 0) return `${mins}m ${secs % 60}s`;
  return `${secs}s`;
}

function updateElapsedTimers() {
  document.querySelectorAll('.running-elapsed').forEach(el => {
    const started = parseInt(el.dataset.started);
    if (started) el.textContent = formatElapsed(Date.now() - started);
  });
}

function startRunningTasksRefresh(agentName) {
  stopRunningTasksRefresh();
  // Update elapsed every second
  const elapsedTimer = setInterval(updateElapsedTimers, 1000);
  // Refresh running tasks from server every 5 seconds
  const refreshTimer = setInterval(() => refreshRunningTasks(agentName), 5000);
  _runningTasksInterval = { elapsedTimer, refreshTimer };
}

function stopRunningTasksRefresh() {
  if (_runningTasksInterval) {
    clearInterval(_runningTasksInterval.elapsedTimer);
    clearInterval(_runningTasksInterval.refreshTimer);
    _runningTasksInterval = null;
  }
}

async function refreshRunningTasks(agentName) {
  // Only refresh if schedule tab is still open
  if (state.configTab !== 'schedule') { stopRunningTasksRefresh(); return; }
  const section = _q('running-tasks-section');
  const body = _q('running-tasks-body');
  if (!section || !body) { stopRunningTasksRefresh(); return; }
  try {
    const res = await API.getRunningTasks();
    const running = (res.running || []).filter(r => r.agent === agentName);
    if (running.length > 0) {
      section.style.display = 'block';
      // Preserve expanded log rows
      const expandedLogs = new Set();
      body.querySelectorAll('.running-log-row:not(.hidden)').forEach(row => {
        expandedLogs.add(row.dataset.logTask);
      });
      body.innerHTML = renderRunningTasksRows(running);
      // Re-expand previously expanded logs
      expandedLogs.forEach(name => {
        const logRow = body.querySelector(`.running-log-row[data-log-task="${name}"]`);
        if (logRow) logRow.classList.remove('hidden');
      });
      // Auto-scroll expanded log containers to bottom
      body.querySelectorAll('.running-log-row:not(.hidden) .running-log-content').forEach(el => {
        el.scrollTop = el.scrollHeight;
      });
    } else {
      section.style.display = 'none';
      body.innerHTML = '';
    }
  } catch (e) {
    // Silently ignore refresh errors
  }
}

// Robust element finder — tries multiple strategies
function _q(id) {
  // 1. Try inside the config modal overlay
  const modals = document.querySelectorAll('.modal-overlay');
  for (const m of modals) {
    const el = m.querySelector('#' + id);
    if (el) return el;
  }
  // 2. Global fallback
  return document.getElementById(id);
}

function buildScheduleFromUI() {
  const type = _q('sched-freq-type')?.value;
  const time = _q('sched-time')?.value;
  const interval = _q('sched-interval')?.value;
  const day = _q('sched-day')?.value;
  const date = _q('sched-date')?.value;
  const dayNames = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

  if (type === 'every-min') return `every ${parseInt(interval) || 30}m`;
  if (type === 'every-hr') return `every ${parseInt(interval) || 1}h`;
  if (type === 'daily') return `daily ${time || '09:00'}`;
  if (type === 'weekly') return `weekly ${dayNames[parseInt(day) || 0]} ${time || '09:00'}`;
  if (type === 'once') {
    if (!date) { showToast('Please select a date for one-time schedule', true); return null; }
    return `once ${date} ${time || '09:00'}`;
  }
  return `daily ${time || '09:00'}`;
}

window.editScheduleTask = function(taskJson) {
  try {
    const t = typeof taskJson === 'string' ? JSON.parse(taskJson) : taskJson;
    // Fill in form fields
    const nameEl = _q('sched-task-name');
    const msgEl = _q('sched-task-message');
    const agentEl = _q('sched-agent-select');
    const modelEl = _q('sched-model-override');
    const freqEl = _q('sched-freq-type');
    const editingEl = _q('sched-editing-name');
    const titleEl = _q('sched-form-title');
    const submitBtn = _q('sched-submit-btn');
    const cancelBtn = _q('sched-cancel-edit');

    if (nameEl) { nameEl.value = t.name || ''; nameEl.readOnly = true; nameEl.style.opacity = '0.6'; }
    if (msgEl) msgEl.value = t.task || '';
    if (agentEl) agentEl.value = t.agent || 'main';
    if (modelEl) modelEl.value = t.model || '';
    const timeoutEl = _q('sched-timeout');
    if (timeoutEl) timeoutEl.value = Math.round((t.timeout || 300) / 60);
    if (editingEl) editingEl.value = t.name || '';
    if (titleEl) titleEl.textContent = 'Edit Scheduled Task';
    if (submitBtn) submitBtn.textContent = 'Save Changes';
    if (cancelBtn) cancelBtn.classList.remove('hidden');

    // Parse schedule string to set frequency type and details
    const sched = (t.schedule || '').toLowerCase();
    if (sched.startsWith('every') && sched.endsWith('m')) {
      if (freqEl) freqEl.value = 'every-min';
      updateScheduleFreqUI();
      const intEl = _q('sched-interval');
      if (intEl) intEl.value = parseInt(sched.replace(/\D/g, '')) || 30;
    } else if (sched.startsWith('every') && sched.endsWith('h')) {
      if (freqEl) freqEl.value = 'every-hr';
      updateScheduleFreqUI();
      const intEl = _q('sched-interval');
      if (intEl) intEl.value = parseInt(sched.replace(/\D/g, '')) || 1;
    } else if (sched.startsWith('daily')) {
      if (freqEl) freqEl.value = 'daily';
      updateScheduleFreqUI();
      const timeEl = _q('sched-time');
      if (timeEl) timeEl.value = sched.split(' ')[1] || '09:00';
    } else if (sched.startsWith('weekly')) {
      if (freqEl) freqEl.value = 'weekly';
      updateScheduleFreqUI();
      const parts = sched.split(' ');
      const dayMap = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };
      const dayEl = _q('sched-day');
      const timeEl = _q('sched-time');
      if (dayEl && parts[1]) dayEl.value = dayMap[parts[1]] ?? 1;
      if (timeEl && parts[2]) timeEl.value = parts[2];
    } else if (sched.startsWith('once')) {
      if (freqEl) freqEl.value = 'once';
      updateScheduleFreqUI();
      const parts = sched.split(' ');
      const dateEl = _q('sched-date');
      const timeEl = _q('sched-time');
      if (dateEl && parts[1]) dateEl.value = parts[1];
      if (timeEl && parts[2]) timeEl.value = parts[2];
    }

    // Scroll to form
    document.getElementById('sched-form-title')?.scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    showToast('Error loading task for edit', 'error');
  }
};

window.installFromUrl = async function(agentName) {
  const url = document.getElementById('skill-url')?.value?.trim();
  if (!url) { showToast('Enter a ClawHub or GitHub URL', 'error'); return; }

  // Parse URL: https://clawhub.ai/author/skill or https://github.com/openclaw/skills/.../author/skill
  let author = '', skillName = '';
  try {
    const u = new URL(url);
    const parts = u.pathname.replace(/^\/+|\/+$/g, '').split('/');
    if (u.hostname.includes('clawhub')) {
      // clawhub.ai/author/skill-name
      if (parts.length >= 2) { author = parts[0]; skillName = parts[1]; }
    } else if (u.hostname.includes('github.com')) {
      // github.com/openclaw/skills/.../skills/author/skill-name
      const idx = parts.indexOf('skills', 2);
      if (idx >= 0 && parts.length > idx + 2) { author = parts[idx + 1]; skillName = parts[idx + 2]; }
    }
  } catch {}

  if (!author || !skillName) {
    showToast('Could not parse URL. Expected: https://clawhub.ai/author/skill-name', 'error');
    return;
  }

  showToast(`Installing ${author}/${skillName}...`);
  try {
    const res = await API.post('/v1/skills/install', { skill: skillName, author, agent: agentName });
    if (res.error) {
      showToast(res.error, 'error');
    } else {
      showToast(`Installed "${skillName}" from ${author}`);
      document.getElementById('skill-url').value = '';
      if (state.configAgent === agentName && state.configTab === 'skills') {
        loadConfigTabContent('skills', agentName);
      }
    }
  } catch (e) {
    showToast(e.message, 'error');
  }
};

window.installFromZip = async function(event, agentName) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith('.zip')) { showToast('Please select a .zip file', 'error'); return; }

  showToast(`Uploading ${file.name}...`);
  const reader = new FileReader();
  reader.onload = async function(e) {
    // Convert to base64
    const base64 = btoa(new Uint8Array(e.target.result).reduce((s, b) => s + String.fromCharCode(b), ''));
    const name = file.name.replace('.zip', '').replace(/[^a-zA-Z0-9_-]/g, '-');
    try {
      const res = await API.post('/v1/skills/install-zip', { zip_data: base64, agent: agentName, name });
      if (res.error) {
        showToast(res.error, 'error');
      } else {
        showToast(`Installed "${res.skill}" (${(res.files || []).length} files)`);
        if (state.configAgent === agentName && state.configTab === 'skills') {
          loadConfigTabContent('skills', agentName);
        }
      }
    } catch (e) {
      showToast(e.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';  // reset file input
};

window.handleAvatarUpload = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  // Resize to 64x64 and convert to base64
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      // Center crop to square
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2;
      const sy = (img.height - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, 64, 64);
      const dataUrl = canvas.toDataURL('image/png');
      // Set as avatar value
      const hidden = document.getElementById('cfg-avatar');
      if (hidden) hidden.value = dataUrl;
      // Update preview
      const preview = document.getElementById('custom-avatar-preview');
      if (preview) preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
      // Highlight upload button, deselect presets
      document.querySelectorAll('#avatar-picker .avatar-pick').forEach(btn => {
        btn.classList.remove('border-accent', 'bg-accent/10');
        btn.classList.add('border-transparent');
      });
      const uploadBtn = document.getElementById('btn-avatar-upload');
      if (uploadBtn) {
        uploadBtn.classList.add('border-accent', 'bg-accent/10');
        uploadBtn.classList.remove('border-transparent');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveAgentSettings = async function(agentName) {
  const raw = $('#cfg-raw-json')?.value;
  if (raw === undefined) return;
  try {
    const parsed = JSON.parse(raw);
    // Sync form fields into parsed JSON
    const displayNameVal = $('#cfg-display-name')?.value;
    const descVal = $('#cfg-description')?.value;
    const modelVal = $('#cfg-model')?.value;
    const avatarVal = $('#cfg-avatar')?.value;
    if (displayNameVal !== undefined) parsed.display_name = displayNameVal || undefined;
    if (descVal !== undefined) parsed.description = descVal;
    if (modelVal !== undefined) parsed.model = modelVal || undefined;
    // Handle model_purpose for auto mode
    const purposeVal = $('#cfg-model-purpose')?.value;
    if (modelVal === 'auto' && purposeVal) {
      parsed.model_purpose = purposeVal;
    } else {
      delete parsed.model_purpose;
    }
    // Remove legacy max_context from agent config (now a model-level property)
    delete parsed.max_context;
    if (avatarVal) parsed.avatar = avatarVal;
    // Sync memory_summary settings
    const msEnabled = $('#cfg-memsummary-enabled')?.checked;
    if (msEnabled !== undefined) {
      const msFreq = $('#cfg-memsummary-frequency')?.value || 'every 24h';
      const msTime = $('#cfg-memsummary-start-time')?.value || '03:00';
      const existingPaused = parsed.memory_summary?.paused || false;
      parsed.memory_summary = {
        enabled: msEnabled,
        paused: existingPaused,
        frequency: msFreq,
        start_time: msTime,
      };
    }
    const finalJson = JSON.stringify(parsed, null, 2);
    await API.writeAgentFile(agentName, 'agent.json', finalJson);
    showToast('Settings saved');
    // Reload agents data and refresh UI
    try {
      const agentsData = await API.getAgents();
      state.agents = Array.isArray(agentsData) ? agentsData : (agentsData.agents || []);
      if (agentsData.team_structure) state.teamStructure = agentsData.team_structure;
      renderAgentCards();
      updateChatArea();
    } catch {}
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.renameAgent = async function(oldName) {
  const newName = $('#cfg-agent-id')?.value?.trim();
  if (!newName || newName === oldName) return;
  if (!/^[a-zA-Z0-9_-]+$/.test(newName)) {
    showToast('Agent ID must be alphanumeric (hyphens/underscores allowed)', true);
    return;
  }
  try {
    const res = await API.post('/v1/agents/rename', { agent: oldName, new_name: newName });
    if (res.error) throw new Error(res.error);
    showToast(`Renamed to ${newName}`);
    // Update local state: rename in agentChats, agentSessions, activeAgentId
    if (state.agentChats[oldName]) {
      state.agentChats[newName] = { ...state.agentChats[oldName], agent: newName };
      delete state.agentChats[oldName];
    }
    if (state.agentSessions[oldName]) {
      state.agentSessions[newName] = state.agentSessions[oldName];
      delete state.agentSessions[oldName];
    }
    if (state.activeAgentId === oldName) state.activeAgentId = newName;
    // Reload agents list
    const agentsData2 = await API.getAgents();
    state.agents = Array.isArray(agentsData2) ? agentsData2 : (agentsData2.agents || []);
    if (agentsData2.team_structure) state.teamStructure = agentsData2.team_structure;
    renderAgentCards();
    updateChatArea();
    // Reopen config modal for new name on settings tab
    document.getElementById('config-modal')?.remove();
    state.configAgent = newName;
    state.configTab = 'settings';
    openConfigModal(newName);
    // Switch to settings tab
    const modal = document.getElementById('config-modal');
    if (modal) {
      const settingsTab = modal.querySelector('[data-tab="settings"]');
      if (settingsTab) settingsTab.click();
    }
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

// ─── NOTIFICATION SYSTEM ────────────────────────────────────
let _notifDropdownOpen = false;
let _notifPollTimer = null;

async function pollNotifications() {
  try {
    const res = await API.get('/v1/notifications/unread');
    const badge = document.getElementById('notif-badge');
    if (badge) {
      const count = res.unread || 0;
      badge.textContent = count > 9 ? '9+' : String(count);
      badge.classList.toggle('hidden', count === 0);
    }
  } catch {}
}

function startNotifPolling() {
  pollNotifications();
  _notifPollTimer = setInterval(pollNotifications, 30000);
}

async function toggleNotificationDropdown() {
  const existing = document.getElementById('notif-dropdown');
  if (existing) { existing.remove(); _notifDropdownOpen = false; return; }
  _notifDropdownOpen = true;

  // Mark all as read
  try { await API.post('/v1/notifications/read', {}); } catch {}

  const res = await API.get('/v1/notifications');
  const notifs = res.notifications || [];

  const dd = document.createElement('div');
  dd.id = 'notif-dropdown';
  dd.style.cssText = 'position:fixed;bottom:50px;left:60px;width:360px;max-height:400px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:9999;padding:8px 0';

  const sevIcon = (s) => s === 'critical' || s === 'error' ? '<span style="color:#f87171">!!</span>' : s === 'warning' ? '<span style="color:#ff8700">!</span>' : '<span style="color:#5f87ff">i</span>';
  const timeAgo = (ts) => {
    const diff = (Date.now() - new Date(ts).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  };

  if (notifs.length === 0) {
    dd.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">No notifications</div>';
  } else {
    dd.innerHTML = `
      <div style="padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;font-weight:600;color:var(--text-primary)">Notifications</span>
        <button onclick="dismissAllNotifications()" style="font-size:10px;color:var(--text-muted);background:none;border:none;cursor:pointer">Clear all</button>
      </div>
      ${notifs.slice(0, 20).map(n => `
        <div class="notif-item" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:8px;align-items:flex-start" onclick="dismissNotification('${esc(n.id)}', this)">
          <div style="font-size:12px;flex-shrink:0;margin-top:2px">${sevIcon(n.severity)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n.title)}</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(n.message)}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:3px">${n.agent ? esc(n.agent) + ' · ' : ''}${timeAgo(n.created_at)}</div>
          </div>
        </div>
      `).join('')}
    `;
  }

  document.body.appendChild(dd);
  pollNotifications();

  // Close on outside click
  setTimeout(() => {
    const handler = (e) => {
      if (!dd.contains(e.target) && e.target.id !== 'btn-notifications') {
        dd.remove(); _notifDropdownOpen = false;
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('click', handler);
  }, 100);
}

async function dismissNotification(id, el) {
  try {
    await API.post('/v1/notifications/dismiss', { id });
    if (el) el.style.display = 'none';
    pollNotifications();
  } catch {}
}

  try {
    await API.post('/v1/notifications/dismiss', { id: 'all' });

    _notifDropdownOpen = false;
    pollNotifications();
  } catch {}
}

    {group: 'Agents', items: [{id:'teams', label:'Teams'}, {id:'channels', label:'Channels'}, {id:'nodes', label:'Nodes'}, {id:'mcp', label:'MCP'}]},
    {group: 'Monitoring', items: [{id:'costs', label:'Costs'}, {id:'traces', label:'Traces'}, {id:'audit', label:'Audit'}, {id:'notifications', label:'Notifications'}]},
    {group: 'Data', items: [{id:'backup', label:'Backup'}]},
  ];
  const navHtml = stabs.map(g => `
    <div class="settings-nav-group">
      <div class="settings-nav-label">${g.group}</div>
      ${g.items.map(t => `<button class="settings-nav-item ${_settingsTab === t.id ? 'active' : ''}" onclick="switchSettingsTab('${t.id}')">${t.label}</button>`).join('')}
    </div>
  `).join('');
  modal.innerHTML = `
    <div class="modal-content p-0" style="max-width:1100px;height:80vh;display:flex;overflow:hidden">
      <nav class="settings-nav">
        <div style="padding:16px 16px 8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;color:var(--color-text-primary)">Settings</div>
        ${navHtml}
      </nav>
      <div class="settings-main">
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()" style="position:absolute;top:12px;right:16px">&times;</button>
        <div id="settings-content" class="space-y-6"></div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  loadSettingsTab();
}

function switchSettingsTab(tab) {
  _settingsTab = tab;
  document.querySelectorAll('#settings-modal .settings-nav-item').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === tab || b.textContent === tab);
  });
  loadSettingsTab();
}

async function loadSettingsTab() {
  const el = document.querySelector('#settings-modal #settings-content');
  if (!el) return;
  el.innerHTML = '<div class="text-text-muted text-sm">Loading...</div>';
  try {
    if (_settingsTab === 'server') await renderServerTab(el);
    else if (_settingsTab === 'qmd') await renderQmdTab(el);
    else if (_settingsTab === 'telegram') await renderTelegramTab(el);
    else if (_settingsTab === 'channels') await renderChannelsTab(el);
    else if (_settingsTab === 'nodes') await renderNodesTab(el);
    else if (_settingsTab === 'teams') await renderTeamsTab(el);
    else if (_settingsTab === 'providers') await renderProvidersTab(el);
    else if (_settingsTab === 'models') await renderModelsTab(el);
    else if (_settingsTab === 'costs') await renderCostsTab(el);
    else if (_settingsTab === 'traces') await renderTracesTab(el);
    else if (_settingsTab === 'audit') await renderAuditTab(el);
    else if (_settingsTab === 'mcp') await renderMcpTab(el);
    else if (_settingsTab === 'backup') await renderBackupTab(el);
    else if (_settingsTab === 'notifications') await renderNotificationsTab(el);
  } catch (e) {
    el.innerHTML = `<div class="text-error text-sm">Error: ${esc(e.message)}</div>`;
  }
}

function _fmtUptime(s) {
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
  return (d ? d + 'd ' : '') + (h ? h + 'h ' : '') + m + 'm';
}

window.restartServer = async function() {
  if (!confirm('Restart the server? Active streams will be interrupted.')) return;
  showToast('Restarting server...');
  await API.post('/v1/restart', {});
  setTimeout(async () => {
    for (let i = 0; i < 20; i++) {
      await new Promise(r => setTimeout(r, 1000));
      try { await API.getStatus(); showToast('Server restarted'); loadSettingsTab(); return; } catch {}
    }
    showToast('Server may still be restarting', 'error');
  }, 1000);
};

window.createNewTeam = async function() {
  const name = $('#new-team-name')?.value.trim();
  const desc = $('#new-team-desc')?.value.trim();
  const avatar = $('#new-team-avatar')?.value.trim();
  const sel = document.getElementById('new-team-members');
  const members = sel ? Array.from(sel.selectedOptions).map(o => o.value) : [];
  if (!members.length) { showToast('Select at least one member', true); return; }
  if (!name) { showToast('Team name is required', true); return; }
  try {
    await API.post('/v1/teams', { action: 'create', members, head: members[0], name, description: desc, avatar });
    showToast(`Team "${name}" created`);
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

window.saveTeamSettings = async function(teamId) {
  const card = document.querySelector(`[data-team-id="${CSS.escape(teamId)}"]`);
  if (!card) return;
  const name = card.querySelector('.team-edit-name')?.value.trim();
  const desc = card.querySelector('.team-edit-desc')?.value.trim();
  const avatar = card.querySelector('.team-edit-avatar')?.value.trim();
  const head = card.querySelector('.team-edit-head')?.value;
  try {
    const payload = { action: 'update', team_id: teamId };
    if (name !== undefined) payload.name = name;
    if (desc !== undefined) payload.description = desc;
    if (avatar !== undefined) payload.avatar = avatar;
    if (head) payload.head = head;
    await API.post('/v1/teams', payload);
    showToast('Team saved');
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

window.teamAddMember = async function(teamId) {
  const card = document.querySelector(`[data-team-id="${CSS.escape(teamId)}"]`);
  const sel = card?.querySelector('.team-add-select');
  const memberId = sel?.value;
  if (!memberId) { showToast('Select an agent', true); return; }
  try {
    const ts = state.teamStructure || {};
    const team = (ts.teams || {})[teamId];
    const current = (team?.members || []).map(m => typeof m === 'string' ? m : (m.id || m));
    await API.post('/v1/teams', { action: 'update', team_id: teamId, members: [...current, memberId] });
    showToast(`Added ${memberId}`);
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

window.teamRemoveMember = async function(teamId, memberId) {
  try {
    const ts = state.teamStructure || {};
    const team = (ts.teams || {})[teamId];
    const current = (team?.members || []).map(m => typeof m === 'string' ? m : (m.id || m));
    const updated = current.filter(m => m !== memberId);
    if (updated.length === 0) { showToast('Cannot remove last member — dissolve the team instead', true); return; }
    await API.post('/v1/teams', { action: 'update', team_id: teamId, members: updated });
    showToast(`Removed ${memberId}`);
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

async function renderQmdTab(el) {
  const svc = await API.get('/v1/services');
  const qmd = svc.qmd || {};
  const running = qmd.status === 'running';
  const collections = qmd.collections || [];
  el.innerHTML = `
    <div class="glass-card p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <span class="w-2.5 h-2.5 rounded-full ${running ? 'bg-success breathing-dot' : 'bg-error'}"></span>
          <span class="text-text-primary font-display font-semibold">${running ? 'Running' : 'Stopped'}</span>
          <span class="text-text-muted text-xs mono">port ${qmd.port || 8181}</span>
        </div>
        <div class="flex items-center gap-2">
          ${running
            ? `<button onclick="qmdAction('stop')" class="btn-secondary text-xs px-3 py-1.5 rounded-lg">Stop</button>
               <button onclick="qmdAction('reindex')" class="btn-primary text-xs px-3 py-1.5 rounded-lg">Reindex All</button>`
            : `<button onclick="qmdAction('start')" class="btn-primary text-xs px-3 py-1.5 rounded-lg">Start</button>`}
        </div>
      </div>
      <div class="flex items-center justify-between">
        <div class="text-xs text-text-muted">Hybrid search: BM25 + vector + LLM reranking</div>
        <button onclick="toggleServiceLog('qmd')" class="btn-secondary text-xs px-3 py-1 rounded-lg">View Log</button>
      </div>
    </div>
    <div id="log-qmd" class="hidden mt-4"></div>
    ${collections.length ? `
    <div class="glass-card p-6">
      <h3 class="section-header mb-3 text-sm">Collections</h3>
      ${(() => {
        const totFiles = collections.reduce((s,c) => s + (c.total||0), 0);
        const totIndexed = collections.reduce((s,c) => s + (c.indexed||0), 0);
        const totEmbedded = collections.reduce((s,c) => s + (c.embedded||0), 0);
        const totStale = collections.reduce((s,c) => s + (c.stale||0), 0);
        const totNotIdx = collections.reduce((s,c) => s + (c.not_indexed||0), 0);
        const allOk = totFiles > 0 && totIndexed === totFiles && totEmbedded === totFiles;
        if (!totFiles) return '';
        const dot = allOk ? 'bg-green-400' : 'bg-yellow-400';
        let issues = '';
        if (!allOk) {
          const parts = [];
          if (totNotIdx > 0) parts.push(totNotIdx + ' not indexed');
          if (totStale > 0) parts.push(totStale + ' stale');
          if (totEmbedded < totFiles) parts.push((totFiles - totEmbedded) + ' not embedded');
          issues = ' · <span class="text-yellow-400">' + parts.join(', ') + '</span>';
        }
        return '<div class="flex items-center gap-3 mb-4 px-1 text-xs mono text-text-muted">' +
          '<span class="inline-block w-2 h-2 rounded-full ' + dot + '"></span>' +
          '<span>' + totFiles + ' files</span>' +
          '<span class="text-border">|</span>' +
          '<span>' + totIndexed + '/' + totFiles + ' indexed</span>' +
          '<span class="text-border">|</span>' +
          '<span>' + totEmbedded + '/' + totFiles + ' embedded</span>' +
          issues +
        '</div>';
      })()}
      <div class="space-y-2" id="qmd-collections">
        ${(() => {
          const ts = state.teamStructure || {};
          const teams = ts.teams || {};
          const collMap = {};
          collections.forEach(c => {
            const n = typeof c === 'string' ? c : (c.name || c.id || '?');
            collMap[n] = c;
          });
          const inTeam = new Set();
          Object.keys(teams).forEach(h => { inTeam.add(h); (teams[h].members||[]).forEach(m => inTeam.add(m.id || m)); });

          function renderCollRow(c) {
            const name = typeof c === 'string' ? c : (c.name || c.id || '?');
            const total = c.total || 0;
            const indexed = c.indexed || 0;
            const embedded = c.embedded || 0;
            const stale = c.stale || 0;
            const notIndexed = c.not_indexed || 0;
            const hasIssues = stale > 0 || notIndexed > 0;
            const allGood = total > 0 && indexed === total && embedded === total;
            // Build compact stats
            let statsHtml = '';
            if (total > 0) {
              const dot = allGood ? 'bg-green-400' : hasIssues ? 'bg-yellow-400' : 'bg-green-400';
              statsHtml = '<span class="inline-block w-1.5 h-1.5 rounded-full ' + dot + ' mr-1"></span>';
              statsHtml += '<span class="text-text-muted text-[10px] mono">' + total + ' files';
              if (hasIssues) {
                const parts = [];
                if (notIndexed > 0) parts.push(notIndexed + ' not indexed');
                if (stale > 0) parts.push(stale + ' stale');
                if (embedded < total) parts.push((total - embedded) + ' not embedded');
                statsHtml += ' · <span class="text-yellow-400">' + parts.join(', ') + '</span>';
              }
              statsHtml += '</span>';
            }
            return '<div class="border border-border/50 rounded-lg overflow-hidden" data-collection="' + esc(name) + '">' +
              '<div class="flex items-center justify-between px-4 py-2.5">' +
                '<div class="flex items-center gap-2">' +
                  '<button class="qmd-expand-btn text-text-muted hover:text-accent transition-colors text-[10px]" onclick="toggleQmdDocs(\'' + esc(name) + '\')" title="Browse files">▶</button>' +
                  '<span class="text-text-primary font-medium text-sm">' + esc(name) + '</span>' +
                  statsHtml +
                '</div>' +
                '<button onclick="qmdAction(\'reindex\',\'' + esc(name) + '\')" class="btn-secondary text-xs px-3 py-1 rounded-lg">Reindex</button>' +
              '</div>' +
              '<div class="qmd-docs-panel hidden border-t border-border/30 bg-base/40"></div>' +
            '</div>';
          }

          let html = '';
          // Render team groups
          Object.keys(teams).forEach(headId => {
            const team = teams[headId];
            const teamName = team.name || (team.head && (team.head.display_name || team.head.id)) || headId;
            const teamAvatar = team.avatar || '';
            const memberIds = (team.members || []).map(m => m.id || m);
            const teamCollIds = [...new Set([headId, ...memberIds])].filter(id => collMap[id]);
            if (teamCollIds.length) {
              html += '<div class="border border-border/30 rounded-lg p-2 mb-2 bg-surface/30">' +
                '<div class="text-[10px] text-text-muted uppercase tracking-wider font-bold mb-1.5 px-2">' + (teamAvatar ? esc(teamAvatar) + ' ' : '') + esc(teamName) + '</div>' +
                '<div class="space-y-1">' + teamCollIds.map(id => renderCollRow(collMap[id])).join('') + '</div></div>';
            }
          });
          // Render standalone
          collections.forEach(c => {
            const name = typeof c === 'string' ? c : (c.name || c.id || '?');
            if (!inTeam.has(name)) html += renderCollRow(c);
          });
          return html;
        })()}
      </div>
    </div>` : ''}`;
}

window.qmdAction = async function(action, collection) {
  showToast(`QMD: ${action}${collection ? ' ' + collection : ''}...`);
  try {
    const r = await API.post('/v1/services/qmd', { action, collection });
    showToast(`QMD: ${r.status || action}`);
    setTimeout(() => loadSettingsTab(), 1500);
  } catch (e) { showToast(e.message, 'error'); }
};

window.toggleQmdDocs = async function(collection) {
  const row = document.querySelector(`[data-collection="${CSS.escape(collection)}"]`);
  if (!row) return;
  const panel = row.querySelector('.qmd-docs-panel');
  const btn = row.querySelector('.qmd-expand-btn');
  if (!panel) return;

  if (!panel.classList.contains('hidden')) {
    panel.classList.add('hidden');
    if (btn) btn.textContent = '▶';
    return;
  }

  panel.classList.remove('hidden');
  if (btn) btn.textContent = '▼';
  panel.innerHTML = '<div class="text-text-muted text-xs px-4 py-3">Loading...</div>';

  try {
    const r = await API.get(`/v1/services/qmd/docs?collection=${encodeURIComponent(collection)}`);
    const files = r.files || [];
    if (!files.length) {
      panel.innerHTML = '<div class="text-text-muted text-xs px-4 py-3">No .md files found.</div>';
      return;
    }
    panel.innerHTML = `
      <div class="divide-y divide-border/20">

window.viewQmdFile = async function(collection, filename) {
  let modal = document.getElementById('qmd-file-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'qmd-file-modal';
    modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-6';
    modal.style.background = 'rgba(0,0,0,0.7)';
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    document.body.appendChild(modal);
  }
  modal.innerHTML = '<div class="glass-card p-5 max-w-3xl w-full max-h-[80vh] flex flex-col gap-3"><div class="text-text-muted text-xs">Loading...</div></div>';

    const r = await API.get(`/v1/services/qmd/docs?collection=${encodeURIComponent(collection)}&file=${encodeURIComponent(filename)}`);

    const isReadOnly = ['soul.md','agent.json','mcp.json','gmail.json'].includes(filename) || filename.startsWith('skills/');
    modal.innerHTML = `
      <div class="glass-card p-5 max-w-3xl w-full max-h-[80vh] flex flex-col gap-3">
        <div class="flex items-center justify-between flex-shrink-0">
          <div>
