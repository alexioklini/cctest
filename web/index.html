<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

tailwind.config = {

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; font-family: 'Inter', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3c55; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4c65; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .fade-in { animation: fadeIn 0.2s ease-in; }

  .msg-content code:not(pre code) { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: #2e3050; padding: 0.15em 0.4em; border-radius: 0.25rem; }

  .msg-content ul, .msg-content ol { margin: 0.5em 0; padding-left: 1.5em; }
  .msg-content li { margin: 0.2em 0; }

  .msg-content h1 { font-size: 1.3em; }

  .chat-input-area { background: linear-gradient(to top, #181926 60%, transparent); }
  .tab-active { background: #2e3050; border-bottom: 2px solid #ff8700; }

<script>
// ─── Configuration ──────────────────────────────────────────
const BASE_URL = window.location.origin;

// ─── Markdown Setup ─────────────────────────────────────────
marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch {}
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true,
});

// ─── API Client ─────────────────────────────────────────────
class API {
  static async get(path) {
    const res = await fetch(`${BASE_URL}${path}`);
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    return res.json();
  }

  static async post(path, body) {
    const res = await fetch(`${BASE_URL}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`POST ${path}: ${res.status}`);
    return res.json();
  }

  static async del(path) {
    const res = await fetch(`${BASE_URL}${path}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`DELETE ${path}: ${res.status}`);
    return res.json();
  }

  static async streamChat(sessionId, message, callbacks) {
    const res = await fetch(`${BASE_URL}/v1/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message }),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`Chat error: ${err}`);
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const raw = line.slice(6);
          try {
            const data = JSON.parse(raw);
            if (callbacks[eventType]) callbacks[eventType](data);
          } catch {}
        }
      }
    }
  }

  static async getStatus() { return this.get('/v1/status'); }
  static async getAgents() { return this.get('/v1/agents'); }
  static async getAgentFiles(id) { return this.get(`/v1/agents/${encodeURIComponent(id)}/files`); }
  static async getAgentFile(id, name) { return this.get(`/v1/agents/${encodeURIComponent(id)}/file?name=${encodeURIComponent(name)}`); }
  static async writeAgentFile(id, name, content) { return this.post(`/v1/agents/${encodeURIComponent(id)}/file`, { name, content }); }
  static async createAgent(agent, description, soul) { return this.post('/v1/agents/create', { agent, description, soul }); }
  static async switchAgent(sessionId, agent) { return this.post('/v1/agents/switch', { session_id: sessionId, agent }); }
  static async getModels() { return this.get('/v1/models'); }
  static async getProviders() { return this.get('/v1/providers'); }
  static async createSession(agent, model) { return this.post('/v1/sessions', { agent, model }); }
  static async deleteSession(id) { return this.del(`/v1/sessions/${id}`); }
  static async cancelChat(sessionId) { return this.post('/v1/chat/cancel', { session_id: sessionId }); }
  static async getSchedule() { return this.get('/v1/schedule'); }
  static async manageSchedule(body) { return this.post('/v1/schedule', body); }
  static async getTasks() { return this.get('/v1/tasks'); }
}

// ─── App State ──────────────────────────────────────────────
class AppState {
  constructor() {
    this.connected = false;
    this.agents = [];
    this.models = [];
    this.providers = [];
    this.sessions = [];
    this.chats = []; // { id, sessionId, agent, model, messages[], streaming }
    this.activeChatIdx = -1;
    this.currentView = 'chat';
    this.serverInfo = null;
    this.abortControllers = {};
  }

  get activeChat() {
    return this.activeChatIdx >= 0 ? this.chats[this.activeChatIdx] : null;
  }
}

const state = new AppState();

// ─── DOM Refs ───────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const dom = {
  connDot: $('#conn-dot'),
  connLabel: $('#conn-label'),
  serverUrl: $('#server-url'),
  sidebar: $('#sidebar'),
  expandBtn: $('#btn-expand-sidebar'),
  chatTabBar: $('#chat-tab-bar'),
  chatMessages: $('#chat-messages'),
  chatInput: $('#chat-input'),
  modelSelector: $('#model-selector'),
  btnSend: $('#btn-send'),
  btnStop: $('#btn-stop'),
  btnNewChat: $('#btn-new-chat'),
  navChatList: $('#nav-chat-list'),
  navAgentsList: $('#nav-agents-list'),
  statusModel: $('#status-model'),
  statusAgent: $('#status-agent'),
  statusTokens: $('#status-tokens'),
  statusSession: $('#status-session'),
  agentSidebar: $('#agent-sidebar'),
  agentDetail: $('#agent-detail'),
  schedulerContent: $('#scheduler-content'),
  settingsContent: $('#settings-content'),
  taskModal: $('#task-modal'),
};

// ─── View Management ────────────────────────────────────────
function switchView(view) {
  state.currentView = view;
  ['chat', 'agents', 'scheduler', 'settings'].forEach(v => {
    const el = $(`#view-${v}`);
    if (el) el.classList.toggle('hidden', v !== view);
  });
  $$('.nav-section-btn').forEach(btn => {
    const bv = btn.dataset.view || (btn.dataset.section === 'chat' ? 'chat' : null);
    btn.closest('.px-3')?.classList.toggle('bg-surface-lighter', bv === view);
  });
  if (view === 'agents') renderAgentsView();
  if (view === 'scheduler') renderSchedulerView();
  if (view === 'settings') renderSettingsView();
}

// ─── Connection ─────────────────────────────────────────────
async function checkConnection() {
  try {
    const info = await API.getStatus();
    state.connected = true;
    state.serverInfo = info;
    dom.connDot.className = 'w-2 h-2 rounded-full bg-green-500 pulse-dot';
    dom.connLabel.textContent = `v${info.version || '?'}`;
    dom.serverUrl.textContent = BASE_URL;
    return true;
  } catch {
    state.connected = false;
    dom.connDot.className = 'w-2 h-2 rounded-full bg-red-500 pulse-dot';
    dom.connLabel.textContent = 'Disconnected';
    dom.serverUrl.textContent = BASE_URL;
    return false;
  }
}

async function loadInitialData() {
  const ok = await checkConnection();
  if (!ok) return;
  try {
    const [agents, models, providers] = await Promise.allSettled([
      API.getAgents(),
      API.getModels(),
      API.getProviders(),
    ]);
    if (agents.status === 'fulfilled') {
      state.agents = Array.isArray(agents.value) ? agents.value : (agents.value.agents || []);
    }
    if (models.status === 'fulfilled') {
      state.models = Array.isArray(models.value) ? models.value : (models.value.models || models.value.data || []);
    }
    if (providers.status === 'fulfilled') {
      state.providers = Array.isArray(providers.value) ? providers.value : (providers.value.providers || []);
    }
  } catch {}
  renderModelSelector();
  renderNavAgents();
  if (state.chats.length === 0) {
    createNewChat();
  }
}

// ─── Rendering: Models ──────────────────────────────────────
function renderModelSelector() {
  dom.modelSelector.innerHTML = '';
  const models = state.models;
  if (models.length === 0) {
    dom.modelSelector.innerHTML = '<option value="">No models</option>';
    return;
  }
  models.forEach(m => {
    const id = typeof m === 'string' ? m : (m.id || m.name || m);
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = id;
    dom.modelSelector.appendChild(opt);
  });
}

// ─── Rendering: Nav Agents ──────────────────────────────────
function renderNavAgents() {
  dom.navAgentsList.innerHTML = '';
  state.agents.forEach(a => {
    const name = typeof a === 'string' ? a : (a.name || a.agent || a.id || '');
    const desc = typeof a === 'object' ? (a.description || '') : '';
    const div = document.createElement('div');
    div.className = 'nav-item flex items-center gap-2 px-3 py-1.5 rounded cursor-pointer text-sm border-l-2 border-transparent';
    div.innerHTML = `<span class="text-agent text-xs">&#x25cf;</span><span class="truncate text-gray-300">${esc(name)}</span>`;
    div.title = desc;
    div.onclick = () => {
      switchView('agents');
      selectAgent(name);
    };
    dom.navAgentsList.appendChild(div);
  });
}

// ─── Rendering: Chat Tabs ───────────────────────────────────
function renderChatTabs() {
  dom.chatTabBar.innerHTML = '';
  state.chats.forEach((chat, idx) => {
    const tab = document.createElement('button');
    const isActive = idx === state.activeChatIdx;
    tab.className = `flex items-center gap-1.5 px-3 py-1.5 text-xs whitespace-nowrap border-b-2 transition-colors flex-shrink-0 ${
      isActive ? 'tab-active text-white' : 'border-transparent text-gray-400 hover:text-gray-200 hover:bg-surface-lighter'
    }`;
    const agentLabel = chat.agent || 'Chat';
    tab.innerHTML = `<span class="text-agent">${esc(agentLabel)}</span>
      <span class="text-gray-500">#${idx + 1}</span>
      <span class="ml-1 text-gray-600 hover:text-red-400 transition-colors close-tab" data-idx="${idx}">&times;</span>`;
    tab.onclick = (e) => {
      if (e.target.classList.contains('close-tab')) {
        closeChat(parseInt(e.target.dataset.idx));
      } else {
        state.activeChatIdx = idx;
        renderChatTabs();
        renderMessages();
        updateStatusBar();
      }
    };
    dom.chatTabBar.appendChild(tab);
  });
}

// ─── Rendering: Nav Chat List ───────────────────────────────
function renderNavChats() {
  dom.navChatList.innerHTML = '';
  state.chats.forEach((chat, idx) => {
    const div = document.createElement('div');
    const isActive = idx === state.activeChatIdx && state.currentView === 'chat';
    div.className = `nav-item flex items-center gap-2 px-3 py-1.5 rounded cursor-pointer text-sm border-l-2 ${
      isActive ? 'active border-l-accent' : 'border-transparent'
    }`;
    const label = chat.agent || 'Chat';
    const msgCount = chat.messages.length;
    div.innerHTML = `<span class="text-accent text-xs">&#x25cf;</span>
      <span class="truncate text-gray-300 flex-1">${esc(label)} #${idx + 1}</span>
      <span class="text-gray-600 text-xs">${msgCount}</span>`;
    div.onclick = () => {
      state.activeChatIdx = idx;
      switchView('chat');
      renderChatTabs();
      renderMessages();
      renderNavChats();
      updateStatusBar();
    };
    dom.navChatList.appendChild(div);
  });
}

// ─── Chat Management ────────────────────────────────────────
function createNewChat() {
  const model = dom.modelSelector.value || (state.models[0]?.id || state.models[0] || '');
  const agent = state.agents.length > 0 ? (typeof state.agents[0] === 'string' ? state.agents[0] : (state.agents[0].name || state.agents[0].agent || '')) : '';
  const chat = {
    id: Date.now().toString(36),
    sessionId: null,
    agent,
    model,
    messages: [],
    streaming: false,
    totalTokens: 0,
  };
  state.chats.push(chat);
  state.activeChatIdx = state.chats.length - 1;
  renderChatTabs();
  renderNavChats();
  renderMessages();
  updateStatusBar();
  dom.chatInput.focus();
}

function closeChat(idx) {
  const chat = state.chats[idx];
  if (chat.sessionId) {
    API.deleteSession(chat.sessionId).catch(() => {});
  }
  state.chats.splice(idx, 1);
  if (state.chats.length === 0) {
    createNewChat();
    return;
  }
  if (state.activeChatIdx >= state.chats.length) state.activeChatIdx = state.chats.length - 1;
  else if (state.activeChatIdx > idx) state.activeChatIdx--;
  renderChatTabs();
  renderNavChats();
  renderMessages();
  updateStatusBar();
}

async function ensureSession(chat) {
  if (chat.sessionId) return;
  try {
    const res = await API.createSession(chat.agent || undefined, chat.model || undefined);
    chat.sessionId = res.session_id;
    updateStatusBar();
  } catch (e) {
    addSystemMessage(chat, `Failed to create session: ${e.message}`);
    throw e;
  }
}

// ─── Messages ───────────────────────────────────────────────
function addSystemMessage(chat, text) {
  chat.messages.push({ role: 'system', content: text, ts: Date.now() });
  if (chat === state.activeChat) renderMessages();
}

function renderMessages() {
  const chat = state.activeChat;
  dom.chatMessages.innerHTML = '';
  if (!chat) {
    dom.chatMessages.innerHTML = '<div class="flex items-center justify-center h-full text-gray-600 text-sm">No active chat</div>';
    return;
  }
  if (chat.messages.length === 0) {
    dom.chatMessages.innerHTML = `
      <div class="flex flex-col items-center justify-center h-full text-gray-600 gap-3">
        <span class="text-4xl">&#x1f9e0;</span>
        <span class="text-sm">Start a conversation</span>
        <span class="text-xs text-gray-700">Messages will appear here</span>
      </div>`;
    return;
  }
  chat.messages.forEach((msg, i) => renderMessage(msg, i));
  scrollToBottom();
}

function renderMessage(msg, idx) {
  const div = document.createElement('div');
  div.className = 'fade-in';
  div.dataset.idx = idx;

  if (msg.role === 'user') {
    div.className += ' flex justify-end';
    div.innerHTML = `<div class="max-w-2xl bg-surface-lighter rounded-xl rounded-tr-sm px-4 py-2.5 text-sm text-gray-200 msg-content">${marked.parse(msg.content)}</div>`;
  } else if (msg.role === 'assistant') {
    div.className += ' flex justify-start';
    const toolsHtml = (msg.tools || []).map(t => renderToolBlock(t)).join('');
    const content = msg.content ? marked.parse(msg.content) : '';
    div.innerHTML = `<div class="max-w-3xl text-sm text-gray-200">
      ${toolsHtml}
      <div class="msg-content">${content}</div>
      ${msg.tokens ? `<div class="text-xs text-gray-600 mt-1 mono">${msg.tokens} tokens</div>` : ''}
    </div>`;
  } else if (msg.role === 'system') {
    div.className += ' flex justify-center';
    div.innerHTML = `<div class="text-xs text-gray-600 bg-surface-lighter px-3 py-1 rounded-full">${esc(msg.content)}</div>`;
  }
  dom.chatMessages.appendChild(div);
  // Re-highlight code blocks
  div.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function renderToolBlock(tool) {
  const statusIcon = tool.result !== undefined ? '&#x2705;' : '&#x26a1;';
  const name = esc(tool.name || '');
  const argsPreview = tool.args ? esc(typeof tool.args === 'string' ? tool.args : JSON.stringify(tool.args)).substring(0, 120) : '';
  const resultContent = tool.result !== undefined ? `<div class="mt-2 text-xs text-gray-400 mono whitespace-pre-wrap max-h-40 overflow-y-auto">${esc(typeof tool.result === 'string' ? tool.result : JSON.stringify(tool.result, null, 2))}</div>` : '';
  return `<div class="tool-block px-3 py-2 mb-2 text-xs cursor-pointer" onclick="this.querySelector('.tool-detail')?.classList.toggle('hidden')">
    <div class="flex items-center gap-2">
      <span>${statusIcon}</span>
      <span class="text-accent font-medium">${name}</span>
      <span class="text-gray-500 truncate">${argsPreview}</span>
    </div>
    <div class="tool-detail hidden">${resultContent}</div>
  </div>`;
}

function updateStreamingMessage(chat) {
  const msg = chat.messages[chat.messages.length - 1];
  if (!msg || msg.role !== 'assistant') return;
  const lastDiv = dom.chatMessages.lastElementChild;
  if (!lastDiv) return;
  const contentDiv = lastDiv.querySelector('.msg-content');
  if (contentDiv) {
    contentDiv.innerHTML = marked.parse(msg.content || '');
    contentDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  }
  // Update tools
  const parent = lastDiv.querySelector('.max-w-3xl');
  if (parent) {
    const existingTools = parent.querySelectorAll('.tool-block');
    const toolsNeeded = msg.tools?.length || 0;
    if (toolsNeeded > existingTools.length) {
      const newTool = msg.tools[toolsNeeded - 1];
      const toolDiv = document.createElement('div');
      toolDiv.innerHTML = renderToolBlock(newTool);
      parent.insertBefore(toolDiv.firstElementChild, contentDiv);
    } else if (toolsNeeded > 0) {
      // Update last tool block
      const lastToolEl = parent.querySelectorAll('.tool-block')[toolsNeeded - 1];
      if (lastToolEl) {
        const t = msg.tools[toolsNeeded - 1];
        lastToolEl.outerHTML = renderToolBlock(t);
      }
    }
  }
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
  });
}

// ─── Send Message ───────────────────────────────────────────
async function sendMessage() {
  const chat = state.activeChat;
  if (!chat || chat.streaming) return;
  const text = dom.chatInput.value.trim();
  if (!text) return;
  dom.chatInput.value = '';
  dom.chatInput.style.height = 'auto';

  chat.messages.push({ role: 'user', content: text, ts: Date.now() });
  renderMessages();

  try {
    await ensureSession(chat);
  } catch { return; }

  chat.streaming = true;
  dom.btnStop.classList.remove('hidden');
  dom.btnSend.disabled = true;

  // Create assistant message placeholder
  const assistantMsg = { role: 'assistant', content: '', tools: [], ts: Date.now() };
  chat.messages.push(assistantMsg);
  renderMessages();

  try {
    await API.streamChat(chat.sessionId, text, {
      text_delta: (d) => {
        assistantMsg.content += d.text || '';
        updateStreamingMessage(chat);
      },
      tool_call: (d) => {
        assistantMsg.tools.push({ name: d.name, args: d.args });
        updateStreamingMessage(chat);
      },
      tool_result: (d) => {
        const tool = assistantMsg.tools.find(t => t.name === d.name && t.result === undefined);
        if (tool) tool.result = d.result;
        updateStreamingMessage(chat);
      },
      done: (d) => {
        if (d.text && !assistantMsg.content) assistantMsg.content = d.text;
        assistantMsg.tokens = d.tokens;
        chat.totalTokens += d.tokens || 0;
      },
      error: (d) => {
        assistantMsg.content += `\n\n**Error:** ${d.message || 'Unknown error'}`;
      },
    });
  } catch (e) {
    if (e.name !== 'AbortError') {
      assistantMsg.content += `\n\n**Error:** ${e.message}`;
    }
  } finally {
    chat.streaming = false;
    dom.btnStop.classList.add('hidden');
    dom.btnSend.disabled = false;
    renderMessages();
    updateStatusBar();
    renderNavChats();
  }
}

// ─── Toast Notification ─────────────────────────────────────
function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.className = `fixed bottom-12 right-4 px-4 py-2 rounded-lg text-sm shadow-lg z-50 fade-in ${isError ? 'bg-red-900/90 text-red-200 border border-red-700' : 'bg-surface-lighter text-gray-200 border border-border'}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ─── Utilities ──────────────────────────────────────────────
function esc(str) {
  if (typeof str !== 'string') str = String(str || '');
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── Sidebar Toggle ─────────────────────────────────────────
$('#btn-toggle-sidebar').onclick = () => {
  dom.sidebar.style.width = '0';
  dom.sidebar.style.opacity = '0';
  dom.sidebar.style.overflow = 'hidden';
  dom.expandBtn.classList.remove('hidden');
  dom.expandBtn.classList.add('flex');
};
dom.expandBtn.onclick = () => {
  dom.sidebar.style.width = '280px';
  dom.sidebar.style.opacity = '1';
  dom.sidebar.style.overflow = '';
  dom.expandBtn.classList.add('hidden');
  dom.expandBtn.classList.remove('flex');
};

// ─── Event Listeners ────────────────────────────────────────
dom.btnNewChat.onclick = () => { createNewChat(); switchView('chat'); };
dom.btnSend.onclick = sendMessage;
dom.btnStop.onclick = stopGeneration;

dom.chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
dom.chatInput.addEventListener('input', () => {
  dom.chatInput.style.height = 'auto';
  dom.chatInput.style.height = Math.min(dom.chatInput.scrollHeight, 200) + 'px';
});

// Navigation buttons
$$('.nav-section-btn').forEach(btn => {
  btn.onclick = () => {
    const view = btn.dataset.view;
    if (view) switchView(view);
    else if (btn.dataset.section === 'chat') switchView('chat');
  };
});

// Model selector change
dom.modelSelector.addEventListener('change', () => {
  const chat = state.activeChat;
  if (chat) {
    chat.model = dom.modelSelector.value;
    updateStatusBar();
  }
});

// ─── Initialization ─────────────────────────────────────────
(async function init() {
  await loadInitialData();
  // Periodic connection check
  setInterval(async () => {
    await checkConnection();
  }, 30000);
})();
</script>
</body>
</html>
