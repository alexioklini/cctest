    <div class="file-attachments-header">\u{1F4CE} Attachments</div>
    <div class="file-attachments-grid">${cards}</div>
  </div>`;
}

window.previewFile = async function(encodedPath) {
  const path = decodeURIComponent(encodedPath);
  const name = path.split('/').pop();
  try {
    const res = await fetch(`${BASE_URL}/v1/files/preview?path=${encodedPath}&lines=100`);
    const data = await res.json();
    if (data.error) { showToast(data.error, true); return; }
    const ext = (data.ext || name.split('.').pop() || '').toLowerCase();
    let contentHtml;
    if (data.type === 'image') {
      const mimeMap = {jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',svg:'image/svg+xml',bmp:'image/bmp',ico:'image/x-icon'};
      const mime = mimeMap[ext] || 'image/*';
      if (ext === 'svg') {
        contentHtml = `<div style="padding:16px;text-align:center;background:var(--color-surface-light)"><img src="${BASE_URL}/v1/files/download?path=${encodedPath}" style="max-width:100%;max-height:60vh;object-fit:contain" alt="${esc(name)}"></div>`;
      } else {
        contentHtml = `<div style="padding:16px;text-align:center;background:var(--color-surface-light)"><img src="${BASE_URL}/v1/files/download?path=${encodedPath}" style="max-width:100%;max-height:60vh;object-fit:contain" alt="${esc(name)}"></div>`;
      }
    } else if (data.type === 'document') {
      contentHtml = ext === 'pdf'
        ? `<iframe src="${BASE_URL}/v1/files/download?path=${encodedPath}" style="width:100%;height:60vh;border:none;border-radius:8px"></iframe>`
        : `<div class="file-preview-rendered">${marked.parse(data.content || '')}</div>`;
    } else if (ext === 'md') {
      contentHtml = `<div class="file-preview-rendered">${marked.parse(data.content || '')}</div>`;
    } else {
      const codeClass = ['py','js','ts','json','html','css','jsx','tsx','sh','bash','yaml','yml','xml','sql','go','rs','java','c','cpp','h','rb'].includes(ext) ? ` class="language-${ext}"` : '';
      contentHtml = `<pre class="file-preview-code"><code${codeClass}>${esc(data.content || '')}</code></pre>`;
    }
    const truncatedNote = data.truncated ? '<div class="file-preview-truncated">File truncated (showing first 100 lines / 50KB)</div>' : '';
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal-content" style="max-width:750px;max-height:85vh;display:flex;flex-direction:column;">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h3 class="text-base font-display font-semibold text-text-primary">${fileTypeIcon(name)} ${esc(name)}</h3>
          <div class="text-xs text-text-muted mt-0.5">${esc(data.path)} &middot; ${formatFileSize(data.size)}</div>
        </div>
        <div class="flex gap-2">
          <a class="btn btn-sm" href="${BASE_URL}/v1/files/download?path=${encodedPath}" download>Download</a>
          <button class="btn btn-sm" onclick="this.closest('.modal-overlay').remove()">Close</button>
        </div>
      </div>
      ${truncatedNote}
      <div style="overflow:auto;flex:1;border-radius:8px;background:var(--color-base);border:1px solid var(--color-border);">
        ${contentHtml}
      </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    overlay.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  } catch (e) {
    showToast(`Preview failed: ${e.message}`, true);
  }
};

function _extractNodeBadge(args) {
  if (!args) return '';
  const a = typeof args === 'string' ? (() => { try { return JSON.parse(args); } catch { return {}; } })() : args;
  const node = a.node || a.tag;
  if (!node) return '';
  return `<span style="background:#8b5cf6;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;white-space:nowrap" title="Remote node"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:2px"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="3"/></svg>${esc(String(node))}</span>`;
}

function renderToolBlock(tool) {
  const statusIcon = tool.result !== undefined
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff7b00" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
  const name = esc(tool.name || '');
  const nodeBadge = _extractNodeBadge(tool.args);
  const argsObj = typeof tool.args === 'string' ? (() => { try { return JSON.parse(tool.args); } catch { return {}; } })() : (tool.args || {});
  // Build preview without the node param
  const previewArgs = {...argsObj};
  delete previewArgs.node;
  const argsPreview = esc(JSON.stringify(previewArgs)).substring(0, 120);
  // Check if result contains cached flag
  let isCached = false;
  if (tool.result !== undefined) {
    try {
      const parsed = typeof tool.result === 'string' ? JSON.parse(tool.result) : tool.result;
      if (parsed && parsed.cached) isCached = true;
    } catch {}
  }
  const cachedBadge = isCached ? '<span style="background:#3b82f6;color:#fff;font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;">cached</span>' : '';
  const resultContent = tool.result !== undefined ? `<div class="mt-2.5 text-xs text-text-secondary mono whitespace-pre-wrap max-h-40 overflow-y-auto bg-base/50 rounded-lg p-3">${esc(typeof tool.result === 'string' ? tool.result : JSON.stringify(tool.result, null, 2))}</div>` : '';
  // Streaming tool output panel
  const toolOutputHtml = tool.streamOutput ? `<div class="mt-2 text-xs mono whitespace-pre-wrap max-h-48 overflow-y-auto p-3 rounded-lg" style="background:#1a1a2e;color:#a8b2d1;">${esc(tool.streamOutput)}</div>` : '';
  return `<div class="tool-block px-4 py-2.5 mb-3 text-xs cursor-pointer" onclick="this.classList.toggle('open');this.querySelector('.tool-detail')?.classList.toggle('hidden')">
    <div class="flex items-center gap-2.5">
      <span class="tool-chevron text-text-muted text-[10px]">&#x25B6;</span>
      ${statusIcon}
      <span class="text-accent font-medium font-mono">${name}</span>${nodeBadge}${cachedBadge}
      <span class="text-text-muted truncate">${argsPreview}</span>
    </div>
    <div class="tool-detail hidden">${resultContent}${toolOutputHtml}</div>
  </div>`;
}

function renderToolsSummary(tools) {
  if (!tools || tools.length === 0) return '';
  const completed = tools.filter(t => t.result !== undefined).length;
  const running = tools.length - completed;
  const names = [...new Set(tools.map(t => t.name))].join(', ');
  // Check for any remote node executions
  const remoteNodes = new Set();
  tools.forEach(t => {
    const a = typeof t.args === 'string' ? (() => { try { return JSON.parse(t.args); } catch { return {}; } })() : (t.args || {});
    if (a.node) remoteNodes.add(a.node);
  });
  const nodeBadges = [...remoteNodes].map(n =>
    `<span style="background:#8b5cf6;color:#fff;font-size:9px;padding:1px 4px;border-radius:3px;white-space:nowrap">${esc(n)}</span>`
  ).join(' ');
  const statusText = running > 0 ? `${completed}/${tools.length} done` : `${tools.length} tool${tools.length > 1 ? 's' : ''}`;
  const statusIcon = running > 0
    ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#ff7b00" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
    : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
  return `<div class="tools-summary flex items-center gap-2 px-3 py-1.5 mb-2 text-[11px] text-text-muted mono" style="border-left:3px solid var(--color-accent);border-radius:0 0.5rem 0.5rem 0;background:var(--color-tool-bg);opacity:0.7;">
    ${statusIcon}
    <span>${statusText}</span>
    <span class="text-text-muted truncate" style="max-width:300px;">${esc(names)}</span>
    ${nodeBadges}
  </div>`;
}

function updateStreamingMessage(chat) {
  const msg = chat.messages[chat.messages.length - 1];
  if (!msg || msg.role !== 'assistant') return;
  const lastDiv = dom.chatMessages.querySelector('.max-w-\\[800px\\]')?.lastElementChild || dom.chatMessages.lastElementChild;
  if (!lastDiv) return;
  const contentDiv = lastDiv.querySelector('.msg-content');
  // Update or remove inline thinking indicator
  const spinner = lastDiv.querySelector('.thinking-indicator');
  if (spinner) {
    if (msg.content) {
      // Got text — remove spinner
      spinner.remove();
    } else if (msg.tools && msg.tools.length > 0) {
      // Tools running — update spinner label
      const lastTool = msg.tools[msg.tools.length - 1];
      const label = spinner.querySelector('.thinking-label');
      if (label) label.textContent = `${lastTool.name}... (${msg.tools.length})`;
    }
  }
  if (contentDiv) {
    const pulseId = 'streaming-pulse';
    if (msg.content && chat.streaming) {
      contentDiv.innerHTML = marked.parse(msg.content) + `<div id="${pulseId}" class="response-pulse-bar"></div>`;
    } else {
      contentDiv.innerHTML = marked.parse(msg.content || '');
    }
    contentDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  }
  const parent = lastDiv.querySelector('.assistant-msg') || lastDiv.querySelector('.max-w-\\[90\\%\\]');
  if (parent) {
    if (!showToolCalls) {
      // Hidden mode: show compact summary instead of individual blocks
      const existingSummary = parent.querySelector('.tools-summary');
      parent.querySelectorAll('.tool-block').forEach(el => el.remove());
      const toolsNeeded = msg.tools?.length || 0;
      if (toolsNeeded > 0) {
        const summaryHtml = renderToolsSummary(msg.tools);
        if (existingSummary) {
          existingSummary.outerHTML = summaryHtml;
        } else {
          const tmp = document.createElement('div');
          tmp.innerHTML = summaryHtml;
          parent.insertBefore(tmp.firstElementChild, contentDiv);
        }
      }
    } else {
      // Visible mode: show individual tool blocks
      const existingSummary = parent.querySelector('.tools-summary');
      if (existingSummary) existingSummary.remove();
      const existingTools = parent.querySelectorAll('.tool-block');
      const toolsNeeded = msg.tools?.length || 0;
      if (toolsNeeded > existingTools.length) {
        const newTool = msg.tools[toolsNeeded - 1];
        const toolDiv = document.createElement('div');
        toolDiv.innerHTML = renderToolBlock(newTool);
        parent.insertBefore(toolDiv.firstElementChild, contentDiv);
      } else if (toolsNeeded > 0) {
        const lastToolEl = parent.querySelectorAll('.tool-block')[toolsNeeded - 1];
        if (lastToolEl) {
          const t = msg.tools[toolsNeeded - 1];
          lastToolEl.outerHTML = renderToolBlock(t);
        }
      }
    }
    // Update file attachments during streaming
    if (msg.files && msg.files.length > 0) {
      let filesContainer = parent.querySelector('.file-attachments-container');
      const newFilesHtml = renderFileAttachments(msg.files);
      if (filesContainer) {
        filesContainer.outerHTML = newFilesHtml;
      } else {
        const tmp = document.createElement('div');
        tmp.innerHTML = newFilesHtml;
        // Insert before the tokens/metadata line
        const metaLine = parent.querySelector('.text-\\[10px\\]');
        if (metaLine) parent.insertBefore(tmp.firstElementChild, metaLine);
        else parent.appendChild(tmp.firstElementChild);
      }
    }
  }
  scrollToBottom();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
  });
}

// ─── Send Message ───────────────────────────────────────────
async function sendMessage() {
  const chat = state.activeChat;
  if (!chat || chat.streaming) return;
  const text = dom.chatInput.value.trim();
  if (!text && _pendingImages.length === 0) return;
  dom.chatInput.value = '';
  dom.chatInput.style.height = 'auto';

  // Capture pending images
  const images = _pendingImages.length > 0 ? [..._pendingImages] : null;
  _pendingImages = [];
  renderImagePreviews();

  const userMsg = { role: 'user', content: text || 'What can you see in this image?', ts: Date.now() };
  if (images) userMsg.images = images;
  chat.messages.push(userMsg);
  renderMessages();

  try {
    await ensureSession(chat);
  } catch { return; }

  chat.streaming = true;
  updateAgentActivityVisuals();
  dom.btnStop.classList.remove('hidden');
  dom.btnSend.disabled = true;

  // Show spinner bar
  const spinnerBar = document.getElementById('chat-spinner-bar');
  const spinnerLabel = document.getElementById('spinner-label');
  const spinnerElapsed = document.getElementById('spinner-elapsed');
  if (spinnerBar) spinnerBar.classList.remove('hidden');
  const spinnerModel = document.getElementById('spinner-model');
  if (spinnerModel) spinnerModel.textContent = chat.model || '';
  if (spinnerLabel) spinnerLabel.textContent = 'Thinking...';
  const spinnerStart = Date.now();
  let toolCallCount = 0;
  const spinnerTimer = setInterval(() => {
    const s = Math.round((Date.now() - spinnerStart) / 1000);
    if (spinnerElapsed) spinnerElapsed.textContent = `${s}s`;
    // Also update inline thinking elapsed
    const inlineTime = document.getElementById('thinking-time');
    if (inlineTime) inlineTime.textContent = `${s}s`;
  }, 1000);

  const assistantMsg = { role: 'assistant', content: '', tools: [], files: [], ts: Date.now(), _requestModel: chat.model || '' };
  chat.messages.push(assistantMsg);
  renderMessages();

  try {
    await API.streamChat(chat.sessionId, text || 'What can you see in this image?', {
      thinking_start: () => {
        if (spinnerLabel) spinnerLabel.textContent = 'Thinking deeply...';
        assistantMsg._thinking = '';
      },
      thinking_delta: (d) => {
        assistantMsg._thinking = (assistantMsg._thinking || '') + (d.text || '');
      },
      thinking_done: (d) => {
        assistantMsg.thinking = d.text || assistantMsg._thinking || '';
        delete assistantMsg._thinking;
        if (spinnerLabel) spinnerLabel.textContent = 'Generating...';
        updateStreamingMessage(chat);
      },
      compacting: (d) => {
        if (spinnerLabel) spinnerLabel.textContent = `Compacting context (${d.pct}% full)...`;
        const ce = document.getElementById('status-compacting');
        if (ce) { ce.textContent = `Compacting ${d.pct}%...`; ce.style.display = ''; }
      },
      compacted: (d) => {
        if (spinnerLabel) spinnerLabel.textContent = `Compacted ${d.old_pct || '?'}% → ${d.pct}%`;
        const ce = document.getElementById('status-compacting');
        if (ce) { ce.textContent = `${d.old_pct||'?'}% → ${d.pct}%`; setTimeout(() => { ce.style.display = 'none'; }, 3000); }
        setTimeout(() => { if (spinnerLabel) spinnerLabel.textContent = 'Thinking...'; }, 1500);
      },
      text_delta: (d) => {
        assistantMsg.content += d.text || '';
        if (spinnerLabel) spinnerLabel.textContent = 'Generating...';
        updateStreamingMessage(chat);
      },
      tool_call: (d) => {
        toolCallCount++;
        assistantMsg.tools.push({ name: d.name, args: d.args });
        const nodeTarget = d.args?.node ? ` @ ${d.args.node}` : '';
        if (spinnerLabel) spinnerLabel.textContent = `Tool: ${d.name}${nodeTarget} (${toolCallCount})`;
        // Update inline thinking label too
        const inlineLabel = document.getElementById('thinking-status');
        if (inlineLabel) inlineLabel.textContent = `${d.name}${nodeTarget}... (${toolCallCount})`;
        updateStreamingMessage(chat);
      },
      tool_result: (d) => {
        const tool = assistantMsg.tools.find(t => t.name === d.name && t.result === undefined);
        if (tool) tool.result = d.result;
        updateStreamingMessage(chat);
      },
      tool_output: (d) => {
        // Append streaming line to the matching tool
        const tool = assistantMsg.tools.find(t => t.result === undefined);
        if (tool) {
          tool.streamOutput = (tool.streamOutput || '') + (d.line || '') + '\n';
          updateStreamingMessage(chat);
        }
      },
      file_created: (d) => {
        // Track files created/modified during this message
        if (!assistantMsg.files) assistantMsg.files = [];
        // Deduplicate by path (keep latest action)
        const existing = assistantMsg.files.findIndex(f => f.path === d.path);
        if (existing >= 0) assistantMsg.files[existing] = d;
        else assistantMsg.files.push(d);
        updateStreamingMessage(chat);
      },
      fallback: (d) => {
        // Show fallback notice in spinner area + update model display
        if (d.status === 'retry') {
          if (spinnerLabel) spinnerLabel.textContent = `Retrying (${d.attempt}/${d.max_retries})...`;
        } else if (d.status === 'switch') {
          if (spinnerModel) spinnerModel.textContent = d.to;
          const thinkingModel = document.getElementById('thinking-model');
          if (thinkingModel) thinkingModel.textContent = d.to;
          if (spinnerLabel) spinnerLabel.textContent = `Fallback...`;
          assistantMsg.fallbackNotice = `Using fallback: ${d.to} (primary ${d.from} unavailable)`;
        }
      },
      done: (d) => {
        if (d.text && !assistantMsg.content) assistantMsg.content = d.text;
        assistantMsg.tokens = d.tokens;
        assistantMsg.model = d.model || '';
        assistantMsg.cost = d.cost || null;
        chat.totalTokens += d.tokens || 0;
        if (d.cost != null) chat.sessionCost = d.cost;
        if (d.fallback_model) {
          assistantMsg.fallbackNotice = `Using fallback: ${d.fallback_model} (primary ${d.original_model || d.model} unavailable)`;
          assistantMsg.model = d.fallback_model;
        }
        // Capture file attachments from done event
        if (d.files && d.files.length > 0) {
          assistantMsg.files = d.files;
        }
      },
      error: (d) => {
        assistantMsg.content += `\n\n**Error:** ${d.message || 'Unknown error'}`;
      },
    }, chat.model);
  } catch (e) {
    if (e.name !== 'AbortError') {
      let errMsg = e.message || String(e);
      if (errMsg === 'Load failed' || errMsg === 'Failed to fetch') {
        errMsg = 'Connection to server lost — the response may have been too large or the server encountered an error. Try again or check server logs.';
      }
      assistantMsg.content += `\n\n**Error:** ${errMsg}`;
    }
  } finally {
    chat.streaming = false;
    clearInterval(spinnerTimer);
    if (spinnerBar) spinnerBar.classList.add('hidden');
    dom.btnStop.classList.add('hidden');
    dom.btnSend.disabled = false;
    renderMessages();
    updateStatusBar();
    renderAgentCards();
    // Refresh session list to update title/message count
    if (chat.agent && state.agentSessions[chat.agent]) {
      state.agentSessions[chat.agent].loaded = false;
      loadAgentSessions(chat.agent);
      // Poll for async updates (LLM summary, title) — stop once summary appears or timeout
      const _sid = chat.sessionId;
      const _agentName = chat.agent;
      if (_sid) {
        let _pollCount = 0;
        const _pollTimer = setInterval(async () => {
          _pollCount++;
          if (_pollCount > 15) { clearInterval(_pollTimer); return; } // 30s max
          try {
            const entry = state.agentSessions[_agentName];
            if (!entry) { clearInterval(_pollTimer); return; }
            entry.loaded = false;
            await loadAgentSessions(_agentName);
            if (state.projectPanelOpen && state.currentProject) {
              renderProjectPanelChats(state.activeAgentId, state.currentProject);
            }
            // Check if summary landed
            const sessions = entry.sessions || [];
            const s = sessions.find(x => x.id === _sid);
            if (s && s.summary) clearInterval(_pollTimer);
          } catch(e) { clearInterval(_pollTimer); }
        }, 2000);
      }
    }
  }
}

async function stopGeneration() {
  const chat = state.activeChat;
  if (!chat || !chat.sessionId) return;
  try {
    await API.cancelChat(chat.sessionId);
  } catch {}
}

// ─── Status Bar ─────────────────────────────────────────────
function _estimateTokens(messages) {
  let total = 0;
  for (const m of messages || []) {
    const c = m.content;
    if (typeof c === 'string') total += Math.ceil(c.length / 4) + 4;
    else if (Array.isArray(c)) {
      for (const b of c) {
        if (b?.text) total += Math.ceil(b.text.length / 4);
        else if (b?.thinking) total += Math.ceil(b.thinking.length / 4);
        else total += 20;
      }
      total += 4;
    } else total += 10;
  }
  return total;
}

function updateStatusBar() {
  const chat = state.activeChat;
  const agentLabel = chat?.agent || '';
  dom.statusAgent.textContent = agentLabel;
  dom.statusModel.textContent = chat?.model || '';
  const costStr = chat?.sessionCost != null ? ` · $${chat.sessionCost.toFixed(2)}` : '';
  dom.statusTokens.textContent = chat?.totalTokens ? `${chat.totalTokens} tokens${costStr}` : '';
  dom.statusSession.textContent = chat?.sessionId ? `${chat.sessionId.substring(0, 8)}` : '';

  // Context fill indicator
  const ctxLabel = document.getElementById('status-context-label');
  const ctxBar = document.getElementById('status-context-bar');
  const ctxFill = document.getElementById('status-context-fill');
  const lcmBadge = document.getElementById('status-lcm-badge');
  const compactBtn = document.getElementById('status-compact-btn');

  if (ctxLabel && ctxBar && ctxFill) {
    if (chat && chat.messages && chat.messages.length > 0) {
      const est = _estimateTokens(chat.messages);
      const modelCfg = (state.modelsConfig || {})[chat.model] || {};
      const maxCtx = modelCfg.max_context || 131072;
      const pct = Math.min(100, Math.round(est / maxCtx * 100));
      const estK = (est / 1000).toFixed(1);
      const maxK = (maxCtx / 1000).toFixed(0);
      ctxLabel.textContent = `${estK}k / ${maxK}k`;
      ctxBar.style.display = '';
      ctxFill.style.width = pct + '%';
      ctxFill.style.background = pct >= 75 ? '#ef4444' : pct >= 50 ? '#f59e0b' : '#4ade80';
      ctxLabel.style.color = pct >= 75 ? '#ef4444' : pct >= 50 ? '#f59e0b' : 'var(--color-text-muted)';
      if (compactBtn) compactBtn.style.display = chat.sessionId && chat.messages.length > 4 ? '' : 'none';
    } else {
      ctxLabel.textContent = '';
      ctxBar.style.display = 'none';
      if (compactBtn) compactBtn.style.display = 'none';
    }
  }

  // LCM badge
  if (lcmBadge) {
    const lcmOn = state._lcmEnabled;
    if (lcmOn === undefined) {
      // Fetch once
      API.get('/v1/context/config').then(cfg => {
        state._lcmEnabled = cfg.enabled !== false;
        _updateLcmBadge();
      }).catch(() => {});
    }
    _updateLcmBadge();
  }

  // Hide separators when no data
  const footer = dom.statusAgent.closest('footer');
  if (footer) {
    const seps = footer.querySelectorAll(':scope > .text-text-muted');
    seps.forEach((sep, i) => {
      if (i === 0) sep.style.display = agentLabel && chat?.model ? '' : 'none';
      if (i === 1) sep.style.display = chat?.model && chat?.totalTokens ? '' : 'none';
    });
  }
}

function _updateLcmBadge() {
  const badge = document.getElementById('status-lcm-badge');
  if (!badge) return;
  const on = state._lcmEnabled;
  if (on) {
    badge.textContent = 'LCM';
    badge.style.background = 'rgba(139,92,246,0.15)';
    badge.style.color = '#a78bfa';
    badge.style.border = '1px solid rgba(139,92,246,0.3)';
    badge.title = 'Lossless Context Management: ON (click to configure)';
  } else {
    badge.textContent = 'LCM off';
    badge.style.background = 'transparent';
    badge.style.color = 'var(--color-text-muted)';
    badge.style.border = '1px solid var(--color-border)';
    badge.title = 'Lossless Context Management: OFF (click to configure)';
  }
}

window.manualCompact = async function() {
  const chat = state.activeChat;
  if (!chat || !chat.sessionId) { showToast('No active session', 'error'); return; }
  const btn = document.getElementById('status-compact-btn');
  if (btn) { btn.textContent = 'Compacting...'; btn.disabled = true; }
  const compactingEl = document.getElementById('status-compacting');
  if (compactingEl) { compactingEl.textContent = 'Compacting...'; compactingEl.style.display = ''; }
  try {
    const result = await API.post('/v1/context/compact', { session_id: chat.sessionId });
    const beforeK = ((result.before_tokens||0)/1000).toFixed(1);
    const afterK = ((result.after_tokens||0)/1000).toFixed(1);
    showToast(`Compacted: ${beforeK}k → ${afterK}k tokens`);
    // Reload session messages from server (in-memory state was updated)
    if (chat.sessionId) {
      const res = await API.getSessionMessages(chat.sessionId);
      const msgs = (res.messages || []).map(m => {
        const msg = { role: m.role, content: m.content };
        if (m.metadata) {
          if (m.metadata.model) msg.model = m.metadata.model;
          if (m.metadata.tokens) msg.tokens = m.metadata.tokens;
          if (m.metadata.tools) msg.tools = m.metadata.tools;
          if (m.metadata.thinking) msg.thinking = m.metadata.thinking;
        }
        return msg;
      });
      // If DB has more messages than compacted (DB not updated), use shorter set
      // The server's session.messages is the truth after compaction
      if (result.status === 'compacted') {
        // Estimate: compacted messages are fewer. Rebuild from after_tokens estimate.
        chat.totalTokens = result.after_tokens || 0;
      }
      chat.messages = msgs;
      renderMessages();
    }
  } catch(e) { showToast(e.message, 'error'); }
  if (btn) { btn.textContent = 'Compact'; btn.disabled = false; }
  if (compactingEl) compactingEl.style.display = 'none';
  updateStatusBar();
};

// ─── CONFIG MODAL ───────────────────────────────────────────
function openConfigModal(agentName) {
  state.configAgent = agentName;
  state.configTab = 'soul';
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'config-modal';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  const agentData = state.agents.find(a => getAgentName(a) === agentName);
  const isTeamHead = agentData && agentData.is_team_head;
  const displayName = agentData ? (agentData.display_name || agentName) : agentName;
  const cfgTabs = [
    {group: 'Agent', items: [{id:'soul', label:'Soul'}, {id:'settings', label:'Settings'}, {id:'commands', label:'Commands'}]},
    {group: 'Tools', items: [{id:'skills', label:'Skills'}, {id:'mcp', label:'MCP'}, {id:'hooks', label:'Hooks'}]},
    {group: 'Work', items: [{id:'projects', label:'Projects'}, {id:'workflows', label:'Workflows'}, {id:'schedule', label:'Schedule'}]},
    {group: 'Memory', items: [{id:'memory', label:'Memory'}, {id:'graph', label:'Graph'}]},
  ];
  const cfgNavHtml = cfgTabs.map(g => `
    <div class="settings-nav-group">
      <div class="settings-nav-label">${g.group}</div>
      ${g.items.map(t => `<button class="settings-nav-item config-tab ${t.id === 'soul' ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`).join('')}

  modal.innerHTML = `

        <div id="config-tab-content"></div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // Bind tab clicks
  modal.querySelectorAll('#config-tabs .settings-nav-item').forEach(tab => {
    tab.onclick = () => {
      stopRunningTasksRefresh();
      state.configTab = tab.dataset.tab;
      modal.querySelectorAll('#config-tabs .settings-nav-item').forEach(t => t.classList.toggle('active', t === tab));
      loadConfigTabContent(state.configTab, state.configAgent);
    };
  });

  // Clean up running tasks refresh when modal closes
  const origOnclick = modal.onclick;
  modal.onclick = (e) => {
    if (e.target === modal) { stopRunningTasksRefresh(); modal.remove(); }
  };
  // Also clean up if modal-close button is clicked
  const closeBtn = modal.querySelector('.modal-close');
  if (closeBtn) {
    const origClose = closeBtn.onclick;
    closeBtn.onclick = () => { stopRunningTasksRefresh(); modal.closest('.modal-overlay')?.remove(); };
  }

  loadConfigTabContent('soul', agentName);
}

            <div class="text-[11px] text-text-muted mb-3">
              Nightly consolidation: deduplication, staleness detection, conflict resolution, and skill candidate identification. Chains after relationship discovery.
            </div>
            <div class="flex items-center gap-3 flex-wrap mb-4">
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full ${adEnabled ? 'bg-success' : 'bg-error'}"></span>
                <span class="text-xs text-text-secondary">${adEnabled ? 'Enabled' : 'Disabled'}</span>
              </div>
              <span class="text-[10px] text-text-muted mono">stale: ${adCfg.stale_threshold_days || 30}d · merges: ${adCfg.max_dedup_merges || 10}/run · model: </span>
              <select id="autodream-model-select" class="text-[10px] bg-surface-light border border-border rounded px-1 py-0.5 mono text-text-secondary" onchange="setAutodreamModel('${esc(agentName)}','model',this.value)" style="max-width:180px">
                <option value="">default (Crow-4B)</option>
              </select>
              <span class="text-[10px] text-text-muted mono">→ fallback:</span>
              <select id="autodream-fallback-select" class="text-[10px] bg-surface-light border border-border rounded px-1 py-0.5 mono text-text-secondary" onchange="setAutodreamModel('${esc(agentName)}','model_fallback',this.value)" style="max-width:180px">
                <option value="">default (Haiku)</option>
              </select>
              <div class="flex gap-2 ml-auto">
                <button class="btn-secondary text-xs px-3 py-1.5 rounded-lg" onclick="memorySummaryAction('${esc(agentName)}','run_autodream')" title="Run memory consolidation now">Run Now</button>
                <button class="btn-secondary text-xs px-3 py-1.5 rounded-lg" onclick="toggleAutodream('${esc(agentName)}',${!adEnabled})">${adEnabled ? 'Disable' : 'Enable'}</button>
              </div>
            </div>
            <div id="memory-health-container">
              <div class="text-xs text-text-muted">Loading health data...</div>
            </div>
          </div>
        </div>`;

      // Populate model dropdowns (primary + fallback)
      API.getModels().then(models => {
        const modelList = Array.isArray(models) ? models : (models.models || []);
        const selectors = [
          { id: 'autodream-model-select',      current: adCfg.model || '' },
          { id: 'autodream-fallback-select',   current: adCfg.model_fallback || '' },
          { id: 'memsummary-model-select',     current: cfg.model || '' },
          { id: 'memsummary-fallback-select',  current: cfg.model_fallback || '' },
          { id: 'reldiscovery-model-select',   current: rdCfg.model || '' },
          { id: 'reldiscovery-fallback-select',current: rdCfg.model_fallback || '' },
        ];
        selectors.forEach(({ id, current }) => {
          const sel = document.getElementById(id);
          if (!sel) return;
          modelList.forEach(m => {
            const mid = typeof m === 'string' ? m : (m.id || m.name || '');
            if (!mid) return;
            const opt = document.createElement('option');
            opt.value = mid;
            opt.textContent = mid;
            if (mid === current) opt.selected = true;
            sel.appendChild(opt);
          });
        });
      }).catch(() => {});

      // Fetch health data asynchronously + poll while running
      (function pollHealth() {
        API.get(`/v1/agents/${encodeURIComponent(agentName)}/memory-health`).then(health => {
          const container = document.getElementById('memory-health-container');
          if (!container) return;
          container.innerHTML = renderMemoryHealth(health);
          // Auto-refresh every 3s while autodream is running
          const live = health?.autodream?.live;
          if (live && live.status === 'running') {
            setTimeout(pollHealth, 3000);
          }
        }).catch(() => {
          const container = document.getElementById('memory-health-container');
          if (container) container.innerHTML = '<div class="text-xs text-text-muted">Health data unavailable</div>';
        });
      })();

    } catch (e) {
      el.innerHTML = `<div class="text-error text-sm">Error loading memory summary: ${esc(e.message)}</div>`;
    }
  } else if (tab === 'graph') {
    // Close config modal and open full-screen knowledge map
    document.getElementById('config-modal')?.remove();
    openKnowledgeMap(agentName);
  }
}

window.memorySummaryAction = async function(agentName, action) {

  try {
    await API.post(`/v1/agents/${encodeURIComponent(agentName)}/memory-summary`, { action });
    const msgs = {reset: 'Memory summary reset', refresh: 'Memory summary refresh scheduled', discover: 'Relationship discovery started', run_autodream: 'Autodream consolidation started'};
    showToast(msgs[action] || action);
    if (action === 'reset') {
      const editor = document.getElementById('memory-summary-editor');

window.memorySummaryTogglePause = async function(agentName, pause) {
  try {
    // Read current agent.json, update paused state, save
    const res = await API.getAgentFile(agentName, 'agent.json');
    const content = typeof res === 'string' ? res : (res.content || JSON.stringify(res, null, 2));
    const parsed = JSON.parse(typeof res === 'object' && res.content ? res.content : content);
    if (!parsed.memory_summary) parsed.memory_summary = {};
    parsed.memory_summary.paused = pause;
    await API.writeAgentFile(agentName, 'agent.json', JSON.stringify(parsed, null, 2));
    showToast(pause ? 'Memory paused — existing summary preserved but not used or updated' : 'Memory resumed');
    loadConfigTabContent('memory', agentName);
  } catch (e) {
    showToast(`Error: ${e.message}`, true);

};

function renderMemoryHealth(h) {
  const score = h.health_score || 0;
  const scoreColor = score >= 80 ? 'bg-success' : score >= 50 ? 'bg-yellow-400' : 'bg-error';
  const scoreTextColor = score >= 80 ? 'text-green-400' : score >= 50 ? 'text-yellow-400' : 'text-red-400';
  const ad = h.autodream || {};
  const lastRun = ad.last_run ? new Date(ad.last_run).toLocaleString() : 'Never';
  const lr = ad.last_results || {};
  const reports = ad.reports || [];

  function statsCard(label, value, extraClass) {
    return `<div class="bg-surface-light rounded-lg p-3 text-center" style="min-width:0">
      <div class="text-lg font-bold ${extraClass || ''}">${value}</div>
      <div class="text-[10px] text-text-muted uppercase tracking-wider">${label}</div>
    </div>`;
  }

  function expandableSection(title, items) {
    if (!items || !items.length) return '';
    return `<details class="mt-2">
      <summary class="text-xs text-text-secondary cursor-pointer hover:text-text-primary transition-colors">${esc(title)} (${items.length})</summary>
      <div class="mt-1 pl-3 text-xs text-text-muted mono space-y-0.5" style="max-height:200px;overflow-y:auto">
        ${items.map(i => `<div style="padding:2px 0">· ${esc(String(i))}</div>`).join('')}
      </div>
    </details>`;
  }

  // Recall frequency bar
  const rf = h.recall_frequency || {};
  const rfTotal = (rf.hot || 0) + (rf.warm || 0) + (rf.cold || 0) + (rf.never_recalled || 0);
  function rfPct(v) { return rfTotal ? Math.round((v / rfTotal) * 100) : 0; }

  // Live status
  const live = ad.live || {};
  const isRunning = live.status === 'running';
  const phases = {starting:'Starting…', dedup:'Deduplicating…', staleness:'Checking staleness…', conflicts:'Detecting conflicts…', skill_candidates:'Finding skill candidates…', report:'Writing report…', done:'Done', failed:'Failed'};

  let html = '';

  // Live status banner
  if (isRunning) {
    html += `<div class="flex items-center gap-2 mb-3 px-3 py-2 rounded-lg bg-accent/10 border border-accent/30">
      <span class="w-2 h-2 rounded-full bg-accent breathing-dot"></span>
      <span class="text-xs text-accent font-medium">Running: ${phases[live.phase] || live.phase || '…'}</span>
      <span class="text-[10px] text-text-muted mono ml-auto">started ${new Date(live.started_at).toLocaleTimeString()}</span>
    </div>`;
  } else if (live.status === 'completed' && live.finished_at) {
    const lr2 = live.results || {};
    html += `<div class="flex items-center gap-2 mb-3 px-3 py-2 rounded-lg bg-success/10 border border-success/30">
      <span class="w-2 h-2 rounded-full bg-success"></span>
      <span class="text-xs text-green-400 font-medium">Last run completed</span>
      <span class="text-[10px] text-text-muted mono">${new Date(live.finished_at).toLocaleTimeString()} · ${live.elapsed || 0}s · score ${lr2.health_score || '?'} · ${lr2.merged || 0} merged · ${lr2.stale || 0} stale · ${lr2.conflicts || 0} conflicts</span>
    </div>`;
  } else if (live.status === 'error') {
    html += `<div class="flex items-center gap-2 mb-3 px-3 py-2 rounded-lg bg-error/10 border border-error/30">
      <span class="w-2 h-2 rounded-full bg-error"></span>
      <span class="text-xs text-red-400 font-medium">Last run failed</span>
      <span class="text-[10px] text-text-muted mono">${esc(live.error || 'Unknown error')}</span>
    </div>`;
  }

  html += `
    <!-- Health Score + Last Run -->
    <div class="flex items-center gap-4 mb-4">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 rounded-full ${scoreColor} flex items-center justify-center text-sm font-bold text-white" style="flex-shrink:0">${score}</div>
        <div>
          <div class="text-xs font-medium ${scoreTextColor}">Health Score</div>
          <div class="text-[10px] text-text-muted mono">Last report: ${esc(lastRun)}</div>
        </div>
      </div>
    </div>

    <!-- Stats Cards -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px" class="mb-4">
      ${statsCard('Total', h.total_memories || 0)}
      ${statsCard('Stale', h.stale_count || 0, (h.stale_count || 0) > 0 ? 'text-yellow-400' : '')}
      ${statsCard('Conflicts', lr.conflicts_found || 0, (lr.conflicts_found || 0) > 0 ? 'text-red-400' : '')}
      ${statsCard('Merged', lr.merged || 0, (lr.merged || 0) > 0 ? 'text-blue-400' : '')}
      ${statsCard('Skill Ideas', lr.candidates_found || 0)}
    </div>

    <!-- Recall Frequency Bar -->
    ${rfTotal > 0 ? `
    <div class="mb-3">
      <div class="text-[10px] text-text-secondary uppercase tracking-wider mb-1">Recall Frequency</div>
      <div class="flex rounded-lg overflow-hidden h-3 bg-surface-light">
        ${rf.hot ? `<div class="bg-green-500" style="width:${rfPct(rf.hot)}%" title="Hot (7d): ${rf.hot}"></div>` : ''}
        ${rf.warm ? `<div class="bg-blue-400" style="width:${rfPct(rf.warm)}%" title="Warm (30d): ${rf.warm}"></div>` : ''}
        ${rf.cold ? `<div class="bg-yellow-500" style="width:${rfPct(rf.cold)}%" title="Cold (30d+): ${rf.cold}"></div>` : ''}
        ${rf.never_recalled ? `<div class="bg-gray-600" style="width:${rfPct(rf.never_recalled)}%" title="Never recalled: ${rf.never_recalled}"></div>` : ''}
      </div>
      <div class="flex gap-3 mt-1 text-[9px] text-text-muted">
        <span><span class="inline-block w-2 h-2 rounded-sm bg-green-500 mr-0.5"></span>Hot ${rf.hot || 0}</span>
        <span><span class="inline-block w-2 h-2 rounded-sm bg-blue-400 mr-0.5"></span>Warm ${rf.warm || 0}</span>
        <span><span class="inline-block w-2 h-2 rounded-sm bg-yellow-500 mr-0.5"></span>Cold ${rf.cold || 0}</span>
        <span><span class="inline-block w-2 h-2 rounded-sm bg-gray-600 mr-0.5"></span>Never ${rf.never_recalled || 0}</span>
      </div>
    </div>` : ''}

    <!-- Type Breakdown -->
    ${h.by_type && Object.keys(h.by_type).length ? `
    <div class="mb-3">
      <div class="text-[10px] text-text-secondary uppercase tracking-wider mb-1">By Type</div>
      <div class="flex gap-2 flex-wrap">
        ${Object.entries(h.by_type).map(([t, c]) => `<span class="text-[10px] bg-surface-light px-2 py-0.5 rounded-full mono">${esc(t)}: ${c}</span>`).join('')}
      </div>
    </div>` : ''}

    <!-- Age Distribution -->
    ${h.age_distribution ? `
    <div class="mb-3 text-[10px] text-text-muted mono">
      Age: avg ${h.age_distribution.avg_days}d · oldest ${h.age_distribution.oldest_days}d · newest ${h.age_distribution.newest_days}d
      · Created: ${h.auto_memory_rate?.last_24h || 0} (24h) / ${h.auto_memory_rate?.last_7d || 0} (7d)
    </div>` : ''}
  `;

  // Expandable detail sections
  html += expandableSection('Stale Memories', h.stale_names || []);
  html += expandableSection('Conflict Pairs',
    (lr.conflict_pairs || []).map(p => p.a + ' ↔ ' + p.b + ': ' + p.nature));

  // Skill candidates with Promote buttons
  const skillCandidates = lr.candidate_details || [];
  if (skillCandidates.length) {
    html += `<details class="mt-2">
      <summary class="text-xs text-text-secondary cursor-pointer hover:text-text-primary transition-colors">Skill Candidates (${skillCandidates.length})</summary>
      <div class="mt-1 pl-3 text-xs text-text-muted mono space-y-1" style="max-height:200px;overflow-y:auto">
        ${skillCandidates.map(c => `<div class="flex items-center gap-2" style="padding:2px 0">
          <span class="flex-1">· ${esc(c.name)} — ${esc(c.reason)}</span>
          <button class="btn-primary text-[10px] px-2 py-0.5 rounded" onclick="promoteToSkill('${esc(h.agent)}','${esc(c.name)}',this)">Promote</button>
        </div>`).join('')}
      </div>
    </details>`;
  }

  // Run History
  if (reports.length) {
    html += `<div class="mt-3">
      <div class="text-[10px] text-text-secondary uppercase tracking-wider mb-1">Recent Runs</div>
      ${reports.map(r => {
        const sc = r.health_score || 0;
        const c = sc >= 80 ? 'text-green-400' : sc >= 50 ? 'text-yellow-400' : 'text-red-400';
        return `<div class="text-[10px] text-text-muted mono">${esc(r.date)} — <span class="${c}">Score: ${sc}</span></div>`;
      }).join('')}
    </div>`;
  }

  return html;
}

async function ingestFileObject(file, agentName, projectName) {
  const progress = document.getElementById('ingest-progress');
  const label = document.getElementById('ingest-progress-label');
  if (progress) progress.style.display = '';
  if (label) label.textContent = `Ingesting ${file.name}...`;

  const opts = getIngestOptions();

  // For now, send file_path or name — the server will handle actual upload
  // In a full implementation this would be multipart upload
  const data = {
    file_name: file.name,
    file_size: file.size,
    ...opts,
  };

  try {
    // Read file as base64 for upload
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
    data.file_data = base64;

    const endpoint = projectName
      ? `/v1/agents/${encodeURIComponent(agentName)}/projects/${encodeURIComponent(projectName)}/ingest`
      : `/v1/agents/${encodeURIComponent(agentName)}/ingest`;
    const res = await API.post(endpoint, data);

    if (res.error) {
      if (label) label.textContent = `Error: ${res.error}`;
    } else {
      if (label) label.textContent = `Done! ${res.chunks || 0} chunks from ${file.name}`;
      showToast(`Ingested ${file.name}: ${res.chunks || 0} chunks`);
      // Refresh projects
      await loadAgentProjects(agentName);
    }
  } catch (e) {
    if (label) label.textContent = `Error: ${e.message}`;
    showToast(`Ingest error: ${e.message}`, true);
  }
}

window.ingestUrl = async function(agentName, projectName) {

function formatElapsed(ms) {
  if (ms < 0) ms = 0;
  const secs = Math.floor(ms / 1000);
  const mins = Math.floor(secs / 60);
  const hrs = Math.floor(mins / 60);
  if (hrs > 0) return `${hrs}h ${mins % 60}m ${secs % 60}s`;
  if (mins > 0) return `${mins}m ${secs % 60}s`;
  return `${secs}s`;
}

function updateElapsedTimers() {
  document.querySelectorAll('.running-elapsed').forEach(el => {
    const started = parseInt(el.dataset.started);
    if (started) el.textContent = formatElapsed(Date.now() - started);
  });
}

function startRunningTasksRefresh(agentName) {
  stopRunningTasksRefresh();
  // Update elapsed every second
  const elapsedTimer = setInterval(updateElapsedTimers, 1000);
  // Refresh running tasks from server every 5 seconds
  const refreshTimer = setInterval(() => refreshRunningTasks(agentName), 5000);
  _runningTasksInterval = { elapsedTimer, refreshTimer };
}

function stopRunningTasksRefresh() {
  if (_runningTasksInterval) {
    clearInterval(_runningTasksInterval.elapsedTimer);
    clearInterval(_runningTasksInterval.refreshTimer);
    _runningTasksInterval = null;
  }
}

async function refreshRunningTasks(agentName) {
  // Only refresh if schedule tab is still open
  if (state.configTab !== 'schedule') { stopRunningTasksRefresh(); return; }
  const section = _q('running-tasks-section');
  const body = _q('running-tasks-body');
  if (!section || !body) { stopRunningTasksRefresh(); return; }
  try {
    const res = await API.getRunningTasks();
    const running = (res.running || []).filter(r => r.agent === agentName);
    if (running.length > 0) {
      section.style.display = 'block';
      // Preserve expanded log rows
      const expandedLogs = new Set();
      body.querySelectorAll('.running-log-row:not(.hidden)').forEach(row => {
        expandedLogs.add(row.dataset.logTask);
      });
      body.innerHTML = renderRunningTasksRows(running);
      // Re-expand previously expanded logs
      expandedLogs.forEach(name => {
        const logRow = body.querySelector(`.running-log-row[data-log-task="${name}"]`);
        if (logRow) logRow.classList.remove('hidden');
      });
      // Auto-scroll expanded log containers to bottom
      body.querySelectorAll('.running-log-row:not(.hidden) .running-log-content').forEach(el => {
        el.scrollTop = el.scrollHeight;
      });
    } else {
      section.style.display = 'none';
      body.innerHTML = '';
    }
  } catch (e) {
    // Silently ignore refresh errors
  }
}

  const modals = document.querySelectorAll('.modal-overlay');

    if (el) return el;

  // 2. Global fallback

}

function buildScheduleFromUI() {
  const type = _q('sched-freq-type')?.value;
  const time = _q('sched-time')?.value;

  const dayNames = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];

  if (type === 'every-min') return `every ${parseInt(interval) || 30}m`;
  if (type === 'every-hr') return `every ${parseInt(interval) || 1}h`;
  if (type === 'daily') return `daily ${time || '09:00'}`;
  if (type === 'weekly') return `weekly ${dayNames[parseInt(day) || 0]} ${time || '09:00'}`;
  if (type === 'once') {
    if (!date) { showToast('Please select a date for one-time schedule', true); return null; }
    return `once ${date} ${time || '09:00'}`;
  }
  return `daily ${time || '09:00'}`;
}

window.editScheduleTask = function(taskJson) {
  try {
    const t = typeof taskJson === 'string' ? JSON.parse(taskJson) : taskJson;
    // Fill in form fields
    const nameEl = _q('sched-task-name');
    const msgEl = _q('sched-task-message');
    const agentEl = _q('sched-agent-select');
    const modelEl = _q('sched-model-override');
    const freqEl = _q('sched-freq-type');
    const editingEl = _q('sched-editing-name');
    const titleEl = _q('sched-form-title');
    const submitBtn = _q('sched-submit-btn');
    const cancelBtn = _q('sched-cancel-edit');

    if (nameEl) { nameEl.value = t.name || ''; nameEl.readOnly = true; nameEl.style.opacity = '0.6'; }
    if (msgEl) msgEl.value = t.task || '';
    if (agentEl) agentEl.value = t.agent || 'main';
    if (modelEl) modelEl.value = t.model || '';
    const timeoutEl = _q('sched-timeout');
    if (timeoutEl) timeoutEl.value = Math.round((t.timeout || 300) / 60);
    if (editingEl) editingEl.value = t.name || '';
    if (titleEl) titleEl.textContent = 'Edit Scheduled Task';
    if (submitBtn) submitBtn.textContent = 'Save Changes';
    if (cancelBtn) cancelBtn.classList.remove('hidden');

    // Parse schedule string to set frequency type and details
    const sched = (t.schedule || '').toLowerCase();
    if (sched.startsWith('every') && sched.endsWith('m')) {
      if (freqEl) freqEl.value = 'every-min';
      updateScheduleFreqUI();
      const intEl = _q('sched-interval');
      if (intEl) intEl.value = parseInt(sched.replace(/\D/g, '')) || 30;
    } else if (sched.startsWith('every') && sched.endsWith('h')) {
      if (freqEl) freqEl.value = 'every-hr';
      updateScheduleFreqUI();
      const intEl = _q('sched-interval');
      if (intEl) intEl.value = parseInt(sched.replace(/\D/g, '')) || 1;
    } else if (sched.startsWith('daily')) {
      if (freqEl) freqEl.value = 'daily';
      updateScheduleFreqUI();
      const timeEl = _q('sched-time');
      if (timeEl) timeEl.value = sched.split(' ')[1] || '09:00';
    } else if (sched.startsWith('weekly')) {
      if (freqEl) freqEl.value = 'weekly';
      updateScheduleFreqUI();
      const parts = sched.split(' ');
      const dayMap = { sun: 0, mon: 1, tue: 2, wed: 3, thu: 4, fri: 5, sat: 6 };
      const dayEl = _q('sched-day');
      const timeEl = _q('sched-time');
      if (dayEl && parts[1]) dayEl.value = dayMap[parts[1]] ?? 1;
      if (timeEl && parts[2]) timeEl.value = parts[2];
    } else if (sched.startsWith('once')) {
      if (freqEl) freqEl.value = 'once';
      updateScheduleFreqUI();
      const parts = sched.split(' ');
      const dateEl = _q('sched-date');
      const timeEl = _q('sched-time');
      if (dateEl && parts[1]) dateEl.value = parts[1];
      if (timeEl && parts[2]) timeEl.value = parts[2];
    }

    // Scroll to form
    document.getElementById('sched-form-title')?.scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    showToast('Error loading task for edit', 'error');
  }
};

window.installFromUrl = async function(agentName) {
  const url = document.getElementById('skill-url')?.value?.trim();
  if (!url) { showToast('Enter a ClawHub or GitHub URL', 'error'); return; }

  // Parse URL: https://clawhub.ai/author/skill or https://github.com/openclaw/skills/.../author/skill
  let author = '', skillName = '';
  try {
    const u = new URL(url);
    const parts = u.pathname.replace(/^\/+|\/+$/g, '').split('/');
    if (u.hostname.includes('clawhub')) {
      // clawhub.ai/author/skill-name
      if (parts.length >= 2) { author = parts[0]; skillName = parts[1]; }
    } else if (u.hostname.includes('github.com')) {
      // github.com/openclaw/skills/.../skills/author/skill-name
      const idx = parts.indexOf('skills', 2);
      if (idx >= 0 && parts.length > idx + 2) { author = parts[idx + 1]; skillName = parts[idx + 2]; }
    }
  } catch {}

  if (!author || !skillName) {
    showToast('Could not parse URL. Expected: https://clawhub.ai/author/skill-name', 'error');
    return;
  }

  showToast(`Installing ${author}/${skillName}...`);
  try {
    const res = await API.post('/v1/skills/install', { skill: skillName, author, agent: agentName });
    if (res.error) {
      showToast(res.error, 'error');
    } else {
      showToast(`Installed "${skillName}" from ${author}`);
      document.getElementById('skill-url').value = '';
      if (state.configAgent === agentName && state.configTab === 'skills') {
        loadConfigTabContent('skills', agentName);
      }
    }
  } catch (e) {
    showToast(e.message, 'error');
  }
};

window.installFromZip = async function(event, agentName) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith('.zip')) { showToast('Please select a .zip file', 'error'); return; }

  showToast(`Uploading ${file.name}...`);
  const reader = new FileReader();
  reader.onload = async function(e) {
    // Convert to base64
    const base64 = btoa(new Uint8Array(e.target.result).reduce((s, b) => s + String.fromCharCode(b), ''));
    const name = file.name.replace('.zip', '').replace(/[^a-zA-Z0-9_-]/g, '-');
    try {
      const res = await API.post('/v1/skills/install-zip', { zip_data: base64, agent: agentName, name });
      if (res.error) {
        showToast(res.error, 'error');
      } else {
        showToast(`Installed "${res.skill}" (${(res.files || []).length} files)`);
        if (state.configAgent === agentName && state.configTab === 'skills') {
          loadConfigTabContent('skills', agentName);
        }
      }
    } catch (e) {
      showToast(e.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';  // reset file input
};

window.handleAvatarUpload = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  // Resize to 64x64 and convert to base64
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      // Center crop to square
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2;
      const sy = (img.height - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, 64, 64);
      const dataUrl = canvas.toDataURL('image/png');
      // Set as avatar value
      const hidden = document.getElementById('cfg-avatar');
      if (hidden) hidden.value = dataUrl;
      // Update preview
      const preview = document.getElementById('custom-avatar-preview');
      if (preview) preview.innerHTML = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover">`;
      // Highlight upload button, deselect presets
      document.querySelectorAll('#avatar-picker .avatar-pick').forEach(btn => {
        btn.classList.remove('border-accent', 'bg-accent/10');
        btn.classList.add('border-transparent');
      });
      const uploadBtn = document.getElementById('btn-avatar-upload');
      if (uploadBtn) {
        uploadBtn.classList.add('border-accent', 'bg-accent/10');
        uploadBtn.classList.remove('border-transparent');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveAgentSettings = async function(agentName) {
  const raw = $('#cfg-raw-json')?.value;
  if (raw === undefined) return;
  try {
    const parsed = JSON.parse(raw);
    // Sync form fields into parsed JSON
    const displayNameVal = $('#cfg-display-name')?.value;
    const descVal = $('#cfg-description')?.value;
    const modelVal = $('#cfg-model')?.value;
    const avatarVal = $('#cfg-avatar')?.value;
    if (displayNameVal !== undefined) parsed.display_name = displayNameVal || undefined;
    if (descVal !== undefined) parsed.description = descVal;
    if (modelVal !== undefined) parsed.model = modelVal || undefined;
    // Handle model_purpose for auto mode
    const purposeVal = $('#cfg-model-purpose')?.value;
    if (modelVal === 'auto' && purposeVal) {
      parsed.model_purpose = purposeVal;
    } else {
      delete parsed.model_purpose;
    }
    // Remove legacy max_context from agent config (now a model-level property)
    delete parsed.max_context;
    if (avatarVal) parsed.avatar = avatarVal;
    // Sync memory_summary settings
    const msEnabled = $('#cfg-memsummary-enabled')?.checked;
    if (msEnabled !== undefined) {
      const msFreq = $('#cfg-memsummary-frequency')?.value || 'every 24h';
      const msTime = $('#cfg-memsummary-start-time')?.value || '03:00';
      const existingPaused = parsed.memory_summary?.paused || false;
      parsed.memory_summary = {
        enabled: msEnabled,
        paused: existingPaused,
        frequency: msFreq,
        start_time: msTime,
      };
    }
    const finalJson = JSON.stringify(parsed, null, 2);
    await API.writeAgentFile(agentName, 'agent.json', finalJson);
    showToast('Settings saved');
    // Reload agents data and refresh UI
    try {
      const agentsData = await API.getAgents();
      state.agents = Array.isArray(agentsData) ? agentsData : (agentsData.agents || []);
      if (agentsData.team_structure) state.teamStructure = agentsData.team_structure;
      renderAgentCards();
      updateChatArea();
    } catch {}
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

    if (res.error) throw new Error(res.error);
    showToast(`Renamed to ${newName}`);
    // Update local state: rename in agentChats, agentSessions, activeAgentId
    if (state.agentChats[oldName]) {
      state.agentChats[newName] = { ...state.agentChats[oldName], agent: newName };
      delete state.agentChats[oldName];
    }
    if (state.agentSessions[oldName]) {
      state.agentSessions[newName] = state.agentSessions[oldName];
      delete state.agentSessions[oldName];
    }
    if (state.activeAgentId === oldName) state.activeAgentId = newName;
    // Reload agents list
    const agentsData2 = await API.getAgents();
    state.agents = Array.isArray(agentsData2) ? agentsData2 : (agentsData2.agents || []);
    if (agentsData2.team_structure) state.teamStructure = agentsData2.team_structure;
    renderAgentCards();
    updateChatArea();
    // Reopen config modal for new name on settings tab
    document.getElementById('config-modal')?.remove();
    state.configAgent = newName;
    state.configTab = 'settings';
    openConfigModal(newName);
    // Switch to settings tab
    const modal = document.getElementById('config-modal');
    if (modal) {
      const settingsTab = modal.querySelector('[data-tab="settings"]');
      if (settingsTab) settingsTab.click();
    }
  } catch (e) {
    showToast(`Error: ${e.message}`, true);
  }
};

window.createHook = async function(agentName) {
  const name = document.getElementById('add-hook-name')?.value?.trim();
  const type = document.getElementById('add-hook-type')?.value;
  const tools = document.getElementById('add-hook-tools')?.value?.split(',').map(t=>t.trim()).filter(Boolean) || ['*'];
  const script = document.getElementById('add-hook-script')?.value?.trim();
  if (!name || !script) { showToast('Name and script required', 'error'); return; }
  try {
    const data = await API.get(`/v1/agents/${encodeURIComponent(agentName)}/hooks`);
    if (!data.scripts) data.scripts = [];
    data.scripts.push({ name, type, tools, script, enabled: true });
    if (!data.enabled) data.enabled = true;
    if (!data.timeout) data.timeout = 5000;
    await API.post(`/v1/agents/${encodeURIComponent(agentName)}/hooks`, data);
    document.querySelector('.modal-overlay:last-child')?.remove();
    showToast('Hook added');
    loadConfigTabContent('hooks', agentName);

};

let _notifDropdownOpen = false;
let _notifPollTimer = null;

async function pollNotifications() {
  try {
    const res = await API.get('/v1/notifications/unread');
    const badge = document.getElementById('notif-badge');
    if (badge) {
      const count = res.unread || 0;
      badge.textContent = count > 9 ? '9+' : String(count);
      badge.classList.toggle('hidden', count === 0);
    }
  } catch {}
}

function startNotifPolling() {
  pollNotifications();
  _notifPollTimer = setInterval(pollNotifications, 30000);
}

async function toggleNotificationDropdown() {
  const existing = document.getElementById('notif-dropdown');
  if (existing) { existing.remove(); _notifDropdownOpen = false; return; }
  _notifDropdownOpen = true;

  // Mark all as read
  try { await API.post('/v1/notifications/read', {}); } catch {}

  const res = await API.get('/v1/notifications');
  const notifs = res.notifications || [];

  const dd = document.createElement('div');
  dd.id = 'notif-dropdown';
  dd.style.cssText = 'position:fixed;bottom:50px;left:60px;width:360px;max-height:400px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);z-index:9999;padding:8px 0';

  const sevIcon = (s) => s === 'critical' || s === 'error' ? '<span style="color:#f87171">!!</span>' : s === 'warning' ? '<span style="color:#ff8700">!</span>' : '<span style="color:#5f87ff">i</span>';
  const timeAgo = (ts) => {
    const diff = (Date.now() - new Date(ts).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
  };

  if (notifs.length === 0) {
    dd.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">No notifications</div>';
  } else {
    dd.innerHTML = `
      <div style="padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;font-weight:600;color:var(--text-primary)">Notifications</span>
        <button onclick="dismissAllNotifications()" style="font-size:10px;color:var(--text-muted);background:none;border:none;cursor:pointer">Clear all</button>
      </div>
      ${notifs.slice(0, 20).map(n => `
        <div class="notif-item" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:8px;align-items:flex-start" onclick="dismissNotification('${esc(n.id)}', this)">
          <div style="font-size:12px;flex-shrink:0;margin-top:2px">${sevIcon(n.severity)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(n.title)}</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(n.message)}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:3px">${n.agent ? esc(n.agent) + ' · ' : ''}${timeAgo(n.created_at)}</div>
          </div>
        </div>
      `).join('')}
    `;
  }

  document.body.appendChild(dd);
  pollNotifications();

  // Close on outside click
  setTimeout(() => {
    const handler = (e) => {
      if (!dd.contains(e.target) && e.target.id !== 'btn-notifications') {
        dd.remove(); _notifDropdownOpen = false;
        document.removeEventListener('click', handler);
      }
    };
    document.addEventListener('click', handler);
  }, 100);
}

async function dismissNotification(id, el) {
  try {
    await API.post('/v1/notifications/dismiss', { id });
    if (el) el.style.display = 'none';
    pollNotifications();

}

function _fmtUptime(s) {
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
  return (d ? d + 'd ' : '') + (h ? h + 'h ' : '') + m + 'm';
}

                  ${members.map(mid => `<span class="inline-flex items-center gap-1 px-2.5 py-1 bg-surface-light border border-border rounded-lg text-xs text-text-primary">
                    ${esc(agentLabel(mid))} ${mid === headId ? '<span class="text-accent text-[9px] font-bold">HEAD</span>' : `<button class="text-error hover:text-red-400 ml-0.5" onclick="teamRemoveMember('${esc(tid)}','${esc(mid)}')">&times;</button>`}

      <div class="glass-card p-5">
        <h3 class="text-text-primary font-display font-semibold mb-4">Create New Team</h3>

          <div class="grid grid-cols-[auto_1fr] gap-x-3 gap-y-2 items-center">

            <label class="text-[11px] text-text-secondary font-medium uppercase tracking-wider">Name</label>
            <input id="new-team-name" class="bg-surface-light border border-border rounded-lg px-3 py-1.5 text-sm text-text-primary focus:border-accent transition-colors" placeholder="Research Team">
            <label class="text-[11px] text-text-secondary font-medium uppercase tracking-wider">Description</label>
            <input id="new-team-desc" class="bg-surface-light border border-border rounded-lg px-3 py-1.5 text-sm text-text-primary focus:border-accent transition-colors" placeholder="Handles research and analysis">
          </div>
          <div>
            <label class="text-[11px] text-text-secondary font-medium block mb-1 uppercase tracking-wider">Members (select at least one — first selected becomes head)</label>
            <select id="new-team-members" class="w-full bg-surface-light border border-border rounded-lg px-3 py-1.5 text-sm text-text-primary" multiple size="5">
              ${allAgents.map(a => {
                const n = getAgentName(a);
                return `<option value="${esc(n)}">${esc(agentLabel(n))}</option>`;
              }).join('')}
            </select>
            <p class="text-text-muted text-[10px] mt-1">Hold Cmd/Ctrl to select multiple</p>
          </div>
          <button class="btn-primary px-5 py-2 rounded-xl text-sm font-display" onclick="createNewTeam()">Create Team</button>
        </div>
      </div>
    </div>`;
}

window.createNewTeam = async function() {
  const name = $('#new-team-name')?.value.trim();
  const desc = $('#new-team-desc')?.value.trim();
  const avatar = $('#new-team-avatar')?.value.trim();
  const sel = document.getElementById('new-team-members');
  const members = sel ? Array.from(sel.selectedOptions).map(o => o.value) : [];
  if (!members.length) { showToast('Select at least one member', true); return; }
  if (!name) { showToast('Team name is required', true); return; }
  try {
    await API.post('/v1/teams', { action: 'create', members, head: members[0], name, description: desc, avatar });
    showToast(`Team "${name}" created`);
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

window.saveTeamSettings = async function(teamId) {
  const card = document.querySelector(`[data-team-id="${CSS.escape(teamId)}"]`);
  if (!card) return;
  const name = card.querySelector('.team-edit-name')?.value.trim();
  const desc = card.querySelector('.team-edit-desc')?.value.trim();
  const avatar = card.querySelector('.team-edit-avatar')?.value.trim();
  const head = card.querySelector('.team-edit-head')?.value;
  try {
    const payload = { action: 'update', team_id: teamId };
    if (name !== undefined) payload.name = name;
    if (desc !== undefined) payload.description = desc;
    if (avatar !== undefined) payload.avatar = avatar;
    if (head) payload.head = head;
    await API.post('/v1/teams', payload);
    showToast('Team saved');
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

window.teamAddMember = async function(teamId) {
  const card = document.querySelector(`[data-team-id="${CSS.escape(teamId)}"]`);
  const sel = card?.querySelector('.team-add-select');
  const memberId = sel?.value;
  if (!memberId) { showToast('Select an agent', true); return; }
  try {
    const ts = state.teamStructure || {};
    const team = (ts.teams || {})[teamId];
    const current = (team?.members || []).map(m => typeof m === 'string' ? m : (m.id || m));
    await API.post('/v1/teams', { action: 'update', team_id: teamId, members: [...current, memberId] });
    showToast(`Added ${memberId}`);
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

window.teamRemoveMember = async function(teamId, memberId) {
  try {
    const ts = state.teamStructure || {};
    const team = (ts.teams || {})[teamId];
    const current = (team?.members || []).map(m => typeof m === 'string' ? m : (m.id || m));
    const updated = current.filter(m => m !== memberId);
    if (updated.length === 0) { showToast('Cannot remove last member — dissolve the team instead', true); return; }
    await API.post('/v1/teams', { action: 'update', team_id: teamId, members: updated });
    showToast(`Removed ${memberId}`);
    await loadInitialData();
    loadSettingsTab();
  } catch (e) { showToast(e.message, true); }
};

async function renderMemoryHealthTab(el) {
  const agents = await API.get('/v1/agents');

    agentList.map(a => {

    ? Math.round(healthData.reduce((s, h) => s + (h.health_score || 0), 0) / healthData.filter(h => !h.error).length)

          <!-- Recall Frequency Bar -->
          ${rfTotal > 0 ? `

              ${rf.cold ? '<div class="bg-yellow-500" style="width:'+rfPct(rf.cold)+'%"></div>' : ''}

            <div class="flex gap-2 mt-0.5 text-[8px] text-text-muted">

              <span class="flex items-center gap-0.5"><span class="inline-block w-1.5 h-1.5 rounded-sm bg-blue-400"></span>${rf.warm||0} warm</span>

async function renderQmdTab(el) {
  const svc = await API.get('/v1/services');
  const qmd = svc.qmd || {};
  const running = qmd.status === 'running';
  const collections = qmd.collections || [];
  el.innerHTML = `
    <div class="glass-card p-6 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <span class="w-2.5 h-2.5 rounded-full ${running ? 'bg-success breathing-dot' : 'bg-error'}"></span>
          <span class="text-text-primary font-display font-semibold">${running ? 'Running' : 'Stopped'}</span>
          <span class="text-text-muted text-xs mono">port ${qmd.port || 8181}</span>
        </div>
        <div class="flex items-center gap-2">
          ${running
            ? `<button onclick="qmdAction('stop')" class="btn-secondary text-xs px-3 py-1.5 rounded-lg">Stop</button>
               <button onclick="qmdAction('reindex')" class="btn-primary text-xs px-3 py-1.5 rounded-lg">Reindex All</button>`
            : `<button onclick="qmdAction('start')" class="btn-primary text-xs px-3 py-1.5 rounded-lg">Start</button>`}
        </div>
      </div>
      <div class="flex items-center justify-between">
        <div class="text-xs text-text-muted">Hybrid search: BM25 + vector + LLM reranking</div>
        <button onclick="toggleServiceLog('qmd')" class="btn-secondary text-xs px-3 py-1 rounded-lg">View Log</button>
      </div>
    </div>
    <div id="log-qmd" class="hidden mt-4"></div>
    ${collections.length ? `
    <div class="glass-card p-6">
      <h3 class="section-header mb-3 text-sm">Collections</h3>
      ${(() => {
        const totFiles = collections.reduce((s,c) => s + (c.total||0), 0);
        const totIndexed = collections.reduce((s,c) => s + (c.indexed||0), 0);
        const totEmbedded = collections.reduce((s,c) => s + (c.embedded||0), 0);
        const totStale = collections.reduce((s,c) => s + (c.stale||0), 0);
        const totNotIdx = collections.reduce((s,c) => s + (c.not_indexed||0), 0);
        const allOk = totFiles > 0 && totIndexed === totFiles && totEmbedded === totFiles;
        if (!totFiles) return '';
        const dot = allOk ? 'bg-green-400' : 'bg-yellow-400';
        let issues = '';
        if (!allOk) {
          const parts = [];
          if (totNotIdx > 0) parts.push(totNotIdx + ' not indexed');
          if (totStale > 0) parts.push(totStale + ' stale');
          if (totEmbedded < totFiles) parts.push((totFiles - totEmbedded) + ' not embedded');
          issues = ' · <span class="text-yellow-400">' + parts.join(', ') + '</span>';
        }
        return '<div class="flex items-center gap-3 mb-4 px-1 text-xs mono text-text-muted">' +
          '<span class="inline-block w-2 h-2 rounded-full ' + dot + '"></span>' +
          '<span>' + totFiles + ' files</span>' +
          '<span class="text-border">|</span>' +
          '<span>' + totIndexed + '/' + totFiles + ' indexed</span>' +
          '<span class="text-border">|</span>' +
          '<span>' + totEmbedded + '/' + totFiles + ' embedded</span>' +
          issues +
        '</div>';
      })()}
      <div class="space-y-2" id="qmd-collections">
        ${(() => {
          const ts = state.teamStructure || {};
          const teams = ts.teams || {};
          const collMap = {};
          collections.forEach(c => {
            const n = typeof c === 'string' ? c : (c.name || c.id || '?');
            collMap[n] = c;
          });
          const inTeam = new Set();
          Object.keys(teams).forEach(h => { inTeam.add(h); (teams[h].members||[]).forEach(m => inTeam.add(m.id || m)); });

          function renderCollRow(c) {
            const name = typeof c === 'string' ? c : (c.name || c.id || '?');
            const total = c.total || 0;
            const indexed = c.indexed || 0;
            const embedded = c.embedded || 0;
            const stale = c.stale || 0;
            const notIndexed = c.not_indexed || 0;
            const hasIssues = stale > 0 || notIndexed > 0;
            const allGood = total > 0 && indexed === total && embedded === total;
            // Build compact stats
            let statsHtml = '';
            if (total > 0) {
              const dot = allGood ? 'bg-green-400' : hasIssues ? 'bg-yellow-400' : 'bg-green-400';
              statsHtml = '<span class="inline-block w-1.5 h-1.5 rounded-full ' + dot + ' mr-1"></span>';
              statsHtml += '<span class="text-text-muted text-[10px] mono">' + total + ' files';
              if (hasIssues) {
                const parts = [];
                if (notIndexed > 0) parts.push(notIndexed + ' not indexed');
                if (stale > 0) parts.push(stale + ' stale');
                if (embedded < total) parts.push((total - embedded) + ' not embedded');
                statsHtml += ' · <span class="text-yellow-400">' + parts.join(', ') + '</span>';
              }
              statsHtml += '</span>';
            }
            return '<div class="border border-border/50 rounded-lg overflow-hidden" data-collection="' + esc(name) + '">' +
              '<div class="flex items-center justify-between px-4 py-2.5">' +
                '<div class="flex items-center gap-2">' +
                  '<button class="qmd-expand-btn text-text-muted hover:text-accent transition-colors text-[10px]" onclick="toggleQmdDocs(\'' + esc(name) + '\')" title="Browse files">▶</button>' +
                  '<span class="text-text-primary font-medium text-sm">' + esc(name) + '</span>' +
                  statsHtml +
                '</div>' +
                '<button onclick="qmdAction(\'reindex\',\'' + esc(name) + '\')" class="btn-secondary text-xs px-3 py-1 rounded-lg">Reindex</button>' +
              '</div>' +
              '<div class="qmd-docs-panel hidden border-t border-border/30 bg-base/40"></div>' +
            '</div>';
          }

          let html = '';
          // Render team groups
          Object.keys(teams).forEach(headId => {
            const team = teams[headId];
            const teamName = team.name || (team.head && (team.head.display_name || team.head.id)) || headId;
            const teamAvatar = team.avatar || '';
            const memberIds = (team.members || []).map(m => m.id || m);
            const teamCollIds = [...new Set([headId, ...memberIds])].filter(id => collMap[id]);
            if (teamCollIds.length) {
              html += '<div class="border border-border/30 rounded-lg p-2 mb-2 bg-surface/30">' +
                '<div class="text-[10px] text-text-muted uppercase tracking-wider font-bold mb-1.5 px-2">' + (teamAvatar ? esc(teamAvatar) + ' ' : '') + esc(teamName) + '</div>' +
                '<div class="space-y-1">' + teamCollIds.map(id => renderCollRow(collMap[id])).join('') + '</div></div>';
            }
          });
          // Render standalone
          collections.forEach(c => {
            const name = typeof c === 'string' ? c : (c.name || c.id || '?');
            if (!inTeam.has(name)) html += renderCollRow(c);
          });
          return html;
        })()}
      </div>
    </div>` : ''}`;
}

window.toggleQmdDocs = async function(collection) {
  const row = document.querySelector(`[data-collection="${CSS.escape(collection)}"]`);
  if (!row) return;
  const panel = row.querySelector('.qmd-docs-panel');
  const btn = row.querySelector('.qmd-expand-btn');
  if (!panel) return;

  if (!panel.classList.contains('hidden')) {
    panel.classList.add('hidden');
    if (btn) btn.textContent = '▶';
    return;
  }

  panel.classList.remove('hidden');
  if (btn) btn.textContent = '▼';
  panel.innerHTML = '<div class="text-text-muted text-xs px-4 py-3">Loading...</div>';

  try {
    const r = await API.get(`/v1/services/qmd/docs?collection=${encodeURIComponent(collection)}`);
    const files = r.files || [];
    if (!files.length) {
      panel.innerHTML = '<div class="text-text-muted text-xs px-4 py-3">No .md files found.</div>';
      return;
    }
    panel.innerHTML = `
      <div class="divide-y divide-border/20">
        <div class="flex items-center px-4 py-1.5 text-[10px] text-text-muted uppercase tracking-wider gap-2">
          <span class="flex-1 min-w-0">File</span>
          <span class="w-[100px] text-right">Modified</span>
          <span class="w-[100px] text-right">Embedded</span>
          <span class="w-[60px] text-center">Status</span>
          <span class="w-5"></span>
        </div>
        ${files.map(f => {
          const modDate = f.modified ? new Date(f.modified * 1000).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
          const embedDate = f.embedded_at ? new Date(f.embedded_at).toLocaleString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
          let statusDot, statusTitle;
          if (!f.indexed) {
            statusDot = 'bg-red-400'; statusTitle = 'Not in index';
          } else if (f.current === false) {
            statusDot = 'bg-yellow-400'; statusTitle = 'Stale — file changed since last index';
          } else if (!f.embedded_at) {
            statusDot = 'bg-blue-400'; statusTitle = 'Indexed (FTS) but not yet embedded';
          } else {
            statusDot = 'bg-green-400'; statusTitle = 'Indexed & embedded — up to date';
          }
          return `
          <div class="flex items-center px-4 py-2 hover:bg-surface/50 transition-colors group gap-2">
            <button class="text-left flex-1 min-w-0" onclick="viewQmdFile('${esc(collection)}','${esc(f.name)}')">
              <span class="text-text-primary text-xs mono group-hover:text-accent transition-colors">${esc(f.name)}</span>
              <span class="text-text-muted text-[10px] ml-2">${formatBytes(f.size)}</span>
            </button>
            <span class="w-[100px] text-right text-[10px] text-text-muted mono shrink-0">${modDate}</span>
            <span class="w-[100px] text-right text-[10px] text-text-muted mono shrink-0">${embedDate}</span>
            <span class="w-[60px] flex justify-center shrink-0"><span class="inline-block w-2 h-2 rounded-full ${statusDot}" title="${statusTitle}"></span></span>
            <button class="text-text-muted hover:text-accent text-[10px] ml-1 transition-colors shrink-0" onclick="viewQmdFile('${esc(collection)}','${esc(f.name)}')" title="View">&#x1F441;</button>
          </div>`;
        }).join('')}
      </div>`;
  } catch (e) {
    panel.innerHTML = `<div class="text-error text-xs px-4 py-3">${esc(e.message)}</div>`;
  }
};
