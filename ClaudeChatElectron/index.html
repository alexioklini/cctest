<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Claude Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Titlebar drag region -->
  <div class="titlebar">
    <div class="titlebar-drag"></div>
    <div class="titlebar-controls">
      <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
      <select id="modelSelect" title="Select Model">
        <option value="claude-opus-4-5-20251101">claude-opus-4-5-20251101</option>
      </select>
      <button id="clearBtn" class="icon-btn" title="Clear Chat">🗑️</button>
    </div>
  </div>

  <!-- Notification banner -->
  <div id="notification" class="notification hidden"></div>

  <!-- Chat area -->
  <div id="chatContainer" class="chat-container">
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">💬</div>
      <p>Start a conversation with Claude</p>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-container">
    <textarea
      id="messageInput"
      placeholder="Type a message... (⌘+Enter to send)"
      rows="1"
    ></textarea>
    <button id="sendBtn" class="send-btn" title="Send (⌘+Enter)">
      <span id="sendIcon">➤</span>
    </button>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="closeSettings" class="close-btn">×</button>
      </div>
      <div class="modal-body">
        <label>
          API Key
          <input type="password" id="apiKeyInput" placeholder="sk-...">
        </label>
        <label>
          Base URL
          <input type="text" id="baseURLInput" placeholder="http://localhost:8317/v1">
        </label>
        <label>
          Default Model
          <input type="text" id="defaultModelInput" placeholder="claude-opus-4-5-20251101">
        </label>
        <label>
          Max Tokens
          <input type="number" id="maxTokensInput" placeholder="4096" min="1" max="100000">
        </label>
      </div>
      <div class="modal-footer">
        <button id="testConnection" class="secondary-btn">Test Connection</button>
        <button id="saveSettings" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
