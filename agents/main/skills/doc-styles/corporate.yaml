# Document style preset: "corporate"
# Editable per-format styling applied DETERMINISTICALLY by write_document /
# render_diagram when a document is created with style="corporate" (or when this
# is the default preset). The MODEL does not interpret this — Python reads it and
# sets fonts/colors/layout, so styling never depends on model strength.
#
# Add more presets by dropping another <name>.yaml in this folder. Colors are
# hex (#RRGGBB). Sizes in points. Keep keys as below; unknown keys are ignored,
# missing keys fall back to the built-in defaults.

name: corporate
description: Clean, neutral corporate look (navy headings, grey body, Calibri).

# Applies to .docx and .pdf body text + headings.
fonts:
  body: Calibri          # main paragraph font
  heading: Calibri       # heading font
  mono: Consolas         # code / monospace
sizes:
  body: 11
  h1: 20
  h2: 16
  h3: 13
colors:
  heading: "#1F3864"     # navy
  body: "#222222"
  accent: "#2E74B5"      # links / accents / table header fill
  table_header_bg: "#1F3864"
  table_header_text: "#FFFFFF"

docx:
  table_style: "Light Grid Accent 1"   # python-docx built-in style name
  heading_bold: true

pdf:
  page_size: letter      # letter | a4
  margin_inch: 1.0

pptx:
  title_color: "#1F3864"
  body_color: "#222222"
  accent: "#2E74B5"
  background: "#FFFFFF"

# Diagrams rendered for THIS document use this mermaid theme so charts match.
mermaid:
  theme: neutral         # default | dark | forest | neutral
  background: white
