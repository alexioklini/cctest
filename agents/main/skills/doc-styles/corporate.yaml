name: corporate
description: Clean, neutral corporate look (navy headings, grey body, Calibri).
fonts:
  body: Calibri
  heading: Calibri
  mono: Consolas
sizes:
  body: 11
  h1: 20
  h2: 16
  h3: 13
colors:
  heading: "#1f3864"
  body: "#222222"
  accent: "#2e74b5"
  table_header_bg: "#1f3864"
  table_header_text: "#ffffff"
docx:
  table_style: Light Grid Accent 1
  heading_bold: true
  zebra_fill: "#edf1f8"
  rule_color: "#b4c6e7"
  strip_emoji: true
  risk_badges: true
  cover: true
  toc: true
pdf:
  page_size: letter
  margin_inch: 1
pptx:
  title_color: "#1f3864"
  body_color: "#222222"
  accent: "#2e74b5"
  background: "#ffffff"
mermaid:
  theme: neutral
  background: white
header:
  text: Wiener Privatbank SE
  align: right
  font_size: 9
  color: "#666666"
footer:
  # Manual footer text only — the classification + AI-disclosure + page number
  # lines are added AUTOMATICALLY (own lines) and must NOT be hand-typed here.
  text: ""
  align: center
  font_size: 9
  color: "#666666"
  page_numbers: true
  classification: true   # auto content-based "Klassifizierung: <Stufe>" line
  ai_disclosure: true    # auto EU-AI-Act transparency line
logo:
  position: header
  align: left
  width_inch: 1.2
  file: corporate.logo.png
